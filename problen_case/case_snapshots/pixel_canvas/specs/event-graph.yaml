version: 1
primitive-catalog-version: 1
engine: canvas

# ===========================================
# EVENT-GRAPH: pixel_canvas-001
# 事件连接蓝图 - 模块间事件流
# ===========================================
#
# Spec澄清消费记录：
# - position-attack: 每个格子位置触发攻击判定（Spec澄清: "每个格子位置触发"）
# - attack-effect: 攻击后小猪继续移动，不停止（Spec澄清: "传送带持续移动"）
# - slot-recycle: 小猪回到入口位置时判定一圈完成（Spec澄清: "入口位置是最自然的判定点"）
# - conveyor-turn: 到达角落立即转向（Spec澄清: "简化实现，瞬移或忽略动画"）
#
# 机械基线锚点：
# - 所有事件节点引用 mechanics.yaml 中的 primitive node
# - 事件名使用 mechanics produces-events / trigger-on 中定义的标准事件
# ===========================================

# 模块定义：每个模块的 listens 和 emits
modules:
  # ============ 输入层 ============
  - id: input.handler
    description: "用户输入处理层"
    listens: []
    emits:
      - input.click-start
      - input.click-dispatch
      - input.click-retry
      - input.click-next
    primitive-node-ref: none
    primitive-node-ref-reason: "纯输入层，不涉及 gameplay mechanics"

  # ============ 状态机模块 ============
  - id: system.fsm
    description: "游戏状态机管理（§1）"
    listens:
      - input.click-start
      - win
      - lose
      - input.click-retry
      - input.click-next
    emits:
      - state.changed
      - scene.entered
      - scene.exited
    primitive-node-ref: none
    primitive-node-ref-reason: "状态机是框架层，不映射到 gameplay primitive"
    state-schema:
      phase: "ready | playing | win | lose"
      previousPhase: "string"
    invariants:
      - "状态只能通过 send() 转移，不能直接赋值"
      - "每个状态必须有 enter/exit 钩子"

  # ============ 传送带轨道模块 ============
  - id: motion.conveyor-track
    description: "传送带运动控制"
    listens:
      - pool.unbound
      - tick
    emits:
      - track.enter-segment
      - track.loop-complete
      - track.position-update
    primitive-node-ref: conveyor-track
    spec-clarification-ref: "position-attack: 每个格子位置触发"
    produces-events-from-mechanics:
      - track.enter-segment
      - track.loop-complete

  # ============ 棋盘网格模块 ============
  - id: spatial.board
    description: "棋盘网格管理"
    listens:
      - level.init
      - resource.target-zero
    emits:
      - board.cell-added
      - board.cell-removed
      - board.empty
    primitive-node-ref: board
    produces-events-from-mechanics:
      - board.cell-added
      - board.cell-removed
      - board.empty

  # ============ 位置索敌模块 ============
  - id: spatial.attack-raycast
    description: "位置依赖索敌系统"
    listens:
      - track.enter-segment
    emits:
      - ray.hit-candidate
      - ray.miss
    primitive-node-ref: attack-raycast
    spec-clarification-ref: "position-attack: 正对方向第一个目标块"
    constraint-mapping:
      no-global-autoaim: "direction.mode = normal-to-track"
      no-multi-attack: "stop-on = first-hit"
      no-pierce-attack: "no-penetration invariant"
    produces-events-from-mechanics:
      - ray.hit-candidate
      - ray.miss

  # ============ 颜色匹配模块 ============
  - id: logic.color-match
    description: "颜色匹配判定"
    listens:
      - ray.hit-candidate
    emits:
      - match.hit
      - match.miss
    primitive-node-ref: color-match
    produces-events-from-mechanics:
      - match.hit
      - match.miss

  # ============ 资源消耗模块 ============
  - id: logic.attack-consume
    description: "攻击资源消耗"
    listens:
      - match.hit
    emits:
      - resource.consumed
      - resource.agent-zero
      - resource.target-zero
    primitive-node-ref: attack-consume
    produces-events-from-mechanics:
      - resource.consumed
      - resource.agent-zero
      - resource.target-zero

  # ============ 等待槽池模块 ============
  - id: lifecycle.wait-pool
    description: "等待槽管理"
    listens:
      - input.click-dispatch
      - track.loop-complete
      - resource.agent-zero
    emits:
      - pool.bound
      - pool.unbound
      - pool.overflow
      - pool.empty
    primitive-node-ref: wait-pool
    spec-clarification-ref: "slot-recycle: 入口位置判定一圈完成"
    produces-events-from-mechanics:
      - pool.bound
      - pool.unbound
      - pool.overflow

  # ============ 小猪生命周期模块 ============
  - id: lifecycle.pig-lifecycle
    description: "小猪实体生命周期"
    listens:
      - pool.unbound
      - resource.agent-zero
      - pool.bound
    emits:
      - lifecycle.entered.active
      - lifecycle.entered.returning
      - lifecycle.entered.waiting
      - lifecycle.entered.dead
    primitive-node-ref: pig-lifecycle
    produces-events-from-mechanics:
      - lifecycle.entered.active
      - lifecycle.entered.returning
      - lifecycle.entered.waiting
      - lifecycle.entered.dead

  # ============ 胜负判定模块 ============
  - id: progression.end-check
    description: "胜负条件评估"
    listens:
      - board.cell-removed
      - lifecycle.entered.dead
      - tick@1s
    emits:
      - win
      - lose
    primitive-node-ref: end-check
    produces-events-from-mechanics:
      - win
      - lose

  # ============ 分数累计模块 ============
  - id: progression.scoring
    description: "分数累计系统"
    listens:
      - resource.target-zero
    emits:
      - score.updated
    primitive-node-ref: scoring
    produces-events-from-mechanics:
      - score.updated

  # ============ 视觉反馈模块 ============
  - id: system.feedback
    description: "视觉反馈系统"
    listens:
      - match.hit
      - match.miss
      - resource.consumed
      - win
      - lose
      - track.enter-segment
    emits:
      - animation.play
      - sfx.play
      - particle.emit
    primitive-node-ref: none
    primitive-node-ref-reason: "视觉层，不涉及 gameplay mechanics"

  # ============ 关卡管理模块 ============
  - id: system.level-manager
    description: "关卡初始化与递进"
    listens:
      - input.click-start
      - input.click-next
      - input.click-retry
    emits:
      - level.init
      - level.complete
    primitive-node-ref: none
    primitive-node-ref-reason: "元系统，不属于 mechanics primitive"

# ===========================================
# 事件边定义：模块间的事件流动
# ===========================================
edges:
  # === 游戏启动流 ===
  - from: input.handler
    to: system.fsm
    event: input.click-start
    description: "点击开始按钮，触发状态 ready -> playing"

  - from: system.fsm
    to: system.level-manager
    event: scene.entered
    description: "进入游戏场景，初始化关卡"

  - from: system.level-manager
    to: spatial.board
    event: level.init
    description: "关卡初始化，生成棋盘和目标块"

  # === 派出小猪流 ===
  - from: input.handler
    to: lifecycle.wait-pool
    event: input.click-dispatch
    description: "点击等待槽，请求派出小猪"
    guard: "slot has occupant && conveyor not full"

  - from: lifecycle.wait-pool
    to: lifecycle.pig-lifecycle
    event: pool.unbound
    description: "小猪离开等待槽，进入 active 状态"
    primitive-node-ref: wait-pool

  - from: lifecycle.pig-lifecycle
    to: motion.conveyor-track
    event: lifecycle.entered.active
    description: "小猪进入 active 状态，开始传送带运动"
    primitive-node-ref: pig-lifecycle

  # === 传送带运动流 ===
  - from: motion.conveyor-track
    to: spatial.attack-raycast
    event: track.enter-segment
    description: "小猪进入新格子，触发位置索敌"
    primitive-node-ref: conveyor-track
    spec-clarification-ref: "position-attack: 每个格子位置触发"

  - from: motion.conveyor-track
    to: lifecycle.wait-pool
    event: track.loop-complete
    description: "小猪完成一圈，返回等待槽（若 ammo > 0）"
    primitive-node-ref: conveyor-track
    spec-clarification-ref: "slot-recycle: 入口位置判定一圈完成"

  # === 位置攻击流 ===
  - from: spatial.attack-raycast
    to: logic.color-match
    event: ray.hit-candidate
    description: "射线命中目标块，检查颜色匹配"
    primitive-node-ref: attack-raycast

  - from: spatial.attack-raycast
    to: system.feedback
    event: ray.miss
    description: "射线未命中，无视觉反馈"
    primitive-node-ref: attack-raycast

  # === 颜色匹配流 ===
  - from: logic.color-match
    to: logic.attack-consume
    event: match.hit
    description: "颜色匹配成功，执行攻击消耗"
    primitive-node-ref: color-match

  - from: logic.color-match
    to: system.feedback
    event: match.miss
    description: "颜色不匹配，播放失败反馈"
    primitive-node-ref: color-match

  # === 攻击消耗流 ===
  - from: logic.attack-consume
    to: lifecycle.pig-lifecycle
    event: resource.agent-zero
    description: "小猪弹药耗尽，进入 returning/dead 状态"
    primitive-node-ref: attack-consume

  - from: logic.attack-consume
    to: spatial.board
    event: resource.target-zero
    description: "目标块血量归零，从棋盘移除"
    primitive-node-ref: attack-consume

  - from: logic.attack-consume
    to: progression.scoring
    event: resource.target-zero
    description: "目标块消除，累计分数"
    primitive-node-ref: attack-consume

  - from: logic.attack-consume
    to: system.feedback
    event: resource.consumed
    description: "攻击生效，播放攻击动画"
    primitive-node-ref: attack-consume

  # === 生命周期流 ===
  - from: lifecycle.wait-pool
    to: lifecycle.pig-lifecycle
    event: pool.bound
    description: "小猪返回等待槽，进入 waiting 状态"
    primitive-node-ref: wait-pool

  - from: lifecycle.pig-lifecycle
    to: progression.end-check
    event: lifecycle.entered.dead
    description: "小猪死亡，检查失败条件"
    primitive-node-ref: pig-lifecycle

  # === 棋盘变化流 ===
  - from: spatial.board
    to: progression.end-check
    event: board.cell-removed
    description: "目标块被移除，检查胜利条件"
    primitive-node-ref: board

  - from: spatial.board
    to: progression.end-check
    event: board.empty
    description: "棋盘清空，触发胜利"
    primitive-node-ref: board

  # === 胜负判定流 ===
  - from: progression.end-check
    to: system.fsm
    event: win
    description: "胜利条件达成，进入 win 状态"
    primitive-node-ref: end-check

  - from: progression.end-check
    to: system.fsm
    event: lose
    description: "失败条件达成，进入 lose 状态"
    primitive-node-ref: end-check

  - from: progression.end-check
    to: system.feedback
    event: win
    description: "胜利，播放结算动画"
    primitive-node-ref: end-check

  - from: progression.end-check
    to: system.feedback
    event: lose
    description: "失败，播放结算动画"
    primitive-node-ref: end-check

  # === 分数更新流 ===
  - from: progression.scoring
    to: system.feedback
    event: score.updated
    description: "分数变化，更新 HUD"
    primitive-node-ref: scoring

  # === 场景转场流 ===
  - from: system.fsm
    to: system.feedback
    event: scene.entered
    description: "场景进入，播放入场动画"

  - from: system.fsm
    to: system.feedback
    event: scene.exited
    description: "场景退出，播放退场动画"

  # === 重试/下一关流 ===
  - from: input.handler
    to: system.fsm
    event: input.click-retry
    description: "点击重试，重新开始当前关卡"

  - from: input.handler
    to: system.fsm
    event: input.click-next
    description: "点击下一关，进入下一关卡"

  - from: input.handler
    to: system.level-manager
    event: input.click-next
    description: "加载下一关配置"

# ===========================================
# 异步边界定义：需要加锁/解锁的关键路径
# ===========================================
async-boundaries:
  # === 派出小猪异步边界 ===
  - id: dispatch-pig-flow
    description: "点击派出 → 小猪从等待槽消失 → 出现在传送带入口 → 移动开始"
    entry-lock: "isDispatching = true"
    exit-unlock: "isDispatching = false"
    async-steps:
      - "等待槽小猪消失动画 (fade-out) ~150ms"
      - "传送带入口出现动画 (scale-bounce) ~200ms"
      - "位置初始化完成"
    danger: "如果连续快速点击，可能导致同一小猪被派出两次或状态不一致"
    guard-condition: "conveyor.pigs.length < conveyor.capacity"

  # === 攻击判定异步边界 ===
  - id: attack-flow
    description: "颜色匹配 → 攻击动画 → 扣血飘字 → 目标块消失（若清空）"
    entry-lock: "isAttacking = true"
    exit-unlock: "isAttacking = false"
    async-steps:
      - "攻击特效 (particle-burst) ~100ms"
      - "伤害飘字 (float-text) ~300ms"
      - "目标块消失动画 (scale-down + fade-out) ~200ms"
    danger: "攻击动画期间若再次触发攻击判定，可能导致弹药扣除错误"
    spec-clarification-ref: "attack-effect: 攻击后小猪继续移动，不停止"

  # === 小猪回收异步边界 ===
  - id: slot-recycle-flow
    description: "完成一圈 → 离开传送带 → 返回等待槽 → 槽位填充动画"
    entry-lock: "isRecycling = true"
    exit-unlock: "isRecycling = false"
    async-steps:
      - "传送带出口消失动画 ~150ms"
      - "等待槽出现动画 (scale-bounce) ~200ms"
    danger: "回收动画期间若再次点击该槽位，可能导致状态冲突"
    spec-clarification-ref: "slot-recycle: 入口位置判定一圈完成"

  # === 场景转场异步边界 ===
  - id: scene-transition-flow
    description: "胜负判定 → 场景淡出 → 清理资源 → 加载新场景 → 场景淡入"
    entry-lock: "isTransitioning = true"
    exit-unlock: "isTransitioning = false"
    async-steps:
      - "exit-transition (fade-out) ~300ms"
      - "cleanup old scene objects"
      - "enter-transition (fade-in) ~400ms"
    danger: "转场中途如果用户点击，会触发已销毁的对象"

  # === 关卡初始化异步边界 ===
  - id: level-init-flow
    description: "关卡配置加载 → 棋盘生成 → 等待槽填充 → 准备就绪"
    entry-lock: "isInitializing = true"
    exit-unlock: "isInitializing = false"
    async-steps:
      - "棋盘格子逐个出现动画 (stagger-fade-up) ~500ms"
      - "等待槽小猪依次出现 ~400ms"
    danger: "初始化未完成时若用户点击，可能导致空指针或状态异常"

# ===========================================
# 测试钩子：Canvas 引擎必须暴露的 API
# ===========================================
test-hooks:
  # === Required: 必须实现的测试 API ===
  required:
    - name: "window.gameTest.clickStartButton"
      description: "模拟点击开始按钮，触发 phase ready -> playing"
      implementation-hint: "document.querySelector('#start-btn').click() 或 dispatchEvent"

    - name: "window.gameTest.clickWaitSlot"
      description: "模拟点击指定等待槽，派出小猪"
      params: "slotIndex: number (0-4)"
      implementation-hint: "触发 wait-slots UI 的点击事件"

    - name: "window.gameTest.getGameState"
      description: "返回当前游戏状态快照"
      returns: "{ phase, score, level, blocks, pigs, waitSlots }"

    - name: "window.gameTest.getBlocks"
      description: "返回当前棋盘上所有目标块"
      returns: "Array<{ id, color, hp, row, col, cleared }>"

    - name: "window.gameTest.getPigs"
      description: "返回当前传送带上所有小猪"
      returns: "Array<{ id, color, ammo, x, y, direction, onConveyor }>"

    - name: "window.gameTest.getWaitSlots"
      description: "返回当前等待槽状态"
      returns: "Array<{ index, hasPig, pigColor, pigAmmo }>"

    - name: "window.gameTest.forceWin"
      description: "强制清空所有目标块，触发胜利"
      implementation-hint: "遍历 blocks 设置 cleared=true，触发 board.empty"

    - name: "window.gameTest.forceLose"
      description: "强制耗尽所有小猪，触发失败"
      implementation-hint: "清空 waitSlots，设置所有 pig.alive=false"

    - name: "window.gameTest.tick"
      description: "推进游戏帧（用于控制传送带移动）"
      params: "frames: number (默认1)"
      implementation-hint: "调用 requestAnimationFrame 回调指定次数"

    - name: "window.gameTest.setPigPosition"
      description: "直接设置小猪位置（用于测试位置攻击）"
      params: "pigId: string, x: number, y: number"
      implementation-hint: "直接修改 pig.x, pig.y 并更新 gridPosition"

  # === Recommended: 推荐实现的测试 API ===
  recommended:
    - name: "window.gameTest.clickRetryButton"
      description: "模拟点击重试按钮"
      implementation-hint: "document.querySelector('#retry-btn').click()"

    - name: "window.gameTest.clickNextButton"
      description: "模拟点击下一关按钮"
      implementation-hint: "document.querySelector('#next-btn').click()"

    - name: "window.gameTest.spawnBlock"
      description: "在指定位置生成目标块（用于构造测试场景）"
      params: "color: string, row: number, col: number, hp: number"
      implementation-hint: "添加到 blocks 数组并触发 board.cell-added"

    - name: "window.gameTest.removeBlock"
      description: "移除指定目标块"
      params: "blockId: string"
      implementation-hint: "设置 cleared=true 并触发 board.cell-removed"

    - name: "window.gameTest.dispatchPig"
      description: "直接派出指定颜色的小猪（不经过 UI 点击）"
      params: "color: string, ammo: number"
      implementation-hint: "创建 pig 实例并添加到 conveyor.pigs"

    - name: "window.gameTest.getConveyorPigs"
      description: "获取传送带上的小猪列表（同 getPigs，语义别名）"
      returns: "Array<pig>"

    - name: "window.gameTest.verifyNoGlobalAutoaim"
      description: "验证攻击时只检查正对方向第一个块"
      implementation-hint: "检查 attack-raycast 的 stop-on=first-hit 行为"

# ===========================================
# 事件完整性检查
# ===========================================
# 规则：每个 listens 事件必须有至少一个模块 emits 对应事件
# 孤立模块检查：每个模块至少有一个 listens 或 emits 与其他模块相连

event-integrity-check:
  # 外部输入事件（无需 emitter）
  external-events:
    - input.click-start
    - input.click-dispatch
    - input.click-retry
    - input.click-next
    - tick
    - tick@1s

  # 内部事件来源验证
  internal-events:
    - event: track.enter-segment
      emitted-by: [motion.conveyor-track]
    - event: track.loop-complete
      emitted-by: [motion.conveyor-track]
    - event: board.cell-removed
      emitted-by: [spatial.board]
    - event: board.empty
      emitted-by: [spatial.board]
    - event: ray.hit-candidate
      emitted-by: [spatial.attack-raycast]
    - event: ray.miss
      emitted-by: [spatial.attack-raycast]
    - event: match.hit
      emitted-by: [logic.color-match]
    - event: match.miss
      emitted-by: [logic.color-match]
    - event: resource.consumed
      emitted-by: [logic.attack-consume]
    - event: resource.agent-zero
      emitted-by: [logic.attack-consume]
    - event: resource.target-zero
      emitted-by: [logic.attack-consume]
    - event: pool.bound
      emitted-by: [lifecycle.wait-pool]
    - event: pool.unbound
      emitted-by: [lifecycle.wait-pool]
    - event: lifecycle.entered.active
      emitted-by: [lifecycle.pig-lifecycle]
    - event: lifecycle.entered.dead
      emitted-by: [lifecycle.pig-lifecycle]
    - event: win
      emitted-by: [progression.end-check]
    - event: lose
      emitted-by: [progression.end-check]
    - event: score.updated
      emitted-by: [progression.scoring]
    - event: state.changed
      emitted-by: [system.fsm]
    - event: scene.entered
      emitted-by: [system.fsm]
    - event: scene.exited
      emitted-by: [system.fsm]
    - event: level.init
      emitted-by: [system.level-manager]

# ===========================================
# Spec澄清消费清单
# ===========================================
spec-clarifications-consumed:
  - rule-id: position-attack
    decision: "每个格子位置触发"
    event-edge: "track.enter-segment -> attack-raycast"
    primitive-node: conveyor-track
    consumed-in: "motion.conveyor-track.grid-projection"

  - rule-id: position-attack
    decision: "正对方向第一个目标块"
    event-edge: "ray.hit-candidate -> color-match"
    primitive-node: attack-raycast
    consumed-in: "spatial.attack-raycast.stop-on = first-hit"

  - rule-id: attack-effect
    decision: "攻击后小猪继续移动，不停止"
    event-edge: "resource.consumed -> feedback (no lifecycle change)"
    primitive-node: attack-consume
    consumed-in: "async-boundaries.attack-flow (小猪不进入 returning 状态)"

  - rule-id: slot-recycle
    decision: "入口位置判定一圈完成"
    event-edge: "track.loop-complete -> wait-pool"
    primitive-node: conveyor-track
    consumed-in: "motion.conveyor-track.produces-events"

  - rule-id: conveyor-turn
    decision: "到达角落立即转向"
    event-edge: "track.enter-segment (segment change)"
    primitive-node: conveyor-track
    consumed-in: "conveyor-track.segments 边界检测"
