scenes:
  - id: start
    layout:
      viewport: "full"
      board-bbox: "none"
      hud-bbox: "none"
      safe-area: { x: "10%", y: "15%", width: "80%", height: "70%" }
      preset: center-single
    zones:
      - id: title-area
        shape: rect
        geometry: { x: "50%", y: "30%", width: "80%", height: "auto" }
      - id: start-btn
        shape: rect
        geometry: { x: "50%", y: "60%", width: 200, height: 60 }
    ui-slots:
      - { id: title-text, position: center-top, binds: "config.title" }
      - { id: start-btn-ui, position: center, binds: "@ui(start-btn)" }
    state-on-enter: ready
    enter-transition:
      type: fade-in
      duration: 400
    exit-transition:
      type: fade-out
      duration: 300
    enter-sequence:
      - { target: title-area, delay: 0, animation: "scale-bounce" }
      - { target: start-btn, delay: 200, animation: "fade-slide-up" }

  - id: play
    layout:
      viewport: "full"
      board-bbox: { x: "15%", y: "15%", width: "70%", height: "65%" }
      hud-bbox: { x: 0, y: 0, width: "100%", height: "10%" }
      safe-area: { x: "5%", y: "5%", width: "90%", height: "90%" }
      preset: three-zone
    zones:
      - id: hud-top
        shape: rect
        geometry: { x: 0, y: 0, width: "100%", height: "10%" }
      - id: board-area
        shape: rect
        geometry: { x: "15%", y: "15%", width: "70%", height: "65%" }
      - id: conveyor-ring
        shape: ring
        geometry: { x: "10%", y: "10%", width: "80%", height: "80%", thickness: "5%" }
      - id: wait-slots-area
        shape: rect
        geometry: { x: "10%", y: "85%", width: "80%", height: "10%" }
    ui-slots:
      - { id: hud-level, position: top-left, binds: "state.level" }
      - { id: hud-pigs, position: top-right, binds: "state.waitSlotPigs" }
      - { id: board-grid, position: center, binds: "@ui(board)" }
      - { id: conveyor-track, position: surrounding-board, binds: "@ui(conveyor)" }
      - { id: wait-slots-ui, position: bottom, binds: "@ui(wait-slots)" }
    state-on-enter: playing
    enter-transition:
      type: fade-in
      duration: 300
    exit-transition:
      type: fade-out
      duration: 300
    enter-sequence:
      - { target: hud-top, delay: 0, animation: "fade-in" }
      - { target: board-area, delay: 100, animation: "fade-in" }
      - { target: conveyor-ring, delay: 150, animation: "fade-in" }
      - { target: wait-slots-area, delay: 200, animation: "fade-slide-up" }

  - id: result
    layout:
      viewport: "full"
      board-bbox: "none"
      hud-bbox: "none"
      safe-area: { x: "10%", y: "15%", width: "80%", height: "70%" }
      preset: center-single
    zones:
      - id: result-title-area
        shape: rect
        geometry: { x: "50%", y: "25%", width: "80%", height: "auto" }
      - id: result-score-area
        shape: rect
        geometry: { x: "50%", y: "45%", width: "60%", height: "auto" }
      - id: result-buttons
        shape: rect
        geometry: { x: "50%", y: "70%", width: "80%", height: 60 }
    ui-slots:
      - { id: result-title, position: center-top, binds: "state.isWin ? 'Victory!' : 'Game Over'" }
      - { id: result-score, position: center, binds: "state.score" }
      - { id: retry-btn-ui, position: bottom-left, binds: "@ui(retry-btn)" }
      - { id: next-btn-ui, position: bottom-right, binds: "@ui(next-btn)" }
    state-on-enter: "win | lose"
    enter-transition:
      type: zoom-in
      duration: 500
    exit-transition:
      type: fade-out
      duration: 300
    enter-sequence:
      - { target: result-title-area, delay: 0, animation: "scale-bounce" }
      - { target: result-score-area, delay: 300, animation: "count-up" }
      - { target: result-buttons, delay: 600, animation: "fade-slide-up" }

# 启动契约（codegen 必须严格遵守，verify 据此校验）
boot-contract:
  entry-scene: start
  ready-condition: "window.gameState.phase === 'ready'"
  start-action:
    trigger: click
    target: start-btn
    result: "phase -> playing; scene -> play"
  scene-transitions:
    - from: start
      to: play
      trigger: "click start-btn"
      guard: "phase === 'ready'"
    - from: play
      to: result
      trigger: "phase === 'win' || phase === 'lose'"
      guard: null
    - from: result
      to: play
      trigger: "click retry-btn"
      guard: null
    - from: result
      to: play
      trigger: "click next-btn"
      guard: "state.level < 3"
