# gameState 初始值定义（codegen 必须完整搬入，不得遗漏字段）
initial-state:
  # 场景与阶段
  currentScene: "start"
  phase: "ready"           # ready | playing | win | lose

  # 关卡信息
  level: 1
  score: 0

  # 棋盘状态
  board:
    rows: 6
    cols: 6
    blocks: []              # @entity(block) 数组

  # 传送带状态
  conveyor:
    pigs: []                # 当前在传送带上的小猪数组
    capacity: 4             # 传送带容量上限
    entryX: 0               # 入口 X 坐标
    entryY: 0               # 入口 Y 坐标
    speed: 2                # 移动速度（像素/帧）

  # 等待槽状态
  waitSlots:
    slots: []               # 槽位数组，每个槽位可放置一只小猪或为 null
    maxSlots: 5             # 槽位数量

  # 可用小猪池（未派出的）
  availablePigs: []         # 待分配到等待槽的小猪

  # 统计信息
  totalBlocks: 0            # 目标块总数
  clearedBlocks: 0          # 已清除目标块数
  dispatchedPigs: 0         # 已派出小猪数
  expiredPigs: 0            # 已耗尽小猪数

  # 游戏循环控制
  isRunning: false          # 游戏循环是否运行
  isProcessing: false       # 异步锁（防止重复操作）
  lastFrameTime: 0          # 上一帧时间戳

  # 颜色配置引用
  colorPalette:
    red: "#ef4444"
    blue: "#3b82f6"
    yellow: "#eab308"
    green: "#22c55e"

# 资源数据
resources:
  # 颜色配置
  - id: color-palette
    type: config
    source: inline
    schema:
      red: string
      blue: string
      yellow: string
      green: string
    examples:
      - { red: "#ef4444", blue: "#3b82f6", yellow: "#eab308", green: "#22c55e" }
      - { red: "#ff6b6b", blue: "#4ecdc4", yellow: "#ffe66d", green: "#95e1d3" }
      - { red: "#e74c3c", blue: "#3498db", yellow: "#f1c40f", green: "#2ecc71" }

  # 关卡配置
  - id: level-configs
    type: config
    source: inline
    schema:
      level: number
      difficulty: string
      colors: array           # 可用颜色列表
      boardSize: string       # "WxH" 格式
      rows: number
      cols: number
      pigCount: number        # 小猪总数
      pigsPerColor: number    # 每种颜色的小猪数
      pigAmmo: number         # 每只小猪的弹药量
      blockCount: number      # 目标块总数
      blockHp: number         # 目标块默认血量
      blockLayout: array      # 目标块布局配置
    examples:
      # Level 1: 2色, 6x6, 8只小猪
      - level: 1
        difficulty: "easy"
        colors: ["red", "blue"]
        boardSize: "6x6"
        rows: 6
        cols: 6
        pigCount: 8
        pigsPerColor: 4
        pigAmmo: 2
        blockCount: 12
        blockHp: 1
        blockLayout:
          # 每个 block 配置: { row, col, color, hp }
          - { row: 0, col: 1, color: "red", hp: 1 }
          - { row: 0, col: 4, color: "blue", hp: 1 }
          - { row: 1, col: 0, color: "red", hp: 1 }
          - { row: 1, col: 2, color: "blue", hp: 1 }
          - { row: 2, col: 3, color: "red", hp: 1 }
          - { row: 2, col: 5, color: "blue", hp: 1 }
          - { row: 3, col: 1, color: "red", hp: 1 }
          - { row: 3, col: 4, color: "blue", hp: 1 }
          - { row: 4, col: 0, color: "red", hp: 1 }
          - { row: 4, col: 2, color: "blue", hp: 1 }
          - { row: 5, col: 3, color: "red", hp: 1 }
          - { row: 5, col: 5, color: "blue", hp: 1 }

      # Level 2: 3色, 6x6, 12只小猪
      - level: 2
        difficulty: "medium"
        colors: ["red", "blue", "yellow"]
        boardSize: "6x6"
        rows: 6
        cols: 6
        pigCount: 12
        pigsPerColor: 4
        pigAmmo: 2
        blockCount: 18
        blockHp: 1
        blockLayout:
          - { row: 0, col: 0, color: "red", hp: 1 }
          - { row: 0, col: 2, color: "blue", hp: 1 }
          - { row: 0, col: 4, color: "yellow", hp: 1 }
          - { row: 1, col: 1, color: "red", hp: 1 }
          - { row: 1, col: 3, color: "blue", hp: 1 }
          - { row: 1, col: 5, color: "yellow", hp: 1 }
          - { row: 2, col: 0, color: "yellow", hp: 1 }
          - { row: 2, col: 2, color: "red", hp: 1 }
          - { row: 2, col: 4, color: "blue", hp: 1 }
          - { row: 3, col: 1, color: "blue", hp: 1 }
          - { row: 3, col: 3, color: "yellow", hp: 1 }
          - { row: 3, col: 5, color: "red", hp: 1 }
          - { row: 4, col: 0, color: "red", hp: 1 }
