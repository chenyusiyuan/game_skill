version: 1
project: pixel_canvas-001

rules:
  # ============ DISPATCH RULES ============
  - id: dispatch-pig
    description: "玩家点击等待槽，将小猪派出到传送带入口位置"
    trigger:
      event: "input.click-dispatch"
      condition: "click.target in wait-slot.slots && wait-slot.slots[click.slotIndex] != null"
    condition:
      - "pig = wait-slot.slots[click.slotIndex]"
      - "pig.lifecycle === 'waiting'"
      - "pig.ammo > 0"
    effect-on-true:
      logic:
        - "pig.lifecycle = 'active'"
        - "pig.onConveyor = true"
        - "pig.t = 0"
        - "pig.segmentId = 'top'"
        - "pig.gridPosition = { row: -1, col: pig.col }"
        - "wait-slot.slots[click.slotIndex] = null"
        - "conveyor.pigs.push(pig)"
      visual:
        - "scale-bounce at pig position, duration=200ms"
        - "pig sprite fade-in 150ms"
    effect-on-false:
      logic: []
      visual:
        - "wait-slot pulse-red 100ms (slot empty or pig unavailable)"
    primitive-node-ref: "pig-lifecycle"
    spec-clarification-ref: "N/A"
    testable: true
    test-hint: "Set wait-slot.slots[0] = pig, simulate click on slot-0, check pig.onConveyor === true and wait-slot.slots[0] === null"
    priority: 1

  - id: dispatch-pig-2
    description: "完成派出小猪的后续操作：设置方向、初始位置"
    trigger:
      event: "lifecycle.entered.active"
      condition: "pig.segmentId === 'top'"
    condition:
      - "pig.onConveyor === true"
    effect-on-true:
      logic:
        - "pig.direction = 'top'"
        - "pig.lastAttackGrid = null"
      visual: []
    effect-on-false:
      logic: []
      visual: []
    primitive-node-ref: "conveyor-track"
    spec-clarification-ref: "N/A"
    testable: true
    test-hint: "After dispatch-pig, check pig.direction === 'top' and pig.lastAttackGrid === null"
    priority: 2

  # ============ CONVEYOR MOTION RULES ============
  - id: conveyor-move
    description: "小猪沿传送带移动（X方向），基于 parametric-track 原语"
    trigger:
      event: "tick"
      condition: "gameState.phase === 'playing'"
    condition:
      - "for each pig in conveyor.pigs where pig.onConveyor === true"
    effect-on-true:
      logic:
        - "pig.t += pig.speed * dt"
        - "if pig.t >= 1.0: pig.t = pig.t - 1.0"
        - "position = conveyor-track.getPosition(pig.t)"
        - "pig.x = position.x"
        - "pig.gridPosition = conveyor-track.projectToGrid(pig.t)"
      visual:
        - "pig sprite moves smoothly along track"
    effect-on-false:
      logic: []
      visual: []
    primitive-node-ref: "conveyor-track"
    spec-clarification-ref: "N/A"
    testable: true
    test-hint: "After tick, check pig.t has increased, pig.x updated according to track position"
    priority: 3

  - id: conveyor-move-y
    description: "小猪沿传送带移动（Y方向），基于 parametric-track 原语"
    trigger:
      event: "tick"
      condition: "gameState.phase === 'playing'"
    condition:
      - "for each pig in conveyor.pigs where pig.onConveyor === true"
    effect-on-true:
      logic:
        - "position = conveyor-track.getPosition(pig.t)"
        - "pig.y = position.y"
      visual: []
    effect-on-false:
      logic: []
      visual: []
    primitive-node-ref: "conveyor-track"
    spec-clarification-ref: "N/A"
    testable: true
    test-hint: "After tick, check pig.y updated according to track position"
    priority: 4

  - id: conveyor-turn
    description: "小猪到达传送带角落时转向下一方向"
    trigger:
      event: "track.enter-segment"
      condition: "pig.onConveyor === true"
    condition:
      - "pig.segmentId != newSegmentId"
    effect-on-true:
      logic:
        - "pig.segmentId = newSegmentId"
        - "pig.direction = segmentDirectionMap[newSegmentId]"
      visual:
        - "pig sprite rotation changes to match new direction"
    effect-on-false:
      logic: []
      visual: []
    primitive-node-ref: "conveyor-track"
    spec-clarification-ref: "小猪到达传送带角落时立即转向，转向动画可忽略或简化为瞬移"
    testable: true
    test-hint: "Simulate pig.t crossing segment boundary (0.25, 0.5, 0.75), check pig.direction changes correctly"
    priority: 5

  # ============ POSITION ATTACK RULES ============
  - id: position-attack
    description: "小猪到达棋盘边缘某一侧的判定点时，检查正对方向的第一个目标块"
    trigger:
      event: "track.enter-segment"
      condition: "pig.onConveyor === true && pig.ammo > 0"
    condition:
      - "pig.gridPosition.row >= 0 || pig.gridPosition.col >= 0"
      - "pig.lastAttackGrid == null || pig.lastAttackGrid != pig.gridPosition"
    effect-on-true:
      logic:
        - "target = ray-cast.findFirstBlock(pig, pig.direction)"
        - "if target != null: emit ray.hit-candidate with { pig, target }"
        - "else: emit ray.miss"
        - "pig.lastAttackGrid = pig.gridPosition"
      visual:
        - "if target found: pig sprite pulse 100ms"
    effect-on-false:
      logic: []
      visual: []
    primitive-node-ref: "attack-raycast"
    spec-clarification-ref: "小猪移动到与棋盘每一行/列对齐的位置时，检查正对方向是否有目标块"
    testable: true
    test-hint: "Set pig at grid-aligned position with block in front, check target is found and pig.lastAttackGrid updated"
    priority: 6

  - id: attack-effect
    description: "攻击命中时扣减目标块耐久和小猪弹药"
    trigger:
      event: "match.hit"
      condition: "target != null && pig.ammo > 0"
    condition:
      - "target.hp > 0"
      - "target.cleared === false"
    effect-on-true:
      logic:
        - "target.hp -= 1"
        - "pig.ammo -= 1"
        - "if target.hp <= 0:"
        - "  target.cleared = true"
        - "  target.alive = false"
        - "  emit resource.target-zero with { block: target }"
        - "if pig.ammo <= 0:"
        - "  emit resource.agent-zero with { pig }"
      visual:
        - "target block tint-flash white 150ms"
        - "particle-burst at target position, count=8, color=target.color"
        - "float-text '-1' at target position"
        - "if target.hp <= 0: scale-down and fade-out 300ms"
    effect-on-false:
      logic: []
      visual: []
    primitive-node-ref: "attack-consume"
    spec-clarification-ref: "攻击后小猪继续沿传送带移动，不停止"
    testable: true
    test-hint: "Set pig.ammo=2, target.hp=1, trigger match.hit, check target.cleared=true, pig.ammo=1"
    priority: 7

  # ============ FIND BLOCK RULES (Raycast Helpers) ============
  - id: find-top-block
    description: "从上往下查找当前列第一个未消除块（pig.direction == 'top'）"
    trigger:
      event: "ray.hit-candidate-request"
      condition: "pig.direction === 'top'"
    condition:
      - "pig.gridPosition.col >= 0"
    effect-on-true:
      logic:
        - "col = pig.gridPosition.col"
        - "for row from 0 to board.rows-1:"
        - "  block = board.cells[row][col]"
        - "  if block && block.cleared === false:"
        - "    return block"
        - "return null"
      visual: []
    effect-on-false:
      logic:
        - "return null"
      visual: []
    primitive-node-ref: "attack-raycast"
    spec-clarification-ref: "N/A"
    testable: true
    test-hint: "Set blocks at (0,2), (1,2), pig at col=2 direction='top', expect find-top-block returns block at (0,2)"
    priority: 8

  - id: find-right-block
    description: "从右往左查找当前行第一个未消除块（pig.direction == 'right'）"
    trigger:
      event: "ray.hit-candidate-request"
      condition: "pig.direction === 'right'"
    condition:
      - "pig.gridPosition.row >= 0"
    effect-on-true:
      logic:
        - "row = pig.gridPosition.row"
        - "for col from board.cols-1 down to 0:"
        - "  block = board.cells[row][col]"
        - "  if block && block.cleared === false:"
        - "    return block"
        - "return null"
      visual: []
    effect-on-false:
      logic:
        - "return null"
      visual: []
    primitive-node-ref: "attack-raycast"
    spec-clarification-ref: "N/A"
    testable: true
    test-hint: "Set blocks at (2,0), (2,1), pig at row=2 direction='right', expect find-right-block returns block at (2,board.cols-1)"
    priority: 9

  - id: find-bottom-block
    description: "从下往上查找当前列第一个未消除块（pig.direction == 'bottom'）"
    trigger:
      event: "ray.hit-candidate-request"
      condition: "pig.direction === 'bottom'"
    condition:
      - "pig.gridPosition.col >= 0"
    effect-on-true:
      logic:
        - "col = pig.gridPosition.col"
        - "for row from board.rows-1 down to 0:"
        - "  block = board.cells[row][col]"
        - "  if block && block.cleared === false:"
        - "    return block"
        - "return null"
      visual: []
    effect-on-false:
      logic:
        - "return null"
      visual: []
    primitive-node-ref: "attack-raycast"
    spec-clarification-ref: "N/A"
    testable: true
    test-hint: "Set blocks at (3,2), (4,2), pig at col=2 direction='bottom', expect find-bottom-block returns block at (board.rows-1,2)"
    priority: 10

  - id: find-left-block
    description: "从左往右查找当前行第一个未消除块（pig.direction == 'left'）"
    trigger:
      event: "ray.hit-candidate-request"
      condition: "pig.direction === 'left'"
    condition:
      - "pig.gridPosition.row >= 0"
    effect-on-true:
      logic:
        - "row = pig.gridPosition.row"
        - "for col from 0 to board.cols-1:"
        - "  block = board.cells[row][col]"
        - "  if block && block.cleared === false:"
        - "    return block"
        - "return null"
      visual: []
    effect-on-false:
      logic:
        - "return null"
      visual: []
    primitive-node-ref: "attack-raycast"
    spec-clarification-ref: "N/A"
    testable: true
    test-hint: "Set blocks at (2,3), (2,4), pig at row=2 direction='left', expect find-left-block returns block at (2,0)"
    priority: 11

  # ============ RECYCLE RULES ============
  - id: slot-recycle
    description: "小猪完成一圈传送带移动且弹药未耗尽，返回等待槽"
    trigger:
      event: "track.loop-complete"
      condition: "pig.ammo > 0 && pig.lifecycle === 'active'"
    condition:
      - "pig.onConveyor === true"
      - "exists empty slot in wait-slot.slots"
    effect-on-true:
      logic:
        - "pig.lifecycle = 'returning'"
        - "pig.onConveyor = false"
        - "conveyor.pigs.remove(pig)"
        - "emptySlotIndex = find first null in wait-slot.slots"
        - "wait-slot.slots[emptySlotIndex] = pig"
        - "pig.slotIndex = emptySlotIndex"
        - "pig.t = 0"
        - "pig.segmentId = null"
        - "emit pool.bound with { pig, slotId: emptySlotIndex }"
      visual:
        - "pig sprite fade-out 200ms"
        - "wait-slot[emptySlotIndex] scale-bounce 150ms"
    effect-on-false:
      logic:
        - "pig.lifecycle = 'dead'"
        - "pig.alive = false"
        - "pig.onConveyor = false"
        - "conveyor.pigs.remove(pig)"
      visual:
        - "pig sprite fade-out 300ms"
        - "float-text 'no slot' at pig position"
    primitive-node-ref: "wait-pool"
    spec-clarification-ref: "小猪回到入口位置时判定为一圈完成"
    testable: true
    test-hint: "Set pig.t crosses 1.0, pig.ammo=2, wait-slot has empty slot, check pig returns to wait-slot"
    priority: 12

  - id: pig-expire
    description: "小猪弹药耗尽后消失，不返回等待槽"
    trigger:
      event: "resource.agent-zero"
      condition: "pig.ammo <= 0 && pig.lifecycle === 'active'"
    condition:
      - "pig.onConveyor === true"
    effect-on-true:
      logic:
        - "pig.lifecycle = 'dead'"
        - "pig.alive = false"
        - "pig.onConveyor = false"
        - "conveyor.pigs.remove(pig)"
        - "emit lifecycle.entered.dead with { pig }"
      visual:
        - "pig sprite fade-out 300ms"
        - "particle-burst at pig position, count=12, color=pig.color"
    effect-on-false:
      logic: []
      visual: []
    primitive-node-ref: "pig-lifecycle"
    spec-clarification-ref: "N/A"
    testable: true
    test-hint: "Set pig.ammo=0, trigger resource.agent-zero, check pig.alive=false and pig not in conveyor.pigs"
    priority: 13

  # ============ WIN/LOSE RULES ============
  - id: win-check
    description: "所有目标块清除，玩家胜利"
    trigger:
      event: "board.cell-removed"
      condition: "gameState.phase === 'playing'"
    condition:
      - "all blocks satisfy block.cleared === true"
      - "blocks.length > 0"
    effect-on-true:
      logic:
        - "gameState.phase = 'win'"
        - "gameState.isWin = true"
        - "emit win"
      visual:
        - "screen-shake intensity=3 duration=200ms"
        - "all blocks particle-burst simultaneously"
        - "float-text 'VICTORY!' at screen center"
    effect-on-false:
      logic: []
      visual: []
    primitive-node-ref: "end-check"
    spec-clarification-ref: "N/A"
    testable: true
    test-hint: "Set all blocks.cleared=true, trigger board.cell-removed, check gameState.phase='win'"
    priority: 14

  - id: lose-check
    description: "所有小猪耗尽，棋盘仍有目标块，玩家失败"
    trigger:
      event: "lifecycle.entered.dead"
      condition: "gameState.phase === 'playing'"
    condition:
      - "conveyor.pigs.length === 0"
      - "wait-slot.slots all null"
      - "exists block where block.cleared === false"
    effect-on-true:
      logic:
        - "gameState.phase = 'lose'"
        - "gameState.isWin = false"
        - "emit lose"
      visual:
        - "screen-shake intensity=5 duration=300ms"
        - "float-text 'GAME OVER' at screen center"
        - "all remaining blocks tint-flash red 500ms"
    effect-on-false:
      logic: []
      visual: []
    primitive-node-ref: "end-check"
    spec-clarification-ref: "N/A"
    testable: true
    test-hint: "Set conveyor empty, wait-slot empty, some blocks not cleared, trigger lifecycle.entered.dead, check gameState.phase='lose'"
    priority: 15

# ============ CONSTRAINT MAPPINGS ============
constraints:
  - id: no-global-autoaim
    enforcement:
      - rule: position-attack
        check: "attack-raycast.direction.mode === 'normal-to-track'"
      - rule: find-top-block
        check: "only searches in pig.gridPosition.col, not all columns"
      - rule: find-right-block
        check: "only searches in pig.gridPosition.row, not all rows"
      - rule: find-bottom-block
        check: "only searches in pig.gridPosition.col, not all columns"
      - rule: find-left-block
        check: "only searches in pig.gridPosition.row, not all rows"

  - id: no-multi-attack
    enforcement:
      - rule: position-attack
        check: "pig.lastAttackGrid prevents repeated attacks at same position"
      - rule: attack-effect
        check: "only affects one target per attack"

  - id: no-pierce-attack
    enforcement:
      - rule: find-top-block
        check: "returns first !cleared block, does not skip"
      - rule: find-right-block
        check: "returns first !cleared block, does not skip"
      - rule: find-bottom-block
        check: "returns first !cleared block, does not skip"
      - rule: find-left-block
        check: "returns first !cleared block, does not skip"

  - id: conveyor-required
    enforcement:
      - rule: conveyor-move
        check: "pig movement controlled by conveyor-track primitive"
      - rule: conveyor-turn
        check: "direction changes only at track segment boundaries"

  - id: slot-recycle-required
    enforcement:
      - rule: slot-recycle
        check: "pig with ammo > 0 returns to wait-slot after loop complete"

# ============ SPEC CLARIFICATION SUMMARY ============
spec-clarifications-applied:
  - rule: position-attack
    clarification: "小猪移动到与棋盘每一行/列对齐的位置时，检查正对方向是否有目标块"
    implemented-as: "trigger on track.enter-segment with grid alignment check"

  - rule: attack-effect
    clarification: "攻击后小猪继续沿传送带移动，不停止"
    implemented-as: "no state change to pig movement, only ammo/attack tracking"

  - rule: slot-recycle
    clarification: "小猪回到入口位置时判定为一圈完成"
    implemented-as: "trigger on track.loop-complete (t wraps around 1.0)"

  - rule: conveyor-turn
    clarification: "小猪到达传送带角落时立即转向，转向动画可忽略或简化为瞬移"
    implemented-as: "instant direction change on segment boundary, no animation required"
