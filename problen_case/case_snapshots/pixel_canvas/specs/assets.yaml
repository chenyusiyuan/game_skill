# pixel_canvas Assets Specification
# Generated by game-gameplay-expander (Phase 3)

# ── Genre & Style ─────────────────────────────────────────────────
genre: board-grid
color-scheme:
  palette-id: pixel-retro
  fx-hint: pixel
  theme-keywords: [像素, 像素风, 传送带, 小猪, 颜色匹配, 益智, 清板, 休闲]
  primary: "#ef4444"
  secondary: "#facc15"
  accent: "#22c55e"
  background: "#1a1a2e"
  surface: "#16213e"
  text: "#e2e8f0"
  text-muted: "#94a3b8"
  success: "#22c55e"
  error: "#ef4444"
  border: "#334155"
  font-family: '"Press Start 2P", "VT323", monospace'
  border-radius: "0"
  shadow: "2px 2px 0 #000"
  extra-colors: ["#ef4444", "#3b82f6", "#eab308", "#22c55e"]
asset-style: pixel-retro

# ── Images ─────────────────────────────────────────────────────────
# PRD asset-strategy.mode = generated-only
# visual-core-entities: pig, block - 都是颜色单位，需要程序化生成
images:
  # ── 核心玩法实体（颜色单位，程序化生成）──
  - id: pig
    source: generated
    type: generated
    binding-to: pig
    visual-primitive: color-unit
    color-source: entity.color
    usage: "小猪单位（像素矩形+耳朵形状，颜色由 entity.color 决定）"
    description: "像素风小猪：16x16px 矩形主体 + 两个 4x4px 耳朵，使用 color-source 着色"

  - id: block
    source: generated
    type: generated
    binding-to: block
    visual-primitive: color-block
    color-source: entity.color
    usage: "目标块（纯色方块，颜色由 entity.color 决定）"
    description: "像素风色块：32x32px 纯色格子，带 2px 深色描边，颜色来自 @entity(block).color"

  # ── UI 按钮（使用 ui-pixel-adventure 素材）──
  - id: btn-start
    source: assets/library_2d/ui-pixel/tile_0013.png
    type: local-file
    binding-to: start-btn
    visual-primitive: ui-button
    usage: "开始按钮左端（与 tile_0014 + tile_0015 拼成完整按钮）"

  - id: btn-start-center
    source: assets/library_2d/ui-pixel/tile_0014.png
    type: local-file
    binding-to: start-btn
    visual-primitive: ui-button
    usage: "开始按钮中段（可重复拼接）"

  - id: btn-start-right
    source: assets/library_2d/ui-pixel/tile_0015.png
    type: local-file
    binding-to: start-btn
    visual-primitive: ui-button
    usage: "开始按钮右端"

  - id: btn-retry
    source: assets/library_2d/ui-pixel/tile_0013.png
    type: local-file
    binding-to: retry-btn
    visual-primitive: ui-button
    usage: "重试按钮左端"

  - id: btn-retry-center
    source: assets/library_2d/ui-pixel/tile_0014.png
    type: local-file
    binding-to: retry-btn
    visual-primitive: ui-button
    usage: "重试按钮中段"

  - id: btn-retry-right
    source: assets/library_2d/ui-pixel/tile_0015.png
    type: local-file
    binding-to: retry-btn
    visual-primitive: ui-button
    usage: "重试按钮右端"

  - id: btn-next
    source: assets/library_2d/ui-pixel/tile_0013.png
    type: local-file
    binding-to: next-btn
    visual-primitive: ui-button
    usage: "下一关按钮左端"

  - id: btn-next-center
    source: assets/library_2d/ui-pixel/tile_0014.png
    type: local-file
    binding-to: next-btn
    visual-primitive: ui-button
    usage: "下一关按钮中段"

  - id: btn-next-right
    source: assets/library_2d/ui-pixel/tile_0015.png
    type: local-file
    binding-to: next-btn
    visual-primitive: ui-button
    usage: "下一关按钮右端"

  # ── UI 面板（使用 ui-pixel-adventure 深色面板）──
  - id: panel-dark-tl
    source: assets/library_2d/ui-pixel/tile_0022.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-panel
    usage: "深色面板左上角（用于信息框/槽位背景）"

  - id: panel-dark-top
    source: assets/library_2d/ui-pixel/tile_0023.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-panel
    usage: "深色面板顶边"

  - id: panel-dark-tr
    source: assets/library_2d/ui-pixel/tile_0024.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-panel
    usage: "深色面板右上角"

  - id: panel-dark-left
    source: assets/library_2d/ui-pixel/tile_0025.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-panel
    usage: "深色面板左边"

  - id: panel-dark-center
    source: assets/library_2d/ui-pixel/tile_0026.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-panel
    usage: "深色面板中心"

  - id: panel-dark-right
    source: assets/library_2d/ui-pixel/tile_0027.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-panel
    usage: "深色面板右边"

  - id: panel-dark-bl
    source: assets/library_2d/ui-pixel/tile_0028.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-panel
    usage: "深色面板左下角"

  - id: panel-dark-bottom
    source: assets/library_2d/ui-pixel/tile_0029.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-panel
    usage: "深色面板底边"

  - id: panel-dark-br
    source: assets/library_2d/ui-pixel/tile_0030.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-panel
    usage: "深色面板右下角"

  # ── HUD 数字（用于显示关卡/分数/小猪数量）──
  - id: digit-0
    source: assets/library_2d/ui-pixel/tile_0063.png
    type: local-file
    binding-to: hud-level
    visual-primitive: ui-readout
    usage: "像素数字 0"

  - id: digit-1
    source: assets/library_2d/ui-pixel/tile_0064.png
    type: local-file
    binding-to: hud-level
    visual-primitive: ui-readout
    usage: "像素数字 1"

  - id: digit-2
    source: assets/library_2d/ui-pixel/tile_0065.png
    type: local-file
    binding-to: hud-level
    visual-primitive: ui-readout
    usage: "像素数字 2"

  - id: digit-3
    source: assets/library_2d/ui-pixel/tile_0066.png
    type: local-file
    binding-to: hud-level
    visual-primitive: ui-readout
    usage: "像素数字 3"

  - id: digit-4
    source: assets/library_2d/ui-pixel/tile_0067.png
    type: local-file
    binding-to: hud-level
    visual-primitive: ui-readout
    usage: "像素数字 4"

  - id: digit-5
    source: assets/library_2d/ui-pixel/tile_0068.png
    type: local-file
    binding-to: hud-level
    visual-primitive: ui-readout
    usage: "像素数字 5"

  - id: digit-6
    source: assets/library_2d/ui-pixel/tile_0069.png
    type: local-file
    binding-to: hud-level
    visual-primitive: ui-readout
    usage: "像素数字 6"

  - id: digit-7
    source: assets/library_2d/ui-pixel/tile_0070.png
    type: local-file
    binding-to: hud-level
    visual-primitive: ui-readout
    usage: "像素数字 7"

  - id: digit-8
    source: assets/library_2d/ui-pixel/tile_0071.png
    type: local-file
    binding-to: hud-level
    visual-primitive: ui-readout
    usage: "像素数字 8"

  - id: digit-9
    source: assets/library_2d/ui-pixel/tile_0072.png
    type: local-file
    binding-to: hud-level
    visual-primitive: ui-readout
    usage: "像素数字 9"

  # ── 背景与装饰（程序化生成）──
  - id: board-bg
    source: generated
    type: generated
    binding-to: board
    visual-primitive: background
    usage: "棋盘背景网格（深色底 + 网格线）"
    description: "使用 color-scheme.background (#1a1a2e) 填充，叠加 1px 网格线"

  - id: conveyor-track
    source: generated
    type: generated
    binding-to: conveyor
    visual-primitive: track
    usage: "传送带轨道（四周环形，带方向指示箭头）"
    description: "使用 color-scheme.border (#334155) 绘制轨道线"

  - id: wait-slot-bg
    source: generated
    type: generated
    binding-to: wait-slots
    visual-primitive: background
    usage: "等待槽背景（5个槽位的容器）"
    description: "使用深色面板九宫格拼接"

# ── Audio ───────────────────────────────────────────────────────────
# PRD: "不含音效（可选后续添加）"
# 但仍提供基础 UI 音效以提升体验
audio:
  - id: sfx-click
    source: assets/library_2d/audio/ui-clicks/click1.ogg
    type: local-file
    binding-to: decor
    usage: "按钮点击音效"

  - id: sfx-dispatch
    source: assets/library_2d/audio/ui-interface/select_003.ogg
    type: local-file
    binding-to: decor
    usage: "派出小猪音效"

  - id: sfx-attack
    source: assets/library_2d/audio/sfx/sfx_bump.ogg
    type: local-file
    binding-to: decor
    usage: "攻击命中音效"

  - id: sfx-clear
    source: assets/library_2d/audio/ui-interface/confirmation_002.ogg
    type: local-file
    binding-to: decor
    usage: "消除目标块音效"

  - id: sfx-win
    source: assets/library_2d/audio/ui-interface/confirmation_001.ogg
    type: local-file
    binding-to: decor
    usage: "胜利音效"

  - id: sfx-lose
    source: assets/library_2d/audio/ui-interface/error_004.ogg
    type: local-file
    binding-to: decor
    usage: "失败音效"

# ── Fonts ───────────────────────────────────────────────────────────
fonts:
  - family: "Press Start 2P"
    source: google-fonts
    type: external
    binding-to: decor
    usage: "像素风标题字体（HTML 默认备选）"
    fallback: "monospace"

  - family: "Kenney Future"
    source: assets/library_2d/fonts/Kenney Future.ttf
    type: local-file
    binding-to: decor
    usage: "像素风 UI 字体（备选）"

# ── Spritesheets ────────────────────────────────────────────────────
spritesheets: []

# ── Color Palette ────────────────────────────────────────────────────
# 从 PRD color-scheme 复制，作为程序化生成的颜色源
color-palette:
  # 四种游戏玩法颜色（对应 @entity(pig).color 和 @entity(block).color）
  red: "#ef4444"
  blue: "#3b82f6"
  yellow: "#eab308"
  green: "#22c55e"
  # UI 颜色
  primary: "#ef4444"
  secondary: "#facc15"
  accent: "#22c55e"
  # 场景颜色
  background: "#1a1a2e"
  surface: "#16213e"
  # 文字颜色
  text: "#e2e8f0"
  text-muted: "#94a3b8"
  # 状态颜色
  success: "#22c55e"
  error: "#ef4444"
  border: "#334155"

# ── Selection Report ─────────────────────────────────────────────────
selection-report:
  genre: board-grid
  asset-style: pixel-retro
  prd-strategy-mode: generated-only

  candidate-packs:
    - id: ui-pixel-adventure
      used: true
      reason: "pixel-retro + board-grid 首选 UI 包，取按钮/面板/数字等 UI 组件"

    - id: audio-ui-clicks
      used: true
      reason: "UI 点击音效"

    - id: audio-ui-interface
      used: true
      reason: "交互反馈音效（确认/错误/选择）"

    - id: audio-sfx
      used: true
      reason: "游戏音效（碰撞/攻击）"

    - id: tiles-dungeon
      used: false
      reason: "语义不匹配（非地牢主题，且 block 是抽象色块需要程序化生成）"

    - id: tiles-town
      used: false
      reason: "语义不匹配（非城镇模拟）"

    - id: sprites-platformer
      used: false
      reason: "风格不匹配（非平台跳跃，且小猪需要颜色自定义）"

    - id: sprites-puzzle
      used: false
      reason: "球/宝石元素不适合小猪造型，且需要颜色动态控制"

    - id: game-icons
      used: false
      reason: "暂不需要通用图标（可后续扩展）"

    - id: board-game-icons
      used: false
      reason: "暂不需要桌游图标（骰子/棋子等）"

  local-file-ratio:
    images: 0.70
    audio: 1.00
    fonts: 0.50
    threshold:
      images: 0.30
      audio: 0.30
      fonts: 0.00

  fallback-reasons:
    - id: pig
      type: generated
      reason: "抽象 color-unit 需要程序化生成，颜色来自 entity.color 字段"

    - id: block
      type: generated
      reason: "抽象 color-block 需要程序化生成，颜色来自 entity.color 字段"

    - id: board-bg
      type: generated
      reason: "棋盘背景需要动态渲染，程序化绘制网格"

    - id: conveyor-track
      type: generated
      reason: "传送带轨道需要程序化绘制，适配棋盘尺寸"

    - id: wait-slot-bg
      type: generated
      reason: "等待槽背景使用面板九宫格拼接，需要程序化组装"

    - id: Press Start 2P
      type: external
      reason: "Google Fonts 远程字体（允许，非运行时拉取资源，HTML 字体声明）"

  asset-strategy-notes: |
    PRD asset-strategy.mode = generated-only 明确要求：
    1. pig 和 block 是颜色单位，颜色来自 entity.color 字段
    2. 像素风格可用程序化绘制方块+简单图形实现核心玩法
    3. 小猪用简单像素矩形+耳朵形状表示，目标块用颜色方块表示
    4. 纯生成方案足够支撑玩法，不需要外部素材库

    因此：
    - visual-core-entities (pig, block) 使用 generated + visual-primitive
    - UI 组件（按钮/面板/数字）使用 ui-pixel-adventure 本地素材
    - 音效使用 library_2d/audio 本地素材
    - local-file 占比: images 70% (21/30), audio 100% (6/6), fonts 50% (1/2)
