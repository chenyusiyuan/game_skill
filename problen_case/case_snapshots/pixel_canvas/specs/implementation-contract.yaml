contract-version: 1
runtime:
  engine: canvas
  run-mode: file
boot:
  entry-scene: start
  ready-condition: window.gameState.phase === 'ready'
  start-action:
    trigger: click
    target: start-btn
    result: phase -> playing; scene -> play
  scene-transitions:
    - from: start
      to: play
      trigger: click start-btn
      guard: phase === 'ready'
    - from: play
      to: result
      trigger: phase === 'win' || phase === 'lose'
      guard: null
    - from: result
      to: play
      trigger: click retry-btn
      guard: null
    - from: result
      to: play
      trigger: click next-btn
      guard: state.level < 3
