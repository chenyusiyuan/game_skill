    section: images
    role: core-visual
    asset-kind: generated-surface
    type: graphics-generated
    source: generated
    binding-to: pig
    visual-primitive: color-unit
    color-source: entity.color
    render-as: procedural-surface
    text-bearing: false
    must-render: true
    allow-fallback: false
    consumer: null
