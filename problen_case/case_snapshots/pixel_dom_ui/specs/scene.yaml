scenes:
  - id: start
    layout:
      viewport: "full"
      board-bbox: "none"
      hud-bbox: "none"
      safe-area: { x: "10%", y: "10%", width: "80%", height: "80%" }
      preset: center-single
    zones:
      - id: title-area
        shape: rect
        geometry: { x: "50%", y: "30%", width: "80%", height: "auto" }
      - id: start-btn
        shape: rect
        geometry: { x: "50%", y: "65%", width: 200, height: 60 }
    ui-slots:
      - { id: title-text, position: center, binds: "config.title" }
      - { id: start-btn-ui, position: center, binds: "@ui(start-btn)" }
    state-on-enter: idle
    enter-transition:
      type: fade-in
      duration: 400
    exit-transition:
      type: fade-out
      duration: 300
    enter-sequence:
      - { target: title-area, delay: 0, animation: "scale-bounce" }
      - { target: start-btn, delay: 200, animation: "fade-slide-up" }

  - id: play
    layout:
      viewport: "full"
      board-bbox: { x: "10%", y: "15%", width: "80%", height: "60%" }
      hud-bbox: { x: 0, y: 0, width: "100%", height: "10%" }
      safe-area: { x: "2%", y: "2%", width: "96%", height: "96%" }
      preset: vertical-stack
    zones:
      - id: hud-area
        shape: rect
        geometry: { x: "50%", y: "5%", width: "96%", height: "8%" }
      - id: board-area
        shape: rect
        geometry: { x: "50%", y: "45%", width: "80%", height: "55%" }
      - id: conveyor-top
        shape: rect
        geometry: { x: "50%", y: "15%", width: "80%", height: "5%" }
      - id: conveyor-right
        shape: rect
        geometry: { x: "90%", y: "45%", width: "5%", height: "55%" }
      - id: conveyor-bottom
        shape: rect
        geometry: { x: "50%", y: "75%", width: "80%", height: "5%" }
      - id: conveyor-left
        shape: rect
        geometry: { x: "10%", y: "45%", width: "5%", height: "55%" }
      - id: wait-slots-area
        shape: rect
        geometry: { x: "50%", y: "90%", width: "90%", height: "8%" }
    ui-slots:
      - { id: hud-timer, position: top-left, binds: "state.elapsedTime" }
      - { id: hud-score, position: top-center, binds: "state.score" }
      - { id: hud-level, position: top-right, binds: "state.level" }
      - { id: board, position: center, binds: "@ui(board)" }
      - { id: conveyor, position: around-board, binds: "@ui(conveyor)" }
      - { id: wait-slots, position: bottom, binds: "@ui(wait-slots)" }
    state-on-enter: ready
    enter-transition:
      type: fade-in
      duration: 300
    exit-transition:
      type: fade-out
      duration: 300
    enter-sequence:
      - { target: hud-area, delay: 0, animation: "fade-in" }
      - { target: board-area, delay: 100, animation: "fade-in" }
      - { target: conveyor-top, delay: 150, animation: "fade-in" }
      - { target: conveyor-right, delay: 150, animation: "fade-in" }
      - { target: conveyor-bottom, delay: 150, animation: "fade-in" }
      - { target: conveyor-left, delay: 150, animation: "fade-in" }
      - { target: wait-slots-area, delay: 200, animation: "fade-slide-up" }

  - id: result
    layout:
      viewport: "full"
      board-bbox: "none"
      hud-bbox: "none"
      safe-area: { x: "10%", y: "20%", width: "80%", height: "60%" }
      preset: center-single
    zones:
      - id: result-panel
        shape: rect
        geometry: { x: "50%", y: "40%", width: "70%", height: "auto" }
      - id: result-title-area
        shape: rect
        geometry: { x: "50%", y: "25%", width: "80%", height: "auto" }
      - id: result-score-area
        shape: rect
        geometry: { x: "50%", y: "45%", width: "60%", height: "auto" }
      - id: retry-btn
        shape: rect
        geometry: { x: "35%", y: "70%", width: 120, height: 50 }
      - id: next-btn
        shape: rect
        geometry: { x: "65%", y: "70%", width: 120, height: 50 }
    ui-slots:
      - { id: result-title, position: top-center, binds: "state.isWin ? '胜利!' : '失败!'" }
      - { id: final-score, position: center, binds: "state.score" }
      - { id: retry-btn-ui, position: bottom-left, binds: "@ui(retry-btn)" }
      - { id: next-btn-ui, position: bottom-right, binds: "@ui(next-btn)" }
    state-on-enter: idle
    enter-transition:
      type: fade-in
      duration: 500
    exit-transition:
      type: fade-out
      duration: 300
    enter-sequence:
      - { target: result-title-area, delay: 0, animation: "scale-bounce" }
      - { target: result-score-area, delay: 300, animation: "count-up" }
      - { target: retry-btn, delay: 600, animation: "fade-slide-up" }
      - { target: next-btn, delay: 700, animation: "fade-slide-up" }

# 启动契约（codegen 必须严格遵守，verify 据此校验）
boot-contract:
  entry-scene: start
  ready-condition: "window.gameState.phase === 'ready'"
  start-action:
    trigger: click
    target: start-btn
    result: "phase -> playing; scene -> play"
  scene-transitions:
    - from: start
      to: play
      trigger: "click start-btn"
      guard: "phase === 'ready'"
    - from: play
      to: result
      trigger: "phase === 'win' || phase === 'lose'"
      guard: null
    - from: result
      to: play
      trigger: "click retry-btn"
      guard: null
    - from: result
      to: play
      trigger: "click next-btn"
      guard: "state.level < 3"
