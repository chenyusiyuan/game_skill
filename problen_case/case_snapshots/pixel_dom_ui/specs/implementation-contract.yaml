contract-version: 1
runtime:
  engine: dom-ui
  run-mode: file
boot:
  entry-scene: start
  ready-condition: window.gameState.phase === 'ready'
  start-action:
    trigger: click
    target: start-btn
    result: phase -> playing; scene -> play
  scene-transitions:
    - from: start
      to: play
      trigger: click start-btn
      guard: phase === 'ready'
    - from: play
      to: result
      trigger: phase === 'win' || phase === 'lose'
      guard: null
    - from: result
      to: play
      trigger: click retry-btn
      guard: null
    - from: result
      to: play
      trigger: click next-btn
      guard: state.level < 3
asset-bindings:
  - id: block
    section: images
    role: color-block
    asset-kind: generated-surface
    type: graphics-generated
    source: generated
    binding-to: block
    visual-primitive: color-block
    color-source: entity.color
    render-as: procedural-surface
    text-bearing: false
    must-render: true
    allow-fallback: false
    consumer: null
  - id: pig
    section: images
    role: core-visual
    asset-kind: generated-surface
    type: graphics-generated
    source: inline-emoji
    binding-to: pig
    visual-primitive: color-unit
    color-source: entity.color
    render-as: procedural-surface
    text-bearing: false
    must-render: true
    allow-fallback: false
