engine-lifecycle:
  asset-loading: queue-in-preload
  forbid:
    - scene.load.start-in-create
    - missing-texture-as-success
    - silent-asset-fallback
verification:
  required-runtime-evidence:
    - gameState-exposed
    - no-project-asset-http-errors
    - required-local-assets-loaded
    - required-local-assets-consumed
  required-test-hooks:
    - clickStartButton
  report-policy: verifier-json-only
