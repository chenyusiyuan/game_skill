# gameState initial value definition (codegen must copy this fully into window.gameState)
# Generated from GamePRD @state/@entity/@resource/@level definitions

initial-state:
  # Scene and phase state
  currentScene: "start"
  phase: "ready"           # ready | playing | win | lose
  gameOver: false
  isProcessing: false      # async lock for animations

  # Level and score
  level: 1
  score: 0
  unlockedLevels: [1]      # Levels unlocked by player

  # Level-specific state (reset on each level start)
  timeElapsed: 0

  # Conveyor state
  conveyorCapacity: 4
  conveyorPigs: []         # Array of pig entities currently on conveyor

  # Waiting slots (5 slots, each can hold a pig or null)
  waitingSlots: [null, null, null, null, null]

  # Board state (grid of blocks)
  gridWidth: 5
  gridHeight: 5
  blocks: []               # Array of block entities

  # Selection state
  selectedPigIndex: null   # Index of pig selected from waiting slot

  # Stats for current level
  totalAttacks: 0
  successfulAttacks: 0

# Entity schemas
entities:
  pig:
    type: unit
    fields:
      id:
        type: string
        description: "Unique identifier for this pig"
      color:
        type: enum
        values: [red, blue, yellow, green]
        description: "Pig color, determines which blocks it can attack"
      ammo:
        type: int
        description: "Remaining attack count, pig disappears when 0"
      position:
        type: enum
        values: [waiting, conveyor]
        description: "Current position type"
      conveyorSlot:
        type: int
        description: "Position index on conveyor (-1 if not on conveyor)"
      waitingSlotIndex:
        type: int
        description: "Index in waitingSlots array (-1 if not in waiting)"
    example:
      id: "pig-001"
      color: "red"
      ammo: 2
      position: "waiting"
      conveyorSlot: -1
      waitingSlotIndex: 0

  block:
    type: tile
    fields:
      id:
        type: string
        description: "Unique identifier for this block"
      color:
        type: enum
        values: [red, blue, yellow, green]
        description: "Block color"
      hp:
        type: int
        description: "Hit points, normal=1, reinforced>=2"
      gridX:
        type: int
        description: "Grid X coordinate"
      gridY:
        type: int
        description: "Grid Y coordinate"
      cleared:
        type: bool
        description: "Whether block has been cleared"
    example:
      id: "block-001"
      color: "red"
      hp: 1
      gridX: 0
      gridY: 0
      cleared: false

  conveyor:
    type: prop
    fields:
      capacity:
        type: int
        description: "Maximum pigs on conveyor"
      pigs:
        type: array
        itemType: pig
        description: "Pigs currently on conveyor"
      speed:
        type: float
        description: "Movement speed (positions per second)"
      totalSlots:
        type: int
        description: "Total discrete positions on conveyor (4 edges x 8 = 32)"
    example:
      capacity: 4
      pigs: []
      speed: 1.0
      totalSlots: 32

  waiting-slot:
    type: prop
    fields:
      slots:
        type: array
        itemType: pig
        description: "5 slots for pigs waiting to be dispatched"
      capacity:
        type: int
        description: "Maximum slot count (fixed 5)"
    example:
      slots: [null, null, null, null, null]
      capacity: 5

# Resource data
resources:
  - id: color-blocks
    schema:
      id:
        type: string
      color:
        type: enum
        values: [red, blue, yellow, green]
      spriteKey:
        type: string
        description: "Phaser texture key for this color block"
    examples:
      - { id: "block-red", color: "red", spriteKey: "block_red" }
      - { id: "block-blue", color: "blue", spriteKey: "block_blue" }
      - { id: "block-yellow", color: "yellow", spriteKey: "block_yellow" }
      - { id: "block-green", color: "green", spriteKey: "block_green" }

  - id: pig-sprites
    schema:
      id:
        type: string
      color:
        type: enum
        values: [red, blue, yellow, green]
      spriteKey:
        type: string
        description: "Phaser texture key for this pig color"
    examples:
      - { id: "pig-red", color: "red", spriteKey: "pig_red" }
      - { id: "pig-blue", color: "blue", spriteKey: "pig_blue" }
      - { id: "pig-yellow", color: "yellow", spriteKey: "pig_yellow" }
      - { id: "pig-green", color: "green", spriteKey: "pig_green" }

# Level configurations
levels:
  - id: level-1
    difficulty: easy
    params:
      colors: 2
      gridSize: [5, 5]
      blockCount: 15
      pigCount: 8
      conveyorCapacity: 4
      reinforcedBlocks: 0
    colorSet: [red, blue]
    pigDistribution:
      red: 4
      blue: 4
    pigAmmoRange: [2, 3]
    unlockAfter: null

  - id: level-2
    difficulty: medium
    params:
      colors: 3
      gridSize: [6, 6]
      blockCount: 25
      pigCount: 12
      conveyorCapacity: 4
      reinforcedBlocks: 3
    colorSet: [red, blue, yellow]
    pigDistribution:
      red: 4
      blue: 4
      yellow: 4
    pigAmmoRange: [2, 3]
    reinforcedHp: 2
    unlockAfter: level-1

  - id: level-3
    difficulty: hard
    params:
      colors: 4
      gridSize: [7, 7]
      blockCount: 35
      pigCount: 16
      conveyorCapacity: 4
      reinforcedBlocks: 7
    colorSet: [red, blue, yellow, green]
    pigDistribution:
      red: 4
      blue: 4
      yellow: 4
      green: 4
    pigAmmoRange: [2, 3]
    reinforcedHp: [2, 2, 2, 2, 2, 3, 3]  # 5 blocks with hp=2, 2 blocks with hp=3
    unlockAfter: level-2

# Level data generators (for codegen to create actual level content)
level-generators:
  - id: generate-blocks
    description: "Generate block entities for a level"
    input: level config
    output: array of block entities
    algorithm: |
      1. Parse gridSize and blockCount from level config
      2. Randomly distribute blocks across grid
      3. Assign colors from colorSet (roughly equal distribution)
      4. Assign hp based on reinforcedBlocks count

  - id: generate-pigs
    description: "Generate pig entities for a level"
    input: level config
    output: array of pig entities
    algorithm: |
      1. Parse pigCount and pigDistribution from level config
      2. Create pigs with assigned colors
      3. Randomly assign ammo from pigAmmoRange
      4. Place pigs into waitingSlots (first N slots)

# Balance check (must validate supply >= demand for each level)
balance-check:
  levels:
    - id: level-1
      supply:
        description: "8 pigs x average 2.5 ammo = 20 total attacks"
        formula: "sum(pig.ammo for pig in initialPigs)"
        value: 20
        breakdown: "8 pigs, each with 2-3 ammo (avg 2.5)"
      demand:
        description: "15 blocks x 1 hp = 15 total hp to clear"
        formula: "sum(block.hp for block in blocks)"
        value: 15
        breakdown: "15 blocks, all with hp=1"
      verdict: "PASS"
      margin: "25% extra capacity"
      notes: "Sufficient margin for player mistakes and color mismatch situations"

    - id: level-2
      supply:
        description: "12 pigs x average 2.5 ammo = 30 total attacks"
        formula: "sum(pig.ammo for pig in initialPigs)"
        value: 30
        breakdown: "12 pigs, each with 2-3 ammo (avg 2.5)"
      demand:
        description: "22 normal blocks + 3 reinforced blocks x 2 hp = 28 total hp"
        formula: "sum(block.hp for block in blocks)"
        value: 28
        breakdown: "22 blocks with hp=1, 3 blocks with hp=2"
      verdict: "PASS"
      margin: "7% extra capacity"
      notes: "Tighter margin requires better color matching strategy"

    - id: level-3
      supply:
        description: "16 pigs x average 2.5 ammo = 40 total attacks"
        formula: "sum(pig.ammo for pig in initialPigs)"
        value: 40
        breakdown: "16 pigs, each with 2-3 ammo (avg 2.5)"
      demand:
        description: "28 normal blocks + 5 blocks x 2 hp + 2 blocks x 3 hp = 39 total hp"
        formula: "sum(block.hp for block in blocks)"
        value: 39
        breakdown: "28 blocks with hp=1, 5 blocks with hp=2, 2 blocks with hp=3"
      verdict: "PASS"
      margin: "2.5% extra capacity"
      notes: "Very tight margin - optimal color matching required. Consider increasing pig ammo slightly."

# Color palette reference (from PRD color-scheme)
color-palette:
  colors:
    red: "#ef4444"
    blue: "#3b82f6"
    yellow: "#facc15"
    green: "#22c55e"
  theme:
    primary: "#ef4444"
    secondary: "#facc15"
    accent: "#22c55e"
    background: "#1a1a2e"
    surface: "#16213e"
    text: "#e2e8f0"

# Conveyor system configuration
conveyor-config:
  edges: 4                  # Top, Right, Bottom, Left
  positionsPerEdge: 8       # 8 discrete positions per edge
  totalSlots: 32            # 4 edges x 8 positions
  speed: 1.0                # Positions per second
  attackTriggerPositions:   # Positions where attack check triggers
    - edge: top
      positions: [0, 1, 2, 3, 4, 5, 6, 7]  # All positions on top edge
    - edge: right
      positions: [8, 9, 10, 11, 12, 13, 14, 15]
    - edge: bottom
      positions: [16, 17, 18, 19, 20, 21, 22, 23]
    - edge: left
      positions: [24, 25, 26, 27, 28, 29, 30, 31]
  # Direction mapping for attack targeting
  attackDirections:
    top: { axis: "y", direction: 1, description: "Attack downward in column" }
    right: { axis: "x", direction: -1, description: "Attack leftward in row" }
    bottom: { axis: "y", direction: -1, description: "Attack upward in column" }
    left: { axis: "x", direction: 1, description: "Attack rightward in row" }
