# Rule Specification: pixel_phaser-001
# Generated by game-gameplay-expander
# References: spec-clarifications.md, mechanics.yaml

rules:
  # ========================================
  # PRIORITY 1: 玩家主动操作
  # ========================================

  - id: dispatch-pig
    description: "玩家点击等待槽中的小猪，将其派入传送带"
    spec-clarification-ref: "A3: 回收槽位选择（派出时从等待槽移除）"
    trigger:
      event: input.click-pig
      condition: |
        clickedPig.lifecycle === 'waiting'
        && conveyor-gate.active.length < conveyor-gate.capacity
    condition:
      logic:
        - "waiting-pool-manager.hasPig(clickedPig.id)"
        - "conveyor-capacity.canAdmit()"
    effect-on-true:
      logic:
        - primitive-node-ref: conveyor-capacity
        - "conveyor-gate.active.push(clickedPig)"
        - primitive-node-ref: pig-lifecycle
        - "clickedPig.lifecycle = 'active'"
        - "waiting-pool-manager.unbind(clickedPig)"
      visual:
        - "pig sprite moves from waiting-slot to conveyor start position"
        - "scale-bounce on pig sprite (duration: 200ms)"
        - "waiting-slot icon fades out"
    effect-on-false:
      logic:
        - "if conveyor-gate.active.length >= conveyor-gate.capacity: emit capacity.blocked"
      visual:
        - "if capacity full: pulse-red on conveyor area (duration: 300ms)"
        - "play sfx-error"
    testable: true
    test-hint: "通过 window.gameState.pigs 模拟点击，检查 conveyor-gate.active.length 和 pig.lifecycle"

  - id: dispatch-cleanup
    description: "派出小猪后，清理等待槽中的槽位引用"
    spec-clarification-ref: "A3: 回收槽位选择（从左到右遍历）"
    trigger:
      event: pool.unbound
      condition: "event.pigId exists"
    condition:
      logic:
        - "waiting-pool-manager.hasSlotFor(event.pigId)"
    effect-on-true:
      logic:
        - primitive-node-ref: waiting-pool-manager
        - "# 自动由 slot-pool.unbind 处理，无需额外逻辑"
      visual: []
    effect-on-false:
      logic: []
      visual: []
    testable: true
    test-hint: "检查 waiting-pool-manager.slots 中对应槽位是否为 null"
    primitive-node-ref-reason: "由 slot-pool.unbind 自动处理，mechanics 中已映射"

  # ========================================
  # PRIORITY 0: 持续更新（每帧）
  # ========================================

  - id: conveyor-move
    description: "传送带上的小猪持续沿轨道移动"
    spec-clarification-ref: "A1: 传送带离散化；A5: 传送带容量与位置数"
    trigger:
      event: tick@update
      condition: "game.phase === 'playing'"
    condition:
      logic:
        - "conveyor-gate.active.length > 0"
    effect-on-true:
      logic:
        - primitive-node-ref: conveyor-track
        - "for each pig in conveyor-gate.active:"
        - "  pig.t = (pig.t + pig.speed * dt) % 1.0"
        - "  if pig.t crosses segment boundary: emit track.enter-segment"
      visual:
        - "update pig sprite position based on track.t"
    effect-on-false:
      logic: []
      visual: []
    testable: true
    test-hint: "手动设置 pig.t 和 speed，dt=16ms，检查 t 是否按预期更新"

  # ========================================
  # PRIORITY 2: 攻击判定
  # ========================================

  - id: attack-check
    description: "小猪移动到棋盘边缘位置时，检查正对方向是否存在同色目标块"
    spec-clarification-ref: "A1: 传送带离散化；A2: 攻击触发时机（离散位置触发）"
    trigger:
      event: track.enter-segment
      condition: "pig.lifecycle === 'active' && pig.ammo > 0"
    condition:
      logic:
        - primitive-node-ref: attack-raycast
        - "ray-cast from pig.gridPosition in normal-to-track direction"
        - "stop-on: first-hit"
    effect-on-true:
      logic:
        - primitive-node-ref: attack-raycast
        - "if ray.hit-candidate: emit ray.hit-candidate"
        - "else: emit ray.miss"
      visual:
        - "if hit: highlight hit block briefly (tint-flash white 100ms)"
        - "if miss: continue movement without interruption"
    effect-on-false:
      logic:
        - "emit ray.miss"
      visual: []
    testable: true
    test-hint: "设置 pig 在 top segment，gridPosition.col=0，前方有 block，检查 ray.hit-candidate"

  # ========================================
  # PRIORITY 3: 攻击执行
  # ========================================

  - id: attack-exec
    description: "执行攻击：消耗弹药，减少目标块血量"
    spec-clarification-ref: "A4: 同帧结算顺序（攻击判定→执行→弹药检查）"
    trigger:
      event: match.hit
      condition: "pig.ammo > 0 && target.hp > 0"
    condition:
      logic:
        - primitive-node-ref: color-match
        - "pig.color === target.color"
    effect-on-true:
      logic:
        - primitive-node-ref: attack-consume
        - "pig.ammo -= 1"
        - "target.hp -= 1"
        - "if target.hp <= 0:"
        - "  target.alive = false"
        - "  emit resource.target-zero"
        - "if pig.ammo <= 0:"
        - "  emit resource.agent-zero"
        - "  pig.lifecycle = 'returning'"
      visual:
        - "particle-burst at target position (color: pig.color, count: 8)"
        - "float-text '-1' at target position"
        - "target block scale-bounce (duration: 150ms)"
        - "if target.hp <= 0: target fade-out (duration: 300ms)"
        - "pig sprite play attack animation"
    effect-on-false:
      logic:
        - "emit match.miss"
      visual:
        - "pig sprite tint-flash red (duration: 100ms)"
        - "play sfx-error"
    testable: true
    test-hint: "设置 pig.color = red, target.color = red, pig.ammo = 2, target.hp = 1，执行后检查 ammo=1, hp=0"

  - id: attack-aftermath
    description: "攻击后处理：播放动画，检查弹药耗尽"
    spec-clarification-ref: "A4: 同帧结算顺序"
    trigger:
      event: resource.consumed
      condition: "attack executed"
    condition:
      logic:
        - "pig.ammo >= 0"
    effect-on-true:
      logic:
        - primitive-node-ref: pig-lifecycle
        - "if pig.ammo <= 0:"
        - "  pig.lifecycle = 'returning'"
        - "  emit lifecycle.entered.returning"
      visual:
        - "play attack animation (projectile from pig to target)"
        - "if pig.ammo <= 0: pig sprite fade to 50% alpha"
    effect-on-false:
      logic: []
      visual: []
    testable: true
    test-hint: "设置 pig.ammo = 1，攻击后检查 lifecycle 是否变为 returning"
    primitive-node-ref-reason: "视觉部分由 engine render 处理；弹药检测已由 resource-consume.on-agent-zero 映射"

  # ========================================
  # PRIORITY 4: 回收机制
  # ========================================

  - id: recycle-pig
    description: "弹药未耗尽的小猪走完一圈后回收到等待槽"
    spec-clarification-ref: "A3: 回收槽位选择（第一个空闲槽，从左到右）"
    trigger:
      event: track.loop-complete
      condition: "pig.lifecycle === 'active' && pig.ammo > 0"
    condition:
      logic:
        - "pig.ammo > 0"
        - primitive-node-ref: waiting-pool-manager
        - "waiting-pool-manager.hasEmptySlot()"
    effect-on-true:
      logic:
        - primitive-node-ref: conveyor-track
        - "conveyor-track.remove-agent(pig)"
        - primitive-node-ref: pig-lifecycle
        - "pig.lifecycle = 'waiting'"
        - primitive-node-ref: waiting-pool-manager
        - "waiting-pool-manager.bind(pig)"
        - "emit pool.bound"
      visual:
        - "pig sprite moves from conveyor to waiting-slot"
        - "scale-bounce on pig sprite (duration: 200ms)"
        - "waiting-slot pulse green (duration: 300ms)"
    effect-on-false:
      logic:
        - "if waiting-pool is full: emit pool.overflow"
        - "pig.lifecycle = 'dead'"
      visual:
        - "if no slot: pig fade-out and remove"
    testable: true
    test-hint: "设置 pig.ammo = 2, t = 0.99, 等待 loop-complete，检查 pig 是否在 waiting-pool 中"

  # ========================================
  # PRIORITY 5: 胜负判定
  # ========================================

  - id: win-check
    description: "检查是否所有目标块都已消除"
    spec-clarification-ref: "无歧义"
    trigger:
      event: board.cell-removed
      condition: "game.phase === 'playing'"
    condition:
      logic:
        - primitive-node-ref: end-check
        - "board.cells.filter(c => c.alive).length === 0"
    effect-on-true:
      logic:
        - primitive-node-ref: end-check
        - "game.phase = 'win'"
        - "game.gameOver = true"
        - "emit win"
      visual:
        - "screen-shake intensity=3 duration=500ms"
        - "particle-burst at center (color: gold, count: 30)"
        - "float-text 'VICTORY!' at center"
        - "fade-out to result scene (duration: 1000ms)"
    effect-on-false:
      logic: []
      visual: []
    testable: true
    test-hint: "设置所有 block.alive = false，触发 board.cell-removed，检查 game.phase"

  - id: lose-check
    description: "检查是否资源耗尽且仍有未消除块"
    spec-clarification-ref: "无歧义"
    trigger:
      events:
        - resource.agent-zero
        - tick@1s
      condition: "game.phase === 'playing'"
    condition:
      logic:
        - primitive-node-ref: end-check
        - "waiting-pool-manager.slots.filter(s => s !== null).length === 0"
        - "conveyor-gate.active.length === 0"
        - "board.cells.filter(c => c.alive).length > 0"
    effect-on-true:
      logic:
        - primitive-node-ref: end-check
        - "game.phase = 'lose'"
        - "game.gameOver = true"
        - "emit lose"
      visual:
        - "screen-shake intensity=2 duration=300ms"
        - "tint-flash red on all remaining blocks (duration: 500ms)"
        - "float-text 'GAME OVER' at center"
        - "fade-out to result scene (duration: 1000ms)"
    effect-on-false:
      logic: []
      visual: []
    testable: true
    test-hint: "清空 waiting-pool 和 conveyor-gate，保留若干 block.alive = true，检查 game.phase"

# ========================================
# STATE DEFINITIONS (from PRD @state)
# ========================================

states:
  - id: ready
    description: "准备状态 - 初始化棋盘、等待槽、传送带"
    on-enter:
      - "initialize board based on current level config"
      - "populate waiting-pool with initial pigs"
      - "clear conveyor-gate"
      - "game.phase = 'ready'"
    transitions:
      - to: playing
        trigger: "input.click-start"

  - id: playing
    description: "游戏中 - 启用玩家输入，运行游戏逻辑"
    on-enter:
      - "enable player input"
      - "start conveyor movement"
      - "game.phase = 'playing'"
    transitions:
      - to: win
        trigger: "rule.win-check effect-on-true"
      - to: lose
        trigger: "rule.lose-check effect-on-true"

  - id: win
    description: "胜利 - 棋盘清空"
    on-enter:
      - "game.phase = 'win'"
      - "calculate score"
      - "unlock next level"
      - "transition to result scene"
    transitions:
      - to: playing
        trigger: "input.click-next (next level)"
      - to: ready
        trigger: "input.click-retry"

  - id: lose
    description: "失败 - 资源耗尽且仍有未消除块"
    on-enter:
      - "game.phase = 'lose'"
      - "transition to result scene"
    transitions:
      - to: ready
        trigger: "input.click-retry"

# ========================================
# CONSTRAINT DEFINITIONS (from PRD @constraint)
# ========================================

constraints:
  - id: no-global-autoaim
    kind: hard-rule
    severity: critical
    description: "攻击必须严格依赖小猪当前所在位置，只能攻击正对方向第一个目标块"
    enforcement:
      - primitive-node-ref: attack-raycast
      - field: direction.mode
      - expected: normal-to-track
    test-check: "@check(no-autoaim)"

  - id: no-multi-attack
    kind: hard-rule
    severity: critical
    description: "每次攻击只处理1个目标块"
    enforcement:
      - primitive-node-ref: attack-raycast
      - field: stop-on
      - expected: first-hit
    test-check: "攻击后检查只有一个 target.hp 减少"

  - id: no-penetration
    kind: hard-rule
    severity: critical
    description: "小猪不能跳过前方异色块去攻击后方同色块"
    enforcement:
      - primitive-node-ref: attack-raycast
      - invariant: no-penetration
      - "ray stops at first block regardless of color"
    test-check: "@check(no-autoaim) - 确保后方同色块不被攻击"

  - id: core-mechanics
    kind: hard-rule
    severity: critical
    description: "必须严格体现四周传送带 + 按当前位置依序处理当前方向上的第一个目标块 + 等待槽回收再派出"
    enforcement:
      - primitive-node-ref: conveyor-track
      - primitive-node-ref: attack-raycast
      - primitive-node-ref: waiting-pool-manager
      - primitive-node-ref: pig-lifecycle
    test-check: "@check(click-dispatch), @check(recycle-mechanics), @check(attack-logic)"

# ========================================
# RULE EXECUTION ORDER (from spec-clarifications A4)
# ========================================

execution-order:
  description: "单帧内结算顺序（从高优先级到低优先级）"
  order:
    - "1. 移动 (conveyor-move) - tick@update"
    - "2. 攻击判定 (attack-check) - track.enter-segment"
    - "3. 攻击执行 (attack-exec) - match.hit"
    - "4. 弹药检查 (attack-aftermath) - resource.consumed"
    - "5. 回收判定 (recycle-pig) - track.loop-complete"
    - "6. 胜负判定 (win-check/lose-check) - board.cell-removed / tick@1s"
