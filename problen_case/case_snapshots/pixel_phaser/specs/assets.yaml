# Assets specification for pixel_phaser-001
# Generated by game-gameplay-expander

genre: board-grid
color-scheme:
  palette-id: pixel-retro
  theme-keywords: [像素, 传送带, 清板, 益智, 策略, 休闲]
  primary: "#ef4444"
  secondary: "#facc15"
  accent: "#22c55e"
  background: "#1a1a2e"
  surface: "#16213e"
  text: "#e2e8f0"
  text-muted: "#94a3b8"
  success: "#22c55e"
  error: "#ef4444"
  border: "#334155"
  font-family: '"Press Start 2P", "VT323", monospace'
  border-radius: "0"
  shadow: "2px 2px 0 #000"
  fx-hint: pixel

asset-style: pixel-retro

# ── 图片资源 ──
images:
  # === UI 按钮 (local-file) ===
  - id: btn-start-left
    source: assets/library_2d/ui-pixel/tile_0013.png
    type: local-file
    binding-to: start-btn
    visual-primitive: ui-button
    usage: "开始按钮左端（与 tile_0014 + tile_0015 拼成完整按钮）"

  - id: btn-start-center
    source: assets/library_2d/ui-pixel/tile_0014.png
    type: local-file
    binding-to: start-btn
    visual-primitive: ui-button
    usage: "开始按钮中段（可重复拼接）"

  - id: btn-start-right
    source: assets/library_2d/ui-pixel/tile_0015.png
    type: local-file
    binding-to: start-btn
    visual-primitive: ui-button
    usage: "开始按钮右端"

  - id: btn-start-pressed-left
    source: assets/library_2d/ui-pixel/tile_0019.png
    type: local-file
    binding-to: start-btn
    visual-primitive: ui-button
    usage: "开始按钮按下态左端"

  - id: btn-start-pressed-center
    source: assets/library_2d/ui-pixel/tile_0020.png
    type: local-file
    binding-to: start-btn
    visual-primitive: ui-button
    usage: "开始按钮按下态中段"

  - id: btn-start-pressed-right
    source: assets/library_2d/ui-pixel/tile_0021.png
    type: local-file
    binding-to: start-btn
    visual-primitive: ui-button
    usage: "开始按钮按下态右端"

  - id: btn-retry-left
    source: assets/library_2d/ui-pixel/tile_0013.png
    type: local-file
    binding-to: retry-btn
    visual-primitive: ui-button
    usage: "重试按钮左端"

  - id: btn-retry-center
    source: assets/library_2d/ui-pixel/tile_0014.png
    type: local-file
    binding-to: retry-btn
    visual-primitive: ui-button
    usage: "重试按钮中段"

  - id: btn-retry-right
    source: assets/library_2d/ui-pixel/tile_0015.png
    type: local-file
    binding-to: retry-btn
    visual-primitive: ui-button
    usage: "重试按钮右端"

  - id: btn-next-left
    source: assets/library_2d/ui-pixel/tile_0013.png
    type: local-file
    binding-to: next-btn
    visual-primitive: ui-button
    usage: "下一关按钮左端"

  - id: btn-next-center
    source: assets/library_2d/ui-pixel/tile_0014.png
    type: local-file
    binding-to: next-btn
    visual-primitive: ui-button
    usage: "下一关按钮中段"

  - id: btn-next-right
    source: assets/library_2d/ui-pixel/tile_0015.png
    type: local-file
    binding-to: next-btn
    visual-primitive: ui-button
    usage: "下一关按钮右端"

  # === 面板九宫格 (local-file) ===
  - id: panel-top-left
    source: assets/library_2d/ui-pixel/tile_0000.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-panel
    usage: "面板左上角（用于对话框、菜单背景）"

  - id: panel-top
    source: assets/library_2d/ui-pixel/tile_0001.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-panel
    usage: "面板顶边"

  - id: panel-top-right
    source: assets/library_2d/ui-pixel/tile_0002.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-panel
    usage: "面板右上角"

  - id: panel-left
    source: assets/library_2d/ui-pixel/tile_0003.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-panel
    usage: "面板左边"

  - id: panel-center
    source: assets/library_2d/ui-pixel/tile_0004.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-panel
    usage: "面板中心填充"

  - id: panel-right
    source: assets/library_2d/ui-pixel/tile_0005.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-panel
    usage: "面板右边"

  - id: panel-bottom-left
    source: assets/library_2d/ui-pixel/tile_0006.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-panel
    usage: "面板左下角"

  - id: panel-bottom
    source: assets/library_2d/ui-pixel/tile_0007.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-panel
    usage: "面板底边"

  - id: panel-bottom-right
    source: assets/library_2d/ui-pixel/tile_0008.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-panel
    usage: "面板右下角"

  # === 深色面板（用于等待槽格子）(local-file) ===
  - id: panel-dark-top-left
    source: assets/library_2d/ui-pixel/tile_0022.png
    type: local-file
    binding-to: waiting-slots
    visual-primitive: ui-panel
    usage: "深色面板左上角（等待槽格子背景）"

  - id: panel-dark-top
    source: assets/library_2d/ui-pixel/tile_0023.png
    type: local-file
    binding-to: waiting-slots
    visual-primitive: ui-panel
    usage: "深色面板顶边"

  - id: panel-dark-top-right
    source: assets/library_2d/ui-pixel/tile_0024.png
    type: local-file
    binding-to: waiting-slots
    visual-primitive: ui-panel
    usage: "深色面板右上角"

  - id: panel-dark-left
    source: assets/library_2d/ui-pixel/tile_0025.png
    type: local-file
    binding-to: waiting-slots
    visual-primitive: ui-panel
    usage: "深色面板左边"

  - id: panel-dark-center
    source: assets/library_2d/ui-pixel/tile_0026.png
    type: local-file
    binding-to: waiting-slots
    visual-primitive: ui-panel
    usage: "深色面板中心（等待槽格子填充）"

  - id: panel-dark-right
    source: assets/library_2d/ui-pixel/tile_0027.png
    type: local-file
    binding-to: waiting-slots
    visual-primitive: ui-panel
    usage: "深色面板右边"

  - id: panel-dark-bottom-left
    source: assets/library_2d/ui-pixel/tile_0028.png
    type: local-file
    binding-to: waiting-slots
    visual-primitive: ui-panel
    usage: "深色面板左下角"

  - id: panel-dark-bottom
    source: assets/library_2d/ui-pixel/tile_0029.png
    type: local-file
    binding-to: waiting-slots
    visual-primitive: ui-panel
    usage: "深色面板底边"

  - id: panel-dark-bottom-right
    source: assets/library_2d/ui-pixel/tile_0030.png
    type: local-file
    binding-to: waiting-slots
    visual-primitive: ui-panel
    usage: "深色面板右下角"

  # === HUD 元素 (local-file) ===
  - id: hud-coin
    source: assets/library_2d/ui-pixel/tile_0040.png
    type: local-file
    binding-to: hud-score
    visual-primitive: ui-readout
    usage: "金币图标（得分显示前置图标）"

  - id: hud-star
    source: assets/library_2d/ui-pixel/tile_0042.png
    type: local-file
    binding-to: hud-level
    visual-primitive: ui-readout
    usage: "星星图标（关卡显示）"

  # === 像素数字 0-9 (local-file) ===
  - id: digit-0
    source: assets/library_2d/ui-pixel/tile_0063.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-readout
    usage: "像素数字0（HUD 计分板）"

  - id: digit-1
    source: assets/library_2d/ui-pixel/tile_0064.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-readout
    usage: "像素数字1"

  - id: digit-2
    source: assets/library_2d/ui-pixel/tile_0065.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-readout
    usage: "像素数字2"

  - id: digit-3
    source: assets/library_2d/ui-pixel/tile_0066.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-readout
    usage: "像素数字3"

  - id: digit-4
    source: assets/library_2d/ui-pixel/tile_0067.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-readout
    usage: "像素数字4"

  - id: digit-5
    source: assets/library_2d/ui-pixel/tile_0068.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-readout
    usage: "像素数字5"

  - id: digit-6
    source: assets/library_2d/ui-pixel/tile_0069.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-readout
    usage: "像素数字6"

  - id: digit-7
    source: assets/library_2d/ui-pixel/tile_0070.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-readout
    usage: "像素数字7"

  - id: digit-8
    source: assets/library_2d/ui-pixel/tile_0071.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-readout
    usage: "像素数字8"

  - id: digit-9
    source: assets/library_2d/ui-pixel/tile_0072.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-readout
    usage: "像素数字9"

  # === 锁图标（关卡选择用）(local-file) ===
  - id: lock-closed
    source: assets/library_2d/ui-pixel/tile_0074.png
    type: local-file
    binding-to: level-select
    visual-primitive: icon
    usage: "锁-关闭（未解锁关卡）"

  - id: lock-open
    source: assets/library_2d/ui-pixel/tile_0075.png
    type: local-file
    binding-to: level-select
    visual-primitive: icon
    usage: "锁-打开（已解锁关卡）"

  # === 旗帜（关卡完成标记）(local-file) ===
  - id: flag
    source: assets/library_2d/ui-pixel/tile_0073.png
    type: local-file
    binding-to: level-select
    visual-primitive: icon
    usage: "旗帜（关卡完成标记）"

  # === 箭头（关卡选择翻页）(local-file) ===
  - id: arrow-left
    source: assets/library_2d/ui-pixel/tile_0044.png
    type: local-file
    binding-to: level-select
    visual-primitive: icon
    usage: "左箭头（关卡选择翻页）"

  - id: arrow-right
    source: assets/library_2d/ui-pixel/tile_0045.png
    type: local-file
    binding-to: level-select
    visual-primitive: icon
    usage: "右箭头（关卡选择翻页）"

  # === 小猪单位 (color-unit: 颜色来自 entity.color 字段) ===
  # PRD 指定: 核心小猪用 Kenney 素材库，但玩法依赖 color 字段进行匹配判定
  # 使用 sprites/puzzle 中的 ball 元素作为小猪基础造型，动态上色
  - id: pig-base
    source: assets/library_2d/sprites/puzzle/ballBlue.png
    type: local-file
    binding-to: pig
    visual-primitive: color-unit
    color-source: entity.color
    usage: "小猪单位基础造型（圆球形态，按 pig.color 动态上色：红/蓝/黄/绿）"

  # === 目标块 (color-block: 抽象色块，程序化生成) ===
  # PRD 强调颜色匹配是核心判定条件，目标块是抽象色块
  # 玩法依赖 color 字段，必须使用 generated + visual-primitive: color-block
  - id: block-target
    source: generated
    type: generated
    binding-to: block
    visual-primitive: color-block
    color-source: entity.color
    usage: "目标块（纯色格子，按 block.color 渲染：红/蓝/黄/绿），显示 hp 耐久角标"

  # === 棋盘背景 (generated) ===
  - id: board-bg
    source: generated
    type: generated
    binding-to: board
    visual-primitive: grid
    usage: "棋盘背景网格（按关卡 gridSize 程序化生成）"

  # === 传送带轨道 (generated) ===
  - id: conveyor-track
    source: generated
    type: generated
    binding-to: conveyor
    visual-primitive: track
    usage: "传送带轨道（四周环绕棋盘的移动路径，程序化绘制）"

  # === 游戏背景 (generated) ===
  - id: game-bg
    source: generated
    type: generated
    binding-to: decor
    visual-primitive: background
    usage: "游戏背景（深色 #1a1a2e，配合色板）"

# ── 音频资源 ──
audio:
  # === UI 点击音效 (local-file) ===
  - id: sfx-click
    source: assets/library_2d/audio/ui-clicks/click1.ogg
    type: local-file
    binding-to: decor
    usage: "按钮点击音效（清脆短促）"

  - id: sfx-hover
    source: assets/library_2d/audio/ui-clicks/rollover1.ogg
    type: local-file
    binding-to: decor
    usage: "按钮悬停音效"

  # === 界面交互音效 (local-file) ===
  - id: sfx-success
    source: assets/library_2d/audio/ui-interface/confirmation_002.ogg
    type: local-file
    binding-to: decor
    usage: "操作成功/匹配成功音效"

  - id: sfx-error
    source: assets/library_2d/audio/ui-interface/error_004.ogg
    type: local-file
    binding-to: decor
    usage: "操作失败/匹配失败音效"

  - id: sfx-select
    source: assets/library_2d/audio/ui-interface/select_003.ogg
    type: local-file
    binding-to: decor
    usage: "菜单选项选择音效"

  - id: sfx-level-up
    source: assets/library_2d/audio/ui-interface/maximize_008.ogg
    type: local-file
    binding-to: decor
    usage: "升级/通关音效"

  # === 游戏音效 (local-file) ===
  - id: sfx-attack
    source: assets/library_2d/audio/sfx/sfx_throw.ogg
    type: local-file
    binding-to: decor
    usage: "攻击发射音效"

  - id: sfx-hit
    source: assets/library_2d/audio/sfx/sfx_bump.ogg
    type: local-file
    binding-to: decor
    usage: "命中目标音效"

  - id: sfx-collect
    source: assets/library_2d/audio/sfx/sfx_coin.ogg
    type: local-file
    binding-to: decor
    usage: "消除/收集音效"

  - id: sfx-disappear
    source: assets/library_2d/audio/sfx/sfx_disappear.ogg
    type: local-file
    binding-to: decor
    usage: "小猪消失音效（弹药耗尽）"

  # === 背景音乐 (synthesized) ===
  - id: bgm-loop
    source: inline
    type: synthesized
    format: synthesized
    binding-to: decor
    usage: "背景循环音乐（WebAudio 合成）"

# ── 字体 ──
fonts:
  - family: "Kenney Future"
    source: assets/library_2d/fonts/Kenney Future.ttf
    type: local-file
    binding-to: decor
    usage: "像素风格游戏字体（标题/HUD）"

  - family: "Kenney Future Narrow"
    source: assets/library_2d/fonts/Kenney Future Narrow.ttf
    type: local-file
    binding-to: decor
    usage: "窄版像素字体（空间受限的 UI）"

# ── 精灵表 ──
spritesheets: []

# ── 色板（从 color-scheme 复制）──
color-palette:
  primary: "#ef4444"
  secondary: "#facc15"
  accent: "#22c55e"
  background: "#1a1a2e"
  surface: "#16213e"
  text: "#e2e8f0"
  text-muted: "#94a3b8"
  success: "#22c55e"
  error: "#ef4444"
  border: "#334155"
  # 游戏专用四色（红/蓝/黄/绿）
  red: "#ef4444"
  blue: "#3b82f6"
  yellow: "#facc15"
  green: "#22c55e"

# ── 素材选型报告 ──
selection-report:
  genre: board-grid
  candidate-packs:
    - id: ui-pixel-adventure
      used: true
      reason: "pixel-retro + board-grid 首选 UI 包，提供按钮/面板/数字/图标等完整 UI 组件"
    - id: sprites-puzzle
      used: true
      reason: "益智游戏素材包，ball 元素可作为小猪单位基础造型"
    - id: audio-ui-clicks
      used: true
      reason: "UI 点击/悬停音效"
    - id: audio-ui-interface
      used: true
      reason: "界面交互音效（成功/失败/选择）"
    - id: audio-sfx
      used: true
      reason: "游戏音效（攻击/命中/收集/消失）"
    - id: tiles-dungeon
      used: false
      reason: "风格匹配但语义不匹配（地牢瓦片不适合棋盘清板）"
    - id: tiles-town
      used: false
      reason: "风格匹配但语义不匹配（城镇瓦片不适合棋盘清板）"
    - id: sprites-platformer-pixel
      used: false
      reason: "平台跳跃角色不匹配传送带清板玩法"
    - id: cards
      used: false
      reason: "非卡牌游戏"

  local-file-ratio:
    images: 0.58
    audio: 0.92
    threshold:
      images: 0.30
      audio: 0.30

  fallback-reasons:
    - id: block-target
      type: generated
      reason: "抽象 color-block 需要程序化生成，玩法依赖 entity.color 字段进行颜色匹配判定"
    - id: board-bg
      type: generated
      reason: "棋盘背景需要按关卡 gridSize(5x5/6x6/7x7) 动态生成"
    - id: conveyor-track
      type: generated
      reason: "传送带轨道是抽象路径，需要程序化绘制四周环绕的移动轨迹"
    - id: game-bg
      type: generated
      reason: "纯色背景，按色板 #1a1a2e 填充即可"
    - id: bgm-loop
      type: synthesized
      reason: "无合适本地 bgm 素材，用 WebAudio 合成简单循环音乐"
