version: 1
primitive-catalog-version: 1
engine: phaser3

# 外部事件：玩家输入 + 系统事件
external-events: [input.click-pig, input.click-start, input.click-retry, input.click-next, tick, tick@update, tick@1s, board.init, board.add-cell, board.remove-cell, track.add-agent, track.remove-agent, dispatched, exhausted, killed, arrived, pool.bind, pool.unbind, capacity.request, capacity.release]

entities:
  - id: pig
    uses: [parametric-track, entity-lifecycle, resource-consume]
    initial:
      id: ""
      color: red
      ammo: 3
      lifecycle: waiting
      t: 0
      speed: 0
      segmentId: null
      gridPosition: { row: -1, col: -1 }
      alive: true

  - id: block
    uses: [grid-board, resource-consume]
    initial:
      id: ""
      color: red
      hp: 1
      row: 0
      col: 0
      alive: true

  - id: waiting-pool
    uses: [slot-pool]
    initial:
      capacity: 5
      slots: []

  - id: conveyor-gate
    uses: [capacity-gate]
    initial:
      capacity: 4
      active: []

mechanics:
  # === 棋盘系统 ===
  - node: board
    primitive: grid-board@v1
    params:
      rows: 6
      cols: 6
      cell-fields:
        - { name: color, type: enum, values: [red, blue, yellow, green] }
        - { name: hp, type: number }
    listens: [board.init, board.add-cell, board.remove-cell]
    produces-events: [board.cell-added, board.cell-removed, board.empty]

  # === 传送带移动 ===
  - node: conveyor-track
    primitive: parametric-track@v1
    handles: [tick]
    applies-to: pig
    params:
      shape: rect-loop
      geometry: { x: 80, y: 80, width: 360, height: 360 }
      grid-projection: { rows: 6, cols: 6, outside-offset: 1 }
      segments:
        - { id: top,    range: [0.0,  0.25] }
        - { id: right,  range: [0.25, 0.5]  }
        - { id: bottom, range: [0.5,  0.75] }
        - { id: left,   range: [0.75, 1.0]  }
    listens: [track.add-agent, track.remove-agent]
    produces-events: [track.enter-segment, track.loop-complete, track.position-updated]

  # === 攻击射线 ===
  - node: attack-raycast
    primitive: ray-cast@v1
    trigger-on: [track.enter-segment]
    params:
      source: { from: pig }
      coord-system: grid
      direction:
        mode: normal-to-track
        segment-direction-map:
          top:    { dx: 0,  dy: 1 }
          right:  { dx: -1, dy: 0 }
          bottom: { dx: 0,  dy: -1 }
          left:   { dx: 1,  dy: 0 }
      targets: { from: blocks }
      stop-on: first-hit
    produces-events: [ray.hit-candidate, ray.miss]

  # === 颜色匹配判定 ===
  - node: color-match
    primitive: predicate-match@v1
    trigger-on: [ray.hit-candidate]
    params:
      left: pig
      right: "hit-candidate[0]"
      fields: [color]
      op: eq
    produces-events: [match.hit, match.miss]

  # === 攻击消耗 ===
  - node: attack-consume
    primitive: resource-consume@v1
    trigger-on: [match.hit]
    params:
      agent-field: "pig.ammo"
      target-field: "block.hp"
      amount: 1
      on-agent-zero: [lifecycle.to-returning]
      on-target-zero: [board.remove-cell, score-plus-10]
    produces-events: [resource.consumed, resource.agent-zero, resource.target-zero]

  # === 等待槽管理 ===
  - node: waiting-pool-manager
    primitive: slot-pool@v1
    trigger-on: [pool.bind, pool.unbind]
    params:
      capacity: 5
      slot-ids: [slot-0, slot-1, slot-2, slot-3, slot-4]
      retain-fields: [ammo, color]
      on-bind: [lifecycle.to-waiting]
      on-unbind: [capacity-gate.request]
      on-overflow: [pool.overflow]
    produces-events: [pool.bound, pool.unbound, pool.overflow]

  # === 传送带容量门控 ===
  - node: conveyor-capacity
    primitive: capacity-gate@v1
    trigger-on: [capacity.request, capacity.release]
    params:
      capacity: 4
      on-admit: [lifecycle.to-active, conveyor-track.add-agent]
      on-block: [capacity.blocked]
      on-release: [lifecycle.to-returning]
    produces-events: [capacity.admitted, capacity.blocked, capacity.released]

  # === 小猪生命周期 ===
  - node: pig-lifecycle
    primitive: entity-lifecycle@v1
    trigger-on: [dispatched, exhausted, killed, arrived]
    applies-to: pig
    params:
      transitions:
        - { from: waiting,   event: dispatched, to: active }
        - { from: active,    event: exhausted,  to: returning }
        - { from: active,    event: killed,     to: dead }
        - { from: returning, event: arrived,    to: waiting }
      on-enter-active: [conveyor-track.add-agent]
      on-enter-returning: [conveyor-track.remove-agent, waiting-pool-manager.bind]
      on-enter-waiting: [waiting-pool-manager.bind]
      on-enter-dead: [conveyor-track.remove-agent]
    produces-events: [lifecycle.entered.active, lifecycle.entered.returning, lifecycle.entered.waiting, lifecycle.entered.dead]

  # === 胜负判定 ===
  - node: end-check
    primitive: win-lose-check@v1
    handles: [tick]
    params:
      win:
        - { kind: all-cleared, collection: blocks }
        - { kind: score-reaches, field: score, threshold: 100 }
      lose:
        - { kind: count-falls-below, collection: pigs, threshold: 1 }
    produces-events: [win, lose]

  # === 计分系统 ===
  - node: scoring
    primitive: score-accum@v1
    trigger-on: [resource.target-zero]
    params:
      score-field: "game.score"
      rules:
        - { on: resource.target-zero, delta: 10 }
    produces-events: [score.updated]

# === Constraint 映射 ===
invariants:
  - ref: "@constraint(no-global-autoaim)"
    maps-to:
      node: attack-raycast
      field: direction.mode
      expected: normal-to-track
      invariant: source-dependency

  - ref: "@constraint(no-multi-attack)"
    maps-to:
      node: attack-raycast
      field: stop-on
      expected: first-hit

  - ref: "@constraint(no-penetration)"
    maps-to:
      node: attack-raycast
      invariant: no-penetration

  - ref: "@constraint(core-mechanics)"
    maps-to:
      nodes: [conveyor-track, attack-raycast, waiting-pool-manager, pig-lifecycle]
      invariant: composition-valid

# === 未映射的 PRD 内容 ===
unmapped:
  - prd-text: "攻击动画（发射像素弹）"
    reason: "纯视觉效果，不属于玩法机械；由 engine render 层处理"
  - prd-text: "目标块消除特效（闪烁+缩放）"
    reason: "纯视觉效果，不属于玩法机械；由 engine render 层处理"
  - prd-text: "小猪回收动画"
    reason: "纯视觉效果，不属于玩法机械；由 engine render 层处理"
  - prd-text: "@rule(dispatch-cleanup) 派出清理槽位"
    reason: "由 slot-pool.unbind 的 on-unbind 回调自动处理，不需要单独原语"
  - prd-text: "@rule(attack-aftermath) 攻击后续"
    reason: "动画部分为视觉效果；ammo归零检测已由 resource-consume.on-agent-zero 处理"
  - prd-text: "@ui(*) 所有 UI 定义"
    reason: "UI 布局属于 scene.yaml 范畴，不属于 mechanics 原语"

# === 模拟剧本 ===
simulation-scenarios:
  - name: cleared-board-with-score
    setup:
      pigs:
        - { id: p1, color: red, ammo: 5, lifecycle: waiting, t: 0, speed: 0, segmentId: null, gridPosition: { row: -1, col: -1 }, alive: true }
      blocks:
        - { id: b1, row: 0, col: 0, color: red, hp: 0, alive: false }
      game:
        - { key: score, value: 100, alive: true }
    expected-outcome: win
    max-ticks: 5

  - name: single-block-clear
    setup:
      pigs:
        - { id: p1, color: red, ammo: 0, lifecycle: dead, t: 0.0, speed: 0.1, segmentId: top, gridPosition: { row: -1, col: 2 }, alive: false }
      blocks:
        - { id: b1, row: 0, col: 2, color: red, hp: 1, alive: true }
      game:
        - { key: score, value: 0, alive: true }
    expected-outcome: lose
    max-ticks: 50

  - name: mismatch-color-no-attack
    setup:
      pigs:
        - { id: p1, color: red, ammo: 0, lifecycle: dead, t: 0, speed: 0.05, segmentId: top, gridPosition: { row: -1, col: 0 }, alive: false }
      blocks:
        - { id: b1, row: 0, col: 0, color: blue, hp: 1, alive: true }
      game:
        - { key: score, value: 0, alive: true }
    expected-outcome: lose
    max-ticks: 50

  - name: penetration-blocked
    setup:
      pigs:
        - { id: p1, color: red, ammo: 0, lifecycle: dead, t: 0, speed: 0.05, segmentId: top, gridPosition: { row: -1, col: 0 }, alive: false }
      blocks:
        - { id: b1, row: 0, col: 0, color: blue, hp: 1, alive: true }
        - { id: b2, row: 1, col: 0, color: red, hp: 1, alive: true }
      game:
        - { key: score, value: 0, alive: true }
    expected-outcome: lose
    max-ticks: 50
