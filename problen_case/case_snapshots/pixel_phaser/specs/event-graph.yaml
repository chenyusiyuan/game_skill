# Event Graph: pixel_phaser-001
# Describes event connections between modules based on mechanics.yaml primitives

version: 1
engine: phaser3

# External events: player inputs
external-events:
  - input.click-pig
  - input.click-start
  - input.click-retry
  - input.click-next

# === Modules (based on mechanics.yaml nodes) ===
modules:
  # --- Input Handling ---
  - id: input.dispatcher
    description: "Handles player click on waiting-slot pig"
    listens:
      - input.click-pig
    emits:
      - dispatch.requested
    primitive-node-ref: none
    primitive-node-ref-reason: "Pure input translation layer, not a gameplay primitive"

  # --- Board System ---
  - id: board
    description: "Grid board container for target blocks"
    listens:
      - board.init
      - board.add-cell
      - board.remove-cell
    emits:
      - board.cell-added
      - board.cell-removed
      - board.empty
    primitive-node-ref: board

  # --- Conveyor Track (Parametric Motion) ---
  - id: conveyor-track
    description: "Ring track for pig movement around board"
    listens:
      - track.add-agent
      - track.remove-agent
      - tick@update
    emits:
      - track.enter-segment
      - track.loop-complete
      - track.position-updated
    primitive-node-ref: conveyor-track

  # --- Attack Raycast ---
  - id: attack-raycast
    description: "Cast ray from pig position toward board to find target"
    listens:
      - track.enter-segment
    emits:
      - ray.hit-candidate
      - ray.miss
    primitive-node-ref: attack-raycast
    spec-clarification-ref: "A2: 攻击触发时机 - 小猪每移动到新的棋盘边缘对齐位置时触发一次攻击判定"

  # --- Color Match ---
  - id: color-match
    description: "Check if pig color matches target block color"
    listens:
      - ray.hit-candidate
    emits:
      - match.hit
      - match.miss
    primitive-node-ref: color-match

  # --- Attack Consume (Resource) ---
  - id: attack-consume
    description: "Consume pig ammo and block hp on successful match"
    listens:
      - match.hit
    emits:
      - resource.consumed
      - resource.agent-zero
      - resource.target-zero
    primitive-node-ref: attack-consume

  # --- Waiting Pool Manager ---
  - id: waiting-pool-manager
    description: "Manage 5-slot waiting pool for pigs"
    listens:
      - pool.bind
      - pool.unbind
      - pool.overflow
    emits:
      - pool.bound
      - pool.unbound
      - pool.overflow
    primitive-node-ref: waiting-pool-manager
    spec-clarification-ref: "A3: 回收槽位选择 - 小猪回收到第一个空闲等待槽(从左到右遍历)"

  # --- Conveyor Capacity Gate ---
  - id: conveyor-capacity
    description: "Gate for conveyor capacity (max 4 pigs)"
    listens:
      - capacity.request
      - capacity.release
    emits:
      - capacity.admitted
      - capacity.blocked
      - capacity.released
    primitive-node-ref: conveyor-capacity

  # --- Pig Lifecycle ---
  - id: pig-lifecycle
    description: "Entity lifecycle FSM: waiting -> active -> returning -> waiting"
    listens:
      - dispatched
      - exhausted
      - killed
      - arrived
    emits:
      - lifecycle.entered.active
      - lifecycle.entered.returning
      - lifecycle.entered.waiting
      - lifecycle.entered.dead
    primitive-node-ref: pig-lifecycle

  # --- Win/Lose Check ---
  - id: end-check
    description: "Evaluate win/lose conditions"
    listens:
      - board.cell-removed
      - resource.agent-zero
      - tick@1s
    emits:
      - win
      - lose
    primitive-node-ref: end-check

  # --- Scoring ---
  - id: scoring
    description: "Accumulate score on block destruction"
    listens:
      - resource.target-zero
    emits:
      - score.updated
    primitive-node-ref: scoring

  # --- Visual Feedback ---
  - id: visual-feedback
    description: "Handle visual effects for game events"
    listens:
      - match.hit
      - match.miss
      - resource.target-zero
      - win
      - lose
      - lifecycle.entered.active
      - lifecycle.entered.returning
    emits:
      - animation.play
      - sfx.play
    primitive-node-ref: none
    primitive-node-ref-reason: "Pure presentation layer, not a mechanics primitive"

  # --- Game State FSM ---
  - id: game-fsm
    description: "Overall game phase state machine"
    listens:
      - game.start
      - win
      - lose
      - input.click-retry
      - input.click-next
    emits:
      - state.changed
      - scene.transition
    primitive-node-ref: none
    primitive-node-ref-reason: "Orchestrates scene flow, uses fsm-transition primitive internally"

  # --- Level Manager ---
  - id: level-manager
    description: "Handle level progression and configuration"
    listens:
      - win
      - input.click-start
      - input.click-next
      - input.click-retry
    emits:
      - level.start
      - level.complete
      - level.unlock
    primitive-node-ref: none
    primitive-node-ref-reason: "Meta-game progression, not core mechanics"

# === Event Flow Edges ===
edges:
  # Input -> Dispatch Flow
  - from: input.dispatcher
    to: conveyor-capacity
    event: dispatch.requested
    label: "check capacity"
    spec-clarification-ref: "A5: 传送带容量与位置数 - 传送带容量=4只小猪"

  - from: conveyor-capacity
    to: pig-lifecycle
    event: capacity.admitted
    label: "dispatched -> active"
    primitive-node-ref: conveyor-capacity

  - from: conveyor-capacity
    to: visual-feedback
    event: capacity.blocked
    label: "show blocked feedback"

  - from: conveyor-capacity
    to: waiting-pool-manager
    event: capacity.admitted
    label: "unbind from pool"
    primitive-node-ref: waiting-pool-manager

  # Movement -> Attack Flow
  - from: conveyor-track
    to: attack-raycast
    event: track.enter-segment
    label: "position aligned -> raycast"
    spec-clarification-ref: "A1: 传送带离散化 - 4个边区，每边N个离散位置"

  - from: attack-raycast
    to: color-match
    event: ray.hit-candidate
    label: "found target -> check color"
    primitive-node-ref: attack-raycast

  - from: attack-raycast
    to: visual-feedback
    event: ray.miss
    label: "no target in direction"

  # Attack Flow
  - from: color-match
    to: attack-consume
    event: match.hit
    label: "color matched -> consume"
    primitive-node-ref: color-match

  - from: color-match
    to: visual-feedback
    event: match.miss
    label: "color mismatch"

  - from: attack-consume
    to: scoring
    event: resource.target-zero
    label: "block destroyed -> +10 score"
    primitive-node-ref: attack-consume

  - from: attack-consume
    to: pig-lifecycle
    event: resource.agent-zero
    label: "ammo exhausted -> returning"
    primitive-node-ref: attack-consume

  - from: attack-consume
    to: board
    event: resource.target-zero
    label: "remove block from board"

  - from: attack-consume
    to: visual-feedback
    event: resource.consumed
    label: "play attack animation"

  # Recycling Flow
  - from: conveyor-track
    to: pig-lifecycle
    event: track.loop-complete
    label: "one loop done"
    primitive-node-ref: conveyor-track

  - from: pig-lifecycle
    to: waiting-pool-manager
    event: lifecycle.entered.returning
    label: "bind to pool"
    primitive-node-ref: waiting-pool-manager

  - from: pig-lifecycle
    to: conveyor-track
    event: lifecycle.entered.returning
    label: "remove from track"

  - from: waiting-pool-manager
    to: pig-lifecycle
    event: pool.bound
    label: "arrived -> waiting"
    primitive-node-ref: waiting-pool-manager

  # Win/Lose Flow
  - from: board
    to: end-check
    event: board.empty
    label: "all blocks cleared -> win?"
    primitive-node-ref: end-check

  - from: end-check
    to: game-fsm
    event: win
    label: "trigger win state"
    primitive-node-ref: end-check

  - from: end-check
    to: game-fsm
    event: lose
    label: "trigger lose state"
    primitive-node-ref: end-check

  - from: game-fsm
    to: visual-feedback
    event: win
    label: "show victory"

  - from: game-fsm
    to: visual-feedback
    event: lose
    label: "show defeat"

  # Scene Transitions
  - from: game-fsm
    to: level-manager
    event: scene.transition
    label: "navigate to result/play"

  - from: level-manager
    to: board
    event: level.start
    label: "init board for level"

  - from: level-manager
    to: waiting-pool-manager
    event: level.start
    label: "populate initial pigs"

# === Async Boundaries ===
async-boundaries:
  - id: dispatch-flow
    description: "Click pig -> capacity check -> add to conveyor"
    entry-lock: "isProcessing = true"
    exit-unlock: "isProcessing = false"
    async-steps:
      - "capacity gate evaluation (sync)"
      - "lifecycle transition (sync)"
      - "conveyor track add-agent (sync)"
      - "pool unbind (sync)"
    danger: "If player rapidly clicks, multiple dispatch requests could overflow"

  - id: attack-flow
    description: "Position aligned -> raycast -> match -> consume -> animations"
    entry-lock: "attackLock = true"
    exit-unlock: "attackLock = false"
    async-steps:
      - "raycast evaluation (sync)"
      - "color match check (sync)"
      - "resource consume (sync)"
      - "attack animation (tween ~200ms)"
      - "block destroy animation (tween ~300ms)"
    danger: "If attack triggers during animation, could cause double-hit or visual glitch"
    spec-clarification-ref: "A4: 同帧结算顺序 - 单帧内：移动 → 攻击判定 → 攻击执行 → 弹药检查 → 回收判定"

  - id: recycle-flow
    description: "Track loop complete -> lifecycle transition -> pool bind"
    entry-lock: "recycleLock = true"
    exit-unlock: "recycleLock = false"
    async-steps:
      - "lifecycle transition to returning (sync)"
      - "conveyor remove-agent (sync)"
      - "pool bind (sync)"
      - "return animation (tween ~150ms)"
    danger: "If pig dispatches during recycle, pool state could be inconsistent"

  - id: scene-transition-flow
    description: "Win/lose -> result scene -> play/retry"
    entry-lock: "transitionLock = true"
    exit-unlock: "transitionLock = false"
    async-steps:
      - "exit-transition animation (fade-out ~300ms)"
      - "cleanup old scene objects"
      - "enter-transition animation (fade-in ~300ms)"
    danger: "User clicks during transition could trigger actions on destroyed objects"

# === Test Hooks ===
test-hooks:
  required:
    - name: "window.gameTest.clickStartButton"
      description: "Simulate click on start button, trigger phase ready -> playing"

    - name: "window.gameTest.dispatchPig"
      description: "Dispatch a pig from waiting slot to conveyor, returns success boolean"

    - name: "window.gameTest.getPigAtPosition"
      description: "Get pig entity at specific conveyor position, returns pig object or null"

    - name: "window.gameTest.getBlockAtGrid"
      description: "Get block entity at grid position (row, col), returns block object or null"

    - name: "window.gameTest.getGameState"
      description: "Return current gameState snapshot for assertion"

    - name: "window.gameTest.simulateTimeStep"
      description: "Advance game time by N ms for deterministic testing"

  recommended:
    - name: "window.gameTest.clickRetryButton"
      description: "Simulate click on retry button"

    - name: "window.gameTest.clickNextButton"
      description: "Simulate click on next level button"

    - name: "window.gameTest.getConveyorPigs"
      description: "Return array of pigs currently on conveyor"

    - name: "window.gameTest.getWaitingPigs"
      description: "Return array of pigs in waiting slots"

    - name: "window.gameTest.setPigColor"
      description: "Set pig color for testing color match scenarios"

# === Rule Trace Baseline ===
rule-traces:
  - rule-id: dispatch-pig
  - rule-id: pig-move
  - rule-id: attack-check

# === Event Naming Conventions ===
# Events follow pattern: <source>.<action>
# - input.* : External player inputs
# - track.* : Parametric track events
# - ray.* : Raycast events
# - match.* : Color match events
# - resource.* : Resource consumption events
# - lifecycle.* : Entity lifecycle events
# - board.* : Grid board events
# - pool.* : Slot pool events
# - capacity.* : Capacity gate events
# - score.* : Scoring events
# - state.* : Game state events
# - scene.* : Scene transition events
# - level.* : Level progression events
# - animation.* : Visual feedback triggers
# - sfx.* : Sound effect triggers

# === Spec Clarification Compliance ===
# A1: Conveyor discretized into 4 segments (top/right/bottom/left)
#     Each segment has N discrete positions, trigger on position change
# A2: Attack triggers on track.enter-segment (discrete position aligned)
# A3: Recycle picks first empty waiting slot (left-to-right)
# A4: Single frame order: move -> check -> attack -> recycle
# A5: Conveyor capacity = 4, each side 8 positions (32 total for loop)
