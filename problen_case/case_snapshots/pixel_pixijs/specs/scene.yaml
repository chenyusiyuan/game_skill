scenes:
  # ─────────────────────────────────────────────────────────
  # start: 开始页（标题、开始按钮、关卡选择）
  # ─────────────────────────────────────────────────────────
  - id: start
    layout:
      viewport: "full"
      board-bbox: "none"
      hud-bbox: "none"
      safe-area: { x: "10%", y: "10%", width: "80%", height: "80%" }
      preset: center-single
    zones:
      - id: title-area
        shape: rect
        geometry: { x: "50%", y: "25%", width: "80%", height: "auto" }
      - id: start-btn
        shape: rect
        geometry: { x: "50%", y: "55%", width: 200, height: 60 }
      - id: level-select
        shape: rect
        geometry: { x: "50%", y: "70%", width: "60%", height: "auto" }
    ui-slots:
      - { id: title, position: center, binds: "config.title", text: "Pixel Flow" }
      - { id: start-btn, position: center, binds: "@ui(start-btn)", text: "开始游戏" }
      - { id: level-select, position: center, binds: "@ui(level-select)" }
    state-on-enter: ready
    enter-transition:
      type: fade-in
      duration: 400
    exit-transition:
      type: fade-out
      duration: 300
    enter-sequence:
      - { target: title-area, delay: 0, animation: "scale-bounce" }
      - { target: start-btn, delay: 200, animation: "fade-slide-up" }
      - { target: level-select, delay: 400, animation: "fade-slide-up" }

  # ─────────────────────────────────────────────────────────
  # play: 主玩法页（6x6棋盘、四周传送带、5个等待槽、HUD）
  # ─────────────────────────────────────────────────────────
  - id: play
    layout:
      viewport: "full"
      # 中央棋盘区域：6x6网格，居中放置
      # 传送带环绕棋盘四周（外圈闭环轨道）
      board-bbox:
        x: "15%"
        y: "12%"
        width: "70%"
        height: "65%"
      # 顶部HUD：关卡信息、剩余小猪数
      hud-bbox:
        x: 0
        y: 0
        width: "100%"
        height: "10%"
      safe-area: { x: "2%", y: "2%", width: "96%", height: "96%" }
      preset: three-zone
    zones:
      # 中央棋盘（6x6网格）
      - id: board-grid
        shape: rect
        geometry: { x: "50%", y: "42%", width: "50%", height: "50%" }
      # 四周传送带（环绕棋盘的外圈闭环轨道）
      # 传送带分为4边：top/right/bottom/left，每边6个槽位
      - id: conveyor-top
        shape: rect
        geometry: { x: "50%", y: "15%", width: "52%", height: "8%" }
      - id: conveyor-right
        shape: rect
        geometry: { x: "77%", y: "42%", width: "8%", height: "52%" }
      - id: conveyor-bottom
        shape: rect
        geometry: { x: "50%", y: "68%", width: "52%", height: "8%" }
      - id: conveyor-left
        shape: rect
        geometry: { x: "23%", y: "42%", width: "8%", height: "52%" }
      # 底部等待槽区域（5个槽位）
      - id: waiting-slots
        shape: rect
        geometry: { x: "50%", y: "88%", width: "70%", height: "10%" }
      # 顶部HUD区域
      - id: hud-area
        shape: rect
        geometry: { x: "50%", y: "5%", width: "96%", height: "6%" }
    ui-slots:
      # 顶部HUD
      - { id: hud-level, position: top-left, binds: "state.level", text: "关卡 {level}" }
      - { id: hud-pig-count, position: top-right, binds: "state.totalPigs", text: "剩余小猪: {count}" }
      # 中央棋盘
      - { id: board-grid, position: center, binds: "@ui(board-grid)" }
      # 四周传送带
      - { id: conveyor-belt, position: center, binds: "@ui(conveyor-belt)" }
      # 底部等待槽
      - { id: waiting-slots, position: center-bottom, binds: "@ui(waiting-slots)" }
    state-on-enter: playing
    enter-transition:
      type: fade-in
      duration: 300
    exit-transition:
      type: fade-out
      duration: 300
    enter-sequence:
      - { target: hud-area, delay: 0, animation: "fade-in" }
      - { target: board-grid, delay: 100, animation: "fade-in" }
      - { target: conveyor-top, delay: 150, animation: "fade-in" }
      - { target: conveyor-right, delay: 150, animation: "fade-in" }
      - { target: conveyor-bottom, delay: 150, animation: "fade-in" }
      - { target: conveyor-left, delay: 150, animation: "fade-in" }
      - { target: waiting-slots, delay: 200, animation: "fade-slide-up" }

  # ─────────────────────────────────────────────────────────
  # result: 结算页（胜利/失败标题、得分、重试/下一关按钮）
  # ─────────────────────────────────────────────────────────
  - id: result
    layout:
      viewport: "full"
      board-bbox: "none"
      hud-bbox: "none"
      safe-area: { x: "10%", y: "15%", width: "80%", height: "70%" }
      preset: center-single
    zones:
      - id: result-panel
        shape: rect
        geometry: { x: "50%", y: "40%", width: "70%", height: "auto" }
      - id: result-title
        shape: rect
        geometry: { x: "50%", y: "25%", width: "80%", height: "auto" }
      - id: score-display
        shape: rect
        geometry: { x: "50%", y: "40%", width: "60%", height: "auto" }
      - id: retry-btn
        shape: rect
        geometry: { x: "35%", y: "60%", width: 150, height: 50 }
      - id: next-btn
        shape: rect
        geometry: { x: "65%", y: "60%", width: 150, height: 50 }
    ui-slots:
      - { id: result-title, position: center-top, binds: "state.isWin ? '胜利!' : '失败!'" }
      - { id: score-display, position: center, binds: "state.score", text: "得分: {score}" }
      - { id: retry-btn, position: center, binds: "@ui(retry-btn)", text: "重试" }
      - { id: next-btn, position: center, binds: "@ui(next-btn)", text: "下一关", visible-if: "state.isWin" }
    state-on-enter: "state.isWin ? win : lose"
    enter-transition:
      type: zoom-in
      duration: 500
    exit-transition:
      type: fade-out
      duration: 300
    enter-sequence:
      - { target: result-title, delay: 0, animation: "scale-bounce" }
      - { target: score-display, delay: 300, animation: "fade-in" }
      - { target: retry-btn, delay: 500, animation: "fade-slide-up" }
      - { target: next-btn, delay: 600, animation: "fade-slide-up", condition: "state.isWin" }

# ─────────────────────────────────────────────────────────
# 启动契约（codegen 必须严格遵守，verify 据此校验）
# ─────────────────────────────────────────────────────────
boot-contract:
  entry-scene: start
  ready-condition: "window.gameState.phase === 'ready'"
  start-action:
    trigger: click
    target: start-btn
    result: "phase -> playing; scene -> play"
  scene-transitions:
    # start -> play: 点击开始按钮
    - from: start
      to: play
      trigger: "click start-btn"
      guard: "phase === 'ready'"
    # play -> result: 胜利或失败
    - from: play
      to: result
      trigger: "phase === 'win' || phase === 'lose'"
      guard: null
    # result -> play: 点击重试按钮
    - from: result
      to: play
      trigger: "click retry-btn"
      guard: null
    # result -> play: 点击下一关按钮（胜利时）
    - from: result
      to: play
      trigger: "click next-btn"
      guard: "state.isWin"
