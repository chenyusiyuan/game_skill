    visual-primitive: ui-panel
    usage: "Panel 9-slice corner - bottom-right"

  # ── Buttons (@ui(start-btn), @ui(retry-btn), @ui(next-btn)) ──
  - id: button-left
    source: assets/library_2d/ui-pixel/tile_0013.png
    type: local-file
