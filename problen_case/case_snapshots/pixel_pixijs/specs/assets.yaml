# ── Fonts ──
fonts:
  - family: "Press Start 2P"
    source: google-fonts
    binding-to: decor
    usage: "Pixel game font for titles, HUD, buttons"

  - family: "Kenney Future"
    source: assets/library_2d/fonts/Kenney Future.ttf
    type: local-file
    binding-to: decor
    usage: "Alternative pixel font"

# ── Spritesheets ──
spritesheets: []

# ── Color Palette (from PRD color-scheme) ──
color-palette:
  primary: "#ef4444"      # Red - used for red pig/blocks
  secondary: "#facc15"    # Yellow - used for yellow pig/blocks
  accent: "#22c55e"       # Green - used for green pig/blocks
  blue: "#3b82f6"         # Blue - used for blue pig/blocks
  background: "#1a1a2e"   # Dark background
  surface: "#16213e"      # Panel background
  text: "#e2e8f0"         # Light text
  text-muted: "#94a3b8"   # Muted text
  success: "#22c55e"      # Success color
  error: "#ef4444"        # Error color
  border: "#334155"       # Border color

# ── Selection Report (required by check_asset_selection.js) ──
selection-report:
  genre: board-grid
  asset-style: pixel-retro

  candidate-packs:
    # Primary pack - UI elements
    - id: ui-pixel-adventure
      used: true
      reason: "pixel-retro + board-grid preferred UI pack; provides buttons, panels, progress bars, digits, icons"

    # Puzzle sprites - board-grid compatible!
    - id: sprites-puzzle
      used: true
      reason: "board-grid compatible pack; ballGrey.png used as pig unit base with dynamic color tinting"

    # Character sprites (not used - genre mismatch)
    - id: sprites-platformer-pixel
      used: false
      reason: "Genre mismatch: platform-physics pack not suitable for board-grid"

    # Town tiles (considered but not primary)
    - id: tiles-town
      used: false
      reason: "Contains NPC characters but style is 16x16 tiles, not suitable for pig unit rendering"

    # Dungeon tiles (considered but not primary)
    - id: tiles-dungeon
      used: false
      reason: "Contains enemies and items but darker theme; not suitable for colorful puzzle game"

    # Audio packs
    - id: audio-ui-clicks
      used: true
      reason: "Provides click/hover sounds for button interactions"

    - id: audio-ui-interface
      used: true
      reason: "Provides confirm/error sounds for game feedback"

    - id: audio-sfx
      used: true
      reason: "Provides attack/remove/game sounds"

    # Not used - wrong style
    - id: ui-pack
      used: false
      reason: "Modern vector style, does not match pixel-retro aesthetic"

    - id: sprites-platformer
      used: false
      reason: "Cartoon-bright style, does not match pixel-retro aesthetic"

    - id: sprites-puzzle
      used: false
      reason: "Contains ball/gem elements but not suitable for pig character representation"

    - id: cards
      used: false
      reason: "Card game assets not applicable to board-grid puzzle game"

  local-file-ratio:
    images: 0.76    # 41 local-file out of 54 images
    audio: 1.00     # 8 local-file out of 8 audio
    threshold:
      images: 0.60
      audio: 0.60

  pack-mix-reason: >
    Primary pack "ui-pixel-adventure" (38 local-files) provides all UI elements matching pixel-retro style.
    Pack "sprites-puzzle" (3 local-files) provides pig unit sprites - board-grid compatible with dynamic tinting.
    Audio packs provide standard pixel-retro sound feedback.

  fallback-reasons:
    # Generated assets
    - id: block-base
      type: generated
      reason: "Abstract color-block requires programmatic generation; gameplay depends on dynamic color field"

    # Generated assets - structural elements
    - id: bg-game
      type: generated
      reason: "Simple solid color background; generated from palette.background"

    - id: conveyor-track
      type: generated
      reason: "Track segments need to be generated programmatically for conveyor belt animation"

    - id: board-cell
      type: generated
      reason: "Grid cell backgrounds generated programmatically for 6x6 board"

    # Google font
    - id: Press Start 2P
      type: google-fonts
      reason: "Standard pixel font available via Google Fonts CDN; matches pixel-retro aesthetic"
