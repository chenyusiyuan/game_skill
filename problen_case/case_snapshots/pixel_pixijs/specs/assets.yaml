# ============================================================
# Assets Specification: pixel_pixijs-001
# Generated by game-gameplay-expander
# ============================================================

# ── Metadata from PRD ──
genre: board-grid
runtime: pixijs

color-scheme:
  palette-id: pixel-retro
  theme-keywords: [pixel, pig, conveyor, board, match, puzzle]
  primary: "#ef4444"
  secondary: "#facc15"
  accent: "#22c55e"
  background: "#1a1a2e"
  surface: "#16213e"
  text: "#e2e8f0"
  text-muted: "#94a3b8"
  success: "#22c55e"
  error: "#ef4444"
  border: "#334155"
  font-family: '"Press Start 2P", "VT323", monospace'
  border-radius: "0"
  shadow: "2px 2px 0 #000"
  fx-hint: pixel

asset-style: pixel-retro

# ── Asset Strategy from PRD ──
asset-strategy:
  mode: library-first
  visual-core-entities: [pig, block]
  visual-peripheral: [hud-info]
  style-coherence:
    level: strict
    note: "core entities use sprites-puzzle pack (board-grid compatible); HUD uses ui-pixel-adventure pack"

# ── Image Resources ──
images:
  # ═══════════════════════════════════════════════════════════
  # CORE ENTITIES (visual-core-entities)
  # ═══════════════════════════════════════════════════════════

  # ── Pig Unit (@entity(pig)) ──
  # Using sprites-puzzle pack (board-grid compatible) with dynamic color tinting
  # ballGrey.png is a neutral gray ball that can be tinted to any color
  # The pig entity has a `color` field (red/blue/yellow/green)
  - id: pig-base
    source: assets/library_2d/sprites/puzzle/ballGrey.png
    type: local-file
    binding-to: pig
    visual-primitive: color-unit
    color-source: entity.color
    usage: "Pig unit - gray ball sprite tinted dynamically by pig.color field, with ammo number overlay"

  # Pig animation frames - use same base with scale/offset animation
  - id: pig-walk-1
    source: assets/library_2d/sprites/puzzle/ballGrey.png
    type: local-file
    binding-to: pig
    visual-primitive: color-unit
    color-source: entity.color
    usage: "Pig walk animation frame 1 - slight scale bounce"

  - id: pig-walk-2
    source: assets/library_2d/sprites/puzzle/ballGrey.png
    type: local-file
    binding-to: pig
    visual-primitive: color-unit
    color-source: entity.color
    usage: "Pig walk animation frame 2 - slight offset for movement animation"

  # ── Target Block (@entity(block)) ──
  # CRITICAL: block is a color-block entity where gameplay depends on color matching
  # Must use generated graphics, NOT local-file texture
  # The block entity has color (red/blue/yellow/green) and hp fields
  - id: block-base
    source: generated
    type: generated
    binding-to: block
    visual-primitive: color-block
    color-source: entity.color
    usage: "Target block - solid color square rendered programmatically, color from block.color field, HP indicator overlay"

  # ═══════════════════════════════════════════════════════════
  # UI ELEMENTS (from ui-pixel-adventure pack)
  # ═══════════════════════════════════════════════════════════

  # ── Panel 9-slice (for HUD backgrounds, dialogs) ──
  - id: panel-top-left
    source: assets/library_2d/ui-pixel/tile_0000.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-panel
    usage: "Panel 9-slice corner - top-left"

  - id: panel-top
    source: assets/library_2d/ui-pixel/tile_0001.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-panel
    usage: "Panel 9-slice edge - top"

  - id: panel-top-right
    source: assets/library_2d/ui-pixel/tile_0002.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-panel
    usage: "Panel 9-slice corner - top-right"

  - id: panel-left
    source: assets/library_2d/ui-pixel/tile_0003.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-panel
    usage: "Panel 9-slice edge - left"

  - id: panel-center
    source: assets/library_2d/ui-pixel/tile_0004.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-panel
    usage: "Panel 9-slice fill - center"

  - id: panel-right
    source: assets/library_2d/ui-pixel/tile_0005.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-panel
    usage: "Panel 9-slice edge - right"

  - id: panel-bottom-left
    source: assets/library_2d/ui-pixel/tile_0006.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-panel
    usage: "Panel 9-slice corner - bottom-left"

  - id: panel-bottom
    source: assets/library_2d/ui-pixel/tile_0007.png
    type: local-file
    binding-to: decor
    visual-primitive: ui-panel
    usage: "Panel 9-slice edge - bottom"

  - id: panel-bottom-right
    source: assets/library_2d/ui-pixel/tile_0008.png
    type: local-file
