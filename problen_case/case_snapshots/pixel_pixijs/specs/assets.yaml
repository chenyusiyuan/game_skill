    source: assets/library_2d/audio/ui-clicks/click1.ogg
    type: local-file
    binding-to: decor
    usage: "Button click sound"

  - id: sfx-hover
    source: assets/library_2d/audio/ui-clicks/rollover1.ogg
    type: local-file
    binding-to: decor
    usage: "Button hover sound"

  - id: sfx-confirm
    source: assets/library_2d/audio/ui-interface/confirmation_002.ogg
    type: local-file
    binding-to: decor
    usage: "Success/confirm sound (pig deploy, match success)"

  - id: sfx-error
    source: assets/library_2d/audio/ui-interface/error_004.ogg
    type: local-file
    binding-to: decor
