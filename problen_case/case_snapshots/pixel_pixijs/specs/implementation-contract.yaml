contract-version: 1
runtime:
  engine: pixijs
  run-mode: local-http
boot:
  entry-scene: start
  ready-condition: window.gameState.phase === 'ready'
  start-action:
    trigger: click
    target: start-btn
    result: phase -> playing; scene -> play
  scene-transitions:
    - from: start
      to: play
      trigger: click start-btn
      guard: phase === 'ready'
    - from: play
      to: result
      trigger: phase === 'win' || phase === 'lose'
      guard: null
    - from: result
      to: play
      trigger: click retry-btn
      guard: null
    - from: result
      to: play
      trigger: click next-btn
      guard: state.isWin
