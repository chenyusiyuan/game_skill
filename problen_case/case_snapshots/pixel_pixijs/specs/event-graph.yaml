# check_playthrough.js 用 trace 覆盖率判定玩法是否真的跑起来。
# prd_hash: 0c4fb29bc7628ea259b2d4780a9836bc7d3b71bc
# generated_at: 2026-04-27T09:40:53.428Z
rule-traces:
  - rule-id: pig-deploy
    trigger: "玩家点击等待槽中的小猪且 conveyor.pigs.length < conveyor.capacity"
    effect: "\"pig.state = 'on-belt' ; conveyor.pigs.push(pig) ; slot.pig = null ; slot.occupied = false\""
    actions:
      - { subject: pig, field: state, op: assign, rhs: "on-belt" }
      - { subject: slot, field: pig, op: assign, rhs: "null" }
      - { subject: slot, field: occupied, op: assign, rhs: "false" }
  - rule-id: pig-move
    trigger: "游戏tick且pig.state = 'on-belt'"
    effect: "\"pig.position.slot += 1\""
    actions: []
  - rule-id: pig-move-edge
    trigger: "pig.position.slot > 5"
    effect: "\"pig.position.slot = 0 ; pig.position.edge = nextEdge(pig.position.edge)\""
    actions: []
  - rule-id: pig-attack
    trigger: "小猪移动到新位置且pig.ammo > 0"
    effect: "\"target = findFirstBlock(pig.position)\""
    actions: []
  - rule-id: pig-attack-hit
    trigger: "target != null AND target.color == pig.color"
    effect: "\"pig.ammo -= 1 ; target.hp -= 1\""
    actions:
      - { subject: pig, field: ammo, op: dec, rhs: "1" }
      - { subject: target, field: hp, op: dec, rhs: "1" }
  - rule-id: block-remove
    trigger: "target.hp <= 0"
    effect: "\"target.removed = true\""
    actions:
      - { subject: target, field: removed, op: assign, rhs: "true" }
  - rule-id: pig-recycle
    trigger: "小猪绕传送带一周且pig.ammo > 0"
    effect: "\"pig.state = 'recycled' ; conveyor.pigs.remove(pig)\""
    actions:
      - { subject: pig, field: state, op: assign, rhs: "recycled" }
  - rule-id: pig-recycle-slot
    trigger: "pig.state = 'recycled'"
    effect: "\"slot = findEmptySlot() ; slot.pig = pig ; slot.occupied = true\""
    actions:
      - { subject: slot, field: pig, op: assign, rhs: "pig" }
      - { subject: slot, field: occupied, op: assign, rhs: "true" }
  - rule-id: pig-exhaust
    trigger: "pig.ammo <= 0"
    effect: "\"pig.state = 'exhausted' ; conveyor.pigs.remove(pig)\""
    actions:
      - { subject: pig, field: state, op: assign, rhs: "exhausted" }
  - rule-id: win-check
    trigger: "所有目标块 target.removed == true"
    effect: "\"gameState.phase = 'win'\""
    actions:
      - { subject: gameState, field: phase, op: assign, rhs: "win" }
  - rule-id: lose-check
    trigger: "所有等待槽为空 AND 传送带为空 AND 棋盘仍有未消除目标块"
    effect: "\"gameState.phase = 'lose'\""
    actions:
      - { subject: gameState, field: phase, op: assign, rhs: "lose" }
