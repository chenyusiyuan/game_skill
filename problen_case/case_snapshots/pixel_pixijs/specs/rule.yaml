# Rule Spec: pixel_pixijs-001
# Generated by game-gameplay-expander
# Conforms to expand.md format with trigger/condition/effect-on-true/effect-on-false

version: 1
project: pixel_pixijs-001
dimension: rule

# Spec Clarifications consumed:
# - pig-attack: Attack check triggers when pig enters a new edge (top/right/bottom/left), not every slot movement
# - pig-move: Pig moves 1 slot per game tick (60 ticks per second typical)
# - pig-recycle: Pig completes one full loop when it returns to its starting edge after visiting all 4 edges
# - Multiple Pigs on Conveyor: Multiple pigs can coexist on the conveyor belt without blocking each other
# - lose-check: Lose condition checked after all pigs are exhausted and conveyor is empty, not during active gameplay

# Hard-rules enforced via primitive-node-ref:
# - @constraint(no-global-autoaim): attack-raycast uses direction.mode = normal-to-track
# - @constraint(single-target-attack): attack-raycast uses stop-on = first-hit
# - @constraint(no-pierce-attack): attack-raycast invariant no-penetration

rules:
  # ─────────────────────────────────────────────────────────────────
  # Rule 1: pig-deploy - 小猪派出
  # Player clicks a pig in waiting slot -> pig enters conveyor belt
  # ─────────────────────────────────────────────────────────────────
  - id: pig-deploy
    description: "将等待槽中的小猪移动到传送带入口位置"
    trigger: "input.click-pig AND pig.lifecycle === 'waiting' AND conveyor.active.length < conveyor.capacity"
    condition: "slot.occupied === true AND slot.pig !== null"
    spec-clarification-ref: "Multiple Pigs on Conveyor - each pig moves independently"
    effect-on-true:
      logic:
        - "pig.lifecycle = 'active'"
        - "pig.t = 0"
        - "pig.segmentId = 'top'"
        - "conveyor.active.push(pig)"
        - "slot.occupantId = null"
        - "slot.pig = null"
        - "slot.occupied = false"
      visual:
        - "pig sprite moves from waiting-slot to conveyor entry point"
        - "scale-bounce on pig sprite duration=200ms"
        - "waiting-slot flash green border 100ms"
    effect-on-false:
      logic:
        - "if conveyor.active.length >= conveyor.capacity: emit capacity-blocked-feedback"
      visual:
        - "screen-shake intensity=1 duration=100ms"
        - "conveyor capacity indicator pulse-red 200ms"
    primitive-node-ref: conveyor-capacity
    testable: true
    test-hint: "Simulate click on occupied waiting-slot, verify pig.lifecycle changes to 'active' and conveyor.active.length increases"

  # ─────────────────────────────────────────────────────────────────
  # Rule 2: pig-move - 小猪移动（每tick）
  # Pig moves along the conveyor belt track
  # ─────────────────────────────────────────────────────────────────
  - id: pig-move
    description: "小猪沿传送带持续移动，每tick移动一个槽位"
    trigger: "game.tick AND pig.lifecycle === 'active'"
    condition: "pig.alive === true"
    spec-clarification-ref: "pig-move - Pig moves 1 slot per game tick"
    effect-on-true:
      logic:
        - "pig.t += pig.speed * dt"
        - "if pig.t > 1.0: pig.t = pig.t - 1.0"
        - "pig.segmentId = getSegmentFromT(pig.t)"
        - "pig.gridPosition = projectToGrid(pig.t, pig.segmentId)"
      visual:
        - "pig sprite position updates along track path"
    effect-on-false:
      logic: []
      visual: []
    primitive-node-ref: conveyor-track
    testable: true
    test-hint: "Advance game tick, verify pig.t increases and position updates"

  # ─────────────────────────────────────────────────────────────────
  # Rule 3: pig-move-edge - 小猪换边
  # Pig transitions from one edge to the next
  # ─────────────────────────────────────────────────────────────────
  - id: pig-move-edge
    description: "小猪移动到传送带边界时切换到下一条边"
    trigger: "track.enter-segment"
    condition: "pig.lifecycle === 'active'"
    spec-clarification-ref: "pig-attack - Attack check triggers when pig enters a new edge"
    effect-on-true:
      logic:
        - "pig.segmentId = newSegmentId"
        - "emit track.enter-segment for this pig"
      visual:
        - "pig sprite direction changes to face new edge normal"
        - "optional: slight rotation animation on edge transition"
    effect-on-false:
      logic: []
      visual: []
    primitive-node-ref: conveyor-track
    testable: true
    test-hint: "Move pig to edge boundary, verify segmentId changes (top->right->bottom->left->top)"

  # ─────────────────────────────────────────────────────────────────
  # Rule 4: pig-attack - 攻击检测（找目标）
  # When pig enters new edge, find first target in facing direction
  # ─────────────────────────────────────────────────────────────────
  - id: pig-attack
    description: "小猪进入新边时，检查正对方向第一个目标块"
    trigger: "track.enter-segment"
    condition: "pig.lifecycle === 'active' AND pig.ammo > 0"
    spec-clarification-ref: "pig-attack - Attack check triggers when pig enters a new edge, not every slot movement"
    hard-rule-enforcement:
      - "@constraint(no-global-autoaim): direction depends on pig.segmentId, no global find"
      - "@constraint(single-target-attack): ray-cast returns exactly one target"
      - "@constraint(no-pierce-attack): ray-cast must not skip intermediate blocks"
    effect-on-true:
      logic:
        - "target = rayCast(pig.position, direction.normal-to-track, blocks, stop-on: first-hit)"
        - "if target: emit ray.hit-candidate(pig, target)"
        - "else: emit ray.miss(pig)"
      visual:
        - "if target found: draw line from pig to target (debug/optional)"
        - "if target found: target highlight pulse 100ms"
    effect-on-false:
      logic: []
      visual: []
    primitive-node-ref: attack-raycast
    testable: true
    test-hint: "Place pig at edge, place block in facing direction, verify ray.hit-candidate emitted with correct target"

  # ─────────────────────────────────────────────────────────────────
  # Rule 5: pig-attack-hit - 攻击命中
  # Color match check and damage application
  # ─────────────────────────────────────────────────────────────────
  - id: pig-attack-hit
    description: "颜色匹配时，小猪消耗1点弹药攻击目标块"
    trigger: "ray.hit-candidate"
    condition: "target.color === pig.color"
    spec-clarification-ref: "Hard-Rule Compliance - pig-attack-hit affects exactly one target"
    hard-rule-enforcement:
      - "@constraint(single-target-attack): target.hp -= 1 affects exactly one block"
    effect-on-true:
      logic:
        - "pig.ammo -= 1"
        - "target.hp -= 1"
        - "emit match.hit(pig, target)"
        - "emit resource.consumed"
        - "if target.hp <= 0: emit resource.target-zero(target)"
        - "if pig.ammo <= 0: emit resource.agent-zero(pig)"
      visual:
        - "particle-burst at target position, color: pig.color, count: 8"
        - "tint-flash white on target sprite duration=150ms"
        - "float-text '-1' at target position"
        - "screen-shake intensity=1 duration=50ms"
    effect-on-false:
      logic:
        - "emit match.miss(pig, target)"
      visual:
        - "tint-flash red on target sprite duration=200ms"
        - "float-text 'X' at target position, color: #ef4444"
    primitive-node-ref: color-match
    testable: true
    test-hint: "Set pig.color === block.color, trigger attack, verify block.hp decreases and match.hit emitted"

  # ─────────────────────────────────────────────────────────────────
  # Rule 6: block-remove - 目标块消除
  # Block removal when HP reaches zero
  # ─────────────────────────────────────────────────────────────────
  - id: block-remove
    description: "目标块耐久归零后立即消除"
    trigger: "resource.target-zero"
    condition: "target.hp <= 0"
    effect-on-true:
      logic:
        - "target.alive = false"
        - "target.removed = true"
        - "remove target from board cells"
        - "emit board.cell-removed(target)"
        - "state.score += 10"
      visual:
        - "scale-bounce on target sprite scale=1.2 duration=100ms"
        - "fade-out on target sprite duration=300ms"
        - "particle-burst at target position, color: target.color, count: 12"
        - "float-text '+10' at target position, color: #22c55e"
    effect-on-false:
      logic: []
      visual: []
    primitive-node-ref: board
    testable: true
    test-hint: "Set block.hp = 0, trigger removal, verify block.alive = false and board.cell-removed emitted"

  # ─────────────────────────────────────────────────────────────────
  # Rule 7: pig-recycle - 小猪回收
  # Pig returns to waiting slot after completing full loop with remaining ammo
  # ─────────────────────────────────────────────────────────────────
  - id: pig-recycle
    description: "小猪绕完一圈后，若仍有剩余弹药，准备返回等待槽"
    trigger: "track.loop-complete"
    condition: "pig.ammo > 0 AND pig.lifecycle === 'active'"
    spec-clarification-ref: "pig-recycle - Pig completes one full loop when it returns to its starting edge after visiting all 4 edges"
    effect-on-true:
      logic:
        - "pig.lifecycle = 'returning'"
        - "conveyor.active.remove(pig)"
        - "emit lifecycle.entered.returning(pig)"
      visual:
        - "pig sprite tint-flash green duration=200ms"
        - "float-text 'Recycle' above pig"
    effect-on-false:
      logic: []
      visual: []
    primitive-node-ref: pig-lifecycle
    testable: true
    test-hint: "Set pig.ammo > 0, complete full track loop, verify pig.lifecycle = 'returning'"

  # ─────────────────────────────────────────────────────────────────
  # Rule 8: pig-recycle-slot - 小猪回槽
  # Pig enters an empty waiting slot
  # ─────────────────────────────────────────────────────────────────
  - id: pig-recycle-slot
    description: "小猪进入等待槽的空位"
    trigger: "lifecycle.entered.returning"
    condition: "exists empty slot in waiting-pool.slots"
    effect-on-true:
      logic:
        - "slot = findEmptySlot(waiting-pool)"
        - "slot.occupantId = pig.id"
        - "slot.pig = pig"
        - "slot.occupied = true"
        - "pig.lifecycle = 'waiting'"
        - "pig.gridPosition = { row: -1, col: 0 }"
        - "emit pool.bound(slot, pig)"
        - "emit lifecycle.entered.waiting(pig)"
      visual:
        - "pig sprite moves from conveyor exit to waiting-slot position"
        - "scale-bounce on pig sprite duration=200ms"
        - "waiting-slot flash green border 100ms"
    effect-on-false:
      logic:
        - "emit pool.overflow(pig)"
      visual:
        - "float-text 'No slot!' above pig, color: #ef4444"
        - "pig sprite fade-out duration=300ms"
    primitive-node-ref: waiting-slots
    testable: true
    test-hint: "Set pig.lifecycle = 'returning', verify pig enters empty slot and lifecycle = 'waiting'"

  # ─────────────────────────────────────────────────────────────────
  # Rule 9: pig-exhaust - 小猪耗尽
  # Pig exhausts ammo and leaves the game
  # ─────────────────────────────────────────────────────────────────
  - id: pig-exhaust
    description: "小猪弹药耗尽后直接离场消失"
    trigger: "resource.agent-zero"
    condition: "pig.ammo <= 0"
    effect-on-true:
      logic:
        - "pig.lifecycle = 'dead'"
        - "pig.alive = false"
        - "conveyor.active.remove(pig)"
        - "emit lifecycle.entered.dead(pig)"
      visual:
        - "pig sprite fade-out duration=300ms"
        - "particle-burst at pig position, color: #94a3b8, count: 6"
        - "float-text 'Exhausted' above pig"
    effect-on-false:
      logic: []
      visual: []
    primitive-node-ref: pig-lifecycle
    testable: true
    test-hint: "Set pig.ammo = 0, trigger exhaust, verify pig.lifecycle = 'dead' and removed from conveyor"

  # ─────────────────────────────────────────────────────────────────
  # Rule 10: win-check - 胜利判定
  # All blocks cleared -> player wins
  # ─────────────────────────────────────────────────────────────────
  - id: win-check
    description: "所有目标块消除后，游戏胜利"
    trigger: "board.cell-removed"
    condition: "all blocks have block.alive === false"
    effect-on-true:
      logic:
        - "state.phase = 'win'"
        - "state.isWin = true"
        - "emit win"
        - "trigger scene transition to result"
      visual:
        - "screen-shake intensity=3 duration=200ms"
        - "particle-burst at board center, color: #22c55e, count: 30"
        - "float-text 'CLEARED!' at screen center, color: #22c55e, scale: 2.0"
        - "all remaining pigs play victory animation"
    effect-on-false:
      logic: []
      visual: []
    primitive-node-ref: end-check
    testable: true
    test-hint: "Clear all blocks, verify state.phase = 'win' and win event emitted"

  # ─────────────────────────────────────────────────────────────────
  # Rule 11: lose-check - 失败判定
  # No pigs left but blocks remain -> player loses
  # ─────────────────────────────────────────────────────────────────
  - id: lose-check
    description: "资源耗尽但棋盘未清空，游戏失败"
    trigger: "resource.agent-zero OR lifecycle.entered.dead"
    condition: "waiting-pool has no pigs AND conveyor.active is empty AND some blocks have block.alive === true"
    spec-clarification-ref: "lose-check - Lose condition checked after all pigs are exhausted and conveyor is empty, not during active gameplay"
    effect-on-true:
      logic:
        - "state.phase = 'lose'"
        - "state.isWin = false"
        - "emit lose"
        - "trigger scene transition to result"
      visual:
        - "screen-shake intensity=2 duration=300ms"
        - "tint-flash red on entire board duration=500ms"
        - "float-text 'GAME OVER' at screen center, color: #ef4444, scale: 2.0"
    effect-on-false:
      logic: []
      visual: []
    primitive-node-ref: end-check
    testable: true
    test-hint: "Exhaust all pigs with blocks remaining, verify state.phase = 'lose' and lose event emitted"

# ─────────────────────────────────────────────────────────────────
# State definitions referenced by rules
# ─────────────────────────────────────────────────────────────────
states:
  - id: phase
    type: enum
    values: [ready, playing, win, lose]
    initial: ready

  - id: pig-lifecycle
    type: enum
    values: [waiting, active, returning, dead]
    initial: waiting

  - id: pig-segment
    type: enum
    values: [top, right, bottom, left]
    initial: null

# ─────────────────────────────────────────────────────────────────
# Constraints enforced by rules (reference to PRD @constraint)
# ─────────────────────────────────────────────────────────────────
constraints:
  - id: no-global-autoaim
    kind: hard-rule
    severity: critical
    enforced-by:
      - rule: pig-attack
        mechanism: "ray-cast direction.mode = normal-to-track, depends on pig.segmentId"
      - primitive: attack-raycast
        field: direction.mode
        expected: normal-to-track

  - id: single-target-attack
    kind: hard-rule
    severity: critical
    enforced-by:
      - rule: pig-attack-hit
        mechanism: "target.hp -= 1 affects exactly one block"
      - primitive: attack-raycast
        field: stop-on
        expected: first-hit

  - id: no-pierce-attack
    kind: hard-rule
    severity: critical
    enforced-by:
      - primitive: attack-raycast
        invariant: no-penetration
        mechanism: "ray-cast returns first non-removed block, does not skip intermediate blocks"

  - id: core-mechanics
    kind: hard-rule
    severity: critical
    enforced-by:
      - rule: pig-deploy
      - rule: pig-move
      - rule: pig-attack
      - rule: pig-recycle
      - rule: pig-recycle-slot

# ─────────────────────────────────────────────────────────────────
# Rule execution order (by priority)
# ─────────────────────────────────────────────────────────────────
execution-order:
  - pig-deploy        # priority 1
  - pig-move          # priority 2
  - pig-move-edge     # priority 3
  - pig-attack        # priority 4
  - pig-attack-hit    # priority 5
  - block-remove      # priority 6
  - pig-recycle       # priority 7
  - pig-recycle-slot  # priority 8
  - pig-exhaust       # priority 9
  - win-check         # priority 10
  - lose-check        # priority 10 (same as win-check, both evaluate after state changes)
