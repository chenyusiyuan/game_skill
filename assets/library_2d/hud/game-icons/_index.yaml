    tags: [social, share, shop, cart, multiplayer]
  - name: devices
    files: [mouse.png, tablet.png, phone.png]
    cn: "设备"
    tags: [device, mouse, tablet, phone, platform]
  - name: menu
    files: [barsHorizontal.png, barsVertical.png, menuGrid.png, menuList.png, scrollHorizontal.png, scrollVertical.png]
