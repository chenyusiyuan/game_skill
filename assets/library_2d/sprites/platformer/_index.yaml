# Platformer Sprites - 精灵语义索引
# 来源: kenney_new-platformer-pack-1.1
# 格式: 独立 PNG 精灵图（语义文件名），共 433 张
# 文件名: {类别}_{描述}.png（非编号瓦片，文件名即语义）
#
# ── 风格与适用范围 ──
# 视觉风格: cartoon-bright（卡通明亮，矢量感描边）
# 适用游戏类型: platform-physics（横版物理平台跳跃）、single-reflex（单人反应类）
# 不适用: 俯视角RPG（请用 tiny-dungeon/tiny-town）、像素复古风格（请用 sprites/platformer-pixel）
#
# ── 分组概要（用途与组合关系）──
#
# 背景 backgrounds (14张):
#   文件模式: background_*.png
#   用途: 关卡背景层，铺满屏幕或做视差滚动
#   子类: clouds(云层装饰) / color_{theme}(彩色渐变,4主题) / fade_{theme}(淡入渐变,4主题) / solid_{surface}(纯色填充,5种)
#   主题: desert(沙漠)/hills(丘陵)/mushrooms(蘑菇)/trees(森林)
#   提示: color_* 适合前景背景层，fade_* 适合远景层做视差；solid_* 可做地下/洞穴区域纯色背景
#
# 角色 characters (45张):
#   文件模式: character_{color}_{action}.png
#   用途: 玩家可操控主角，5色可做多人/皮肤切换
#   颜色(5): beige(米色)/green(绿色)/pink(粉色)/purple(紫色)/yellow(黄色)
#   动作(9): climb_a + climb_b(攀爬动画) / duck(蹲下) / front(正面) / hit(受击) / idle(站立) / jump(跳跃) / walk_a + walk_b(行走动画)
#   动画: walk_a+walk_b 交替做行走；climb_a+climb_b 交替做攀爬；idle 单帧静止
#   搭配: 与 terrain_* 地形拼关卡，与 hud_player_* 做UI头像，与 coin/gem/key 做收集交互
#
# 敌人 enemies (~54张):
#   文件模式: {敌人名}_{动作}.png
#   用途: 关卡中的敌方NPC，各有静止/移动/攻击帧
#   种类:
#     水生: barnacle(藤壶,3张attack_a/b+rest) / fish_blue(蓝鱼,3张) / fish_purple(紫鱼,3张) / fish_yellow(黄鱼,3张)
#     飞行: bee(蜜蜂,3张a/b+rest) / fly(苍蝇,3张) / ladybug(瓢虫,4张fly+rest+walk×2)
#     地面: frog(青蛙,3张idle+jump+rest) / mouse(老鼠,3张) / snail(蜗牛,4张rest+shell+walk×2)
#     史莱姆: slime_block(方块,4张jump+rest+walk×2) / slime_fire(火焰,4张flat+rest+walk×2) / slime_normal(普通,4张) / slime_spike(尖刺,4张)
#     蠕虫: worm_normal(普通蠕虫,3张move_a/b+rest) / worm_ring(环纹蠕虫,3张move_a/b+rest)
#   提示: 每种敌人2-4帧，rest/idle为静止态，其余交替播放做动画；slime有4种变体可做难度递增
#
# 方块 blocks (24张):
#   文件模式: block_*.png
#   用途: 可交互功能方块（问号块/金币块/陷阱块等）
#   普通块(16): blue/green/red/yellow(颜色块) / coin+coin_active(金币块) / empty+empty_warning(空块) /
#              exclamation+exclamation_active(感叹号块) / fall(掉落块) / idle(普通块) / plank+planks(木板) / rest(静止块) / spikes(尖刺块)
#   加固块(8): block_strong_coin/danger/empty/exclamation 各有普通+active两态
#   提示: _active 表示被击打后的激活状态；block_strong_* 是更坚固的变体，需多次击打
#
# 砖块 bricks (6张):
#   文件模式: brick_*.png / bricks_*.png
#   用途: 墙面/地形装饰砖块
#   变体: brown(棕色) / grey(灰色)，各有普通+diagonal(对角线纹理) + 复数bricks(多砖)
#
# 地形 terrain (168张):
#   文件模式: terrain_{material}_{shape}.png
#   用途: 构建关卡地面、平台、悬崖、斜坡等固体地形，是关卡的核心骨架
#   材质(6): dirt(泥土) / grass(草地) / purple(紫色) / sand(沙地) / snow(雪地) / stone(石头)
#   每种材质(28块):
#     大块九宫格(10): block + block_bottom/left/right/top + block_bottom_left/bottom_right/top_left/top_right + block_center
#     云朵平台(5): cloud + cloud_background + cloud_left/middle/right
#     水平平台(5): horizontal_left/middle/right + horizontal_overhang_left/overhang_right
#     坡道(5): ramp_long_a/b/c + ramp_short_a/b
#     垂直柱(3): vertical_bottom/middle/top
#   提示: 同关卡统一用一种材质；grass做地上、dirt做地下、snow做雪关、sand做沙漠关、stone做城堡关、purple做奇幻关
#   搭配: 与 background_color_* / background_fade_* 搭配对应主题；cloud_* 做浮空装饰平台
#
# 收集物 collectibles (16张):
#   文件模式: coin_*.png / gem_*.png / key_*.png / heart.png / star.png
#   用途: 玩家拾取的奖励物品
#   硬币(6): bronze/gold/silver 各有正面+side(侧面)，交替播放做旋转动画
#   宝石(4): blue/green/red/yellow — 高价值收集物或解锁条件
#   钥匙(4): blue/green/red/yellow — 与 lock_* 颜色配对使用
#   特殊(2): heart(生命) / star(星星/无敌)
#
# 道具/机关 props (31张):
#   用途: 关卡中的交互机关与危险物
#   炸弹(2): bomb + bomb_active — 定时炸弹
#   门(4): door_closed/open + door_closed_top/open_top — 上下两部分拼接成完整门
#   锁(4): lock_blue/green/red/yellow — 与 key_* 颜色配对
#   拉杆(3): lever + lever_left/right — 三态开关
#   按钮(8): switch_{blue/green/red/yellow} + _pressed — 4色地面按钮
#   弹簧(2): spring + spring_out — 弹跳增强
#   锯片(4): saw + saw_a/b + saw_rest — 旋转危险物，a/b交替做旋转动画
#   其他(4): spikes(地刺) / fireball(火球) / weight(重物) / conveyor(传送带)
#
# 环境装饰 environment (~36张):
#   用途: 丰富场景视觉，不影响核心玩法
#   桥梁(2): bridge + bridge_logs — 木桥/圆木桥
#   植被(6): bush(灌木) / cactus(仙人掌) / grass+grass_purple(草丛) / mushroom_brown+mushroom_red(蘑菇)
#   结构(7): chain(锁链) / fence+fence_broken(围栏) / ladder_bottom/middle/top(梯子三段) / window(窗户)
#   地形装饰(6): hill+hill_top+hill_top_smile(小丘) / ramp(斜坡) / rock(岩石) / snow(积雪)
#   绳索(2): rop_attached(固定绳索) / rope(悬挂绳索)
#   告示牌(4): sign + sign_exit/left/right — 方向/出口指示
#   照明(3): torch_off + torch_on_a/torch_on_b — 火把灭/亮(a/b交替做火焰动画)
#   液体(6): lava+lava_top+lava_top_low(岩浆) / water+water_top+water_top_low(水) — top做表面，base做填充，top_low做浅层
#
# 旗帜 flags (9张):
#   文件模式: flag_*.png
#   用途: 关卡检查点/终点标记
#   颜色(4): blue/green/red/yellow 各有 a/b 两帧做飘动动画
#   特殊(1): flag_off — 未激活状态
#   提示: 玩家到达后从 flag_off 切换为对应颜色的 a/b 动画
#
# HUD界面 (30张):
#   文件模式: hud_*.png
#   用途: 游戏内抬头显示（分数/生命/道具栏）
#   数字(10): hud_character_0 ~ hud_character_9 — 计分/倒计时
#   符号(2): hud_character_multiply(乘号) / hud_character_percent(百分号)
#   状态(3): hud_coin(金币图标) / hud_heart+hud_heart_empty+hud_heart_half(生命三态)
#   钥匙(4): hud_key_blue/green/red/yellow — 已收集钥匙指示
#   头像(5): hud_player_beige/green/pink/purple/yellow — 玩家头像
#   头盔头像(5): hud_player_helmet_beige/green/pink/purple/yellow — 带头盔的玩家头像变体
#   提示: 数字+multiply组合做 "×99" 格式显示；heart三态做血量条；与 character_* 颜色对应选头像

