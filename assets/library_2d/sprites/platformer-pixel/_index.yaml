# Pixel Platformer Characters - 瓦片语义索引
# 来源: kenney_pixel-platformer (Characters tilemap)
# 网格: 9列 × 3行, 每格 24×24px, 共 27 个瓦片
# 文件名: tile_{编号:04d}.png
#
# ── 风格与适用范围 ──
# 视觉风格: pixel-retro（像素复古）
# 适用游戏类型: 横版平台跳跃、像素动作游戏
# 不适用: 俯视角游戏（请用 tiny-dungeon/tiny-town 的角色代替）
#
# ── 分组概要（用途与组合关系）──
#
# 玩家角色 - 5色 (0000-0014):
#   用途: 主角，可选不同颜色作为皮肤/多人区分
#   颜色: 米色(0000-0002)/蓝色(0003-0005)/绿色(0006-0008)/粉色(0009-0011)/黄色(0012-0014)
#   每色3帧: idle(站立) + walk_1 + walk_2
#   动画: idle 单帧静止；walk_1 和 walk_2 交替播放做行走动画
#   搭配: 与 tiles/platformer-pixel/ 的地形(0000-0079)和道具(0080-0099)组合构建完整关卡
#
# 敌人角色 (0015-0026):
#   用途: 关卡中的敌方NPC
#   僵尸(0015-0017): 地面慢速敌人，3帧(idle+walk×2)
#   幽灵(0018-0020): 飞行穿墙敌人，3帧(idle+float×2)
#   骷髅(0021-0023): 地面中速敌人，3帧(idle+walk×2)
#   蝙蝠(0024-0026): 飞行快速敌人，3帧(idle+fly×2)
#   搭配: 与 tiles/platformer-pixel/ 的敌人(0140-0149)不同——本文件是角色大小(24px)，那边是瓦片大小(18px)的简单敌人

