# Tiny Town - 瓦片语义索引
# 来源: kenney_tiny-town
# 网格: 12列 × 11行, 每格 16×16px, 共 132 个瓦片
# 文件名: tile_{编号:04d}.png
#
# ── 风格与适用范围 ──
# 视觉风格: pixel-retro（像素复古）
# 适用游戏类型: 模拟经营、城镇建设、俯视角RPG、棋盘格冒险、叙事冒险
# 不适用: 地牢/室内场景（请用 tiny-dungeon 代替）、横版平台跳跃（请用 pixel-platformer 代替）
#
# ── 分组概要（用途与组合关系）──
#
# 地形基础 (0000-0011):
#   用途: 地图的基础铺地层
#   组合: 草地(0000-0003)做大片绿地；泥土(0004-0005)做路径/耕地；沙地(0006-0007)做海滩/沙漠；水面(0008-0009)做湖泊/河流；水岸(0010-0011)做水陆过渡
#   提示: 草地变体(0000-0002)随机铺设更自然；带花草地(0003)做公园/花园点缀
#
# 道路系统 (0012-0023):
#   用途: 连接建筑和区域的交通网络
#   组合: 直路(0012水平/0013垂直) + 弯道(0014-0017四方向) + 十字路口(0018) + T形路口(0019-0022) + 桥(0023过河)
#   提示: 道路系统是完整的，可以组合出任意路网拓扑
#
# 居民建筑 (0024-0035):
#   用途: 城镇的核心建筑物
#   层次: 民居(0024-0028,从小到大)→商业(0029商店/0030旅馆/0031铁匠铺)→宗教(0032教堂)→军事(0033塔楼/0034城墙/0035城堡塔)
#   提示: 小房子适合平民区，大房子适合富人区，城堡组件拼成要塞
#
# 功能建筑 (0036-0047):
#   用途: 有特殊功能的建筑和入口
#   城防: 城门(0036) — 城墙入口
#   生产: 风车(0037)/谷仓(0041)/农田(0042)/马厩(0043) — 农业区组合
#   公共: 水井(0038)/喷泉(0039)/市场(0040) — 城镇广场组合
#   水域: 码头(0044)/灯塔(0045) — 海岸/港口组合
#   冒险: 矿洞(0046)/洞穴(0047) — 连接地下区域（可与 tiny-dungeon 衔接）
#
# 自然植被 (0048-0059):
#   用途: 野外区域和城镇绿化装饰
#   树木: 绿树(0048-0050,大小不同)/秋树(0051)/松树(0052)/枯树(0053) — 不同季节/区域
#   灌木: 普通(0054-0055)/浆果(0056) — 道路两侧或围栏内
#   花卉: 红(0057)/蓝(0058)/黄(0059) — 花园/公园装饰
#
# 岩石与围栏 (0060-0071):
#   用途: 区域分隔和自然障碍
#   岩石: 小(0060-0061)/大(0062) — 不可通行的自然障碍
#   蘑菇(0063-0064)/树桩(0065)/木头(0066) — 森林装饰
#   栅栏: 水平(0067)/垂直(0068)/拐角(0069)/端头(0070) — 围出农场/牧场区域
#   树篱(0071) — 比栅栏更自然的分隔
#
# NPC 角色 (0072-0083):
#   用途: 城镇居民，用于对话/任务/交互
#   人类: 农民(0072-0073)/商人(0074-0075)/骑士(0076-0077)/公主(0078)/小孩(0079)/老人(0080)
#   家畜: 鸡(0081)/牛(0082)/猪(0083) — 农场氛围
#   提示: 每个人类 NPC 有站立+行走 2 帧，可做简单动画
#
# 动物与交通 (0084-0095):
#   动物: 羊(0084)/马(0085)/狗(0086)/猫(0087)/鸟(0088)/鱼(0089) — 丰富世界生态
#   交通: 马车(0090空/0091满)/小船(0092)/大船(0093)/骑马(0094) — 运输/旅行
#   装饰: 旗杆(0095) — 城门/广场标志
#
# 资源与物品 (0096-0107):
#   资源: 木材(0096)/石料(0097)/干草(0098) — 建设/贸易材料
#   容器: 木桶(0099)/木箱(0100)/麻袋(0101) — 仓库/市场装饰
#   货币: 金币(0102)/银币(0103) — 经济系统
#   食物: 面包(0104)/苹果(0105)/鱼干(0106) — 消耗品/商品
#   工具: 斧头(0107) — 伐木工具
#
# 工具与武器 (0108-0119):
#   工具: 镐(0108)/锄头(0109)/锤子(0110) — 采集/建设
#   武器: 剑(0111)/弓(0112)/盾(0113) — 战斗装备
#   消耗品: 红药水(0114)/蓝药水(0115) — RPG 元素
#   任务物品: 钥匙(0116)/信件(0117)/书本(0118)/宝石(0119) — 剧情/收集道具
#
# 装饰物 (0120-0131):
#   照明: 路灯(0120灭/0121亮) — 街道照明，暗示昼夜
#   信息: 路标(0122)/挂牌(0123)/邮箱(0124) — 导航与通信
#   休闲: 长椅(0125) — 公园/广场
#   墓地: 墓碑(0126)/十字架(0127) — 墓地/教堂旁
#   旗帜: 红旗(0128)/蓝旗(0129)/横幅(0130) — 阵营标识/节日装饰
#   空白(0131) — 占位/透明

