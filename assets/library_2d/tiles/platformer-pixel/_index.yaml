# Pixel Platformer Tiles - 瓦片语义索引
# 来源: kenney_pixel-platformer
# 网格: 20列 × 9行, 每格 18×18px, 共 180 个瓦片
# 文件名: tile_{编号:04d}.png
#
# ── 风格与适用范围 ──
# 视觉风格: pixel-retro（像素复古）
# 适用游戏类型: 横版平台跳跃、像素动作游戏
# 不适用: 俯视角RPG/模拟经营（请用 tiny-town/tiny-dungeon 代替）
#
# ── 分组概要（用途与组合关系）──
#
# 地形块 - 4色 (0000-0079):
#   用途: 构建关卡的地面、平台、悬崖等固体地形
#   颜色: 棕(0000-0019) 泥土/洞穴风；绿(0020-0039) 草地/森林风；灰(0040-0059) 石头/城堡风；蓝(0060-0079) 冰雪/水晶风
#   每色20块结构完全相同:
#     九宫格(+0~+8): tl/top/tr/left/center/right/bl/bottom/br — 拼大块地形
#     单块(+9): 1×1 的独立小地形
#     平台(+10~+12): left/mid/right — 薄平台（可从下方跳上）
#     柱子(+13~+15): top/mid/bottom — 垂直窄柱
#     半块(+16~+17): left/right — 斜坡/半块
#     内角(+18~+19): inner_tl/inner_tr — 内凹转角
#   提示: 同一关卡建议统一用一个颜色；不同区域可换色区分（如地上绿色、地下棕色）
#
# 物品与道具 (0080-0099):
#   收集物: 金币(0080-0081,含旋转帧)/宝石(0082-0083)/钥匙(0084-0085)/心(0086)/星(0087) — 分数/解锁/生命
#   关卡标记: 旗帜(0088-0089,含飘动帧) 检查点/终点；门(0090-0091) 关卡出入口
#   攀爬: 梯子(0092顶/0093中/0094底) — 垂直拼接做任意高度梯子
#   机关: 尖刺(0095) 伤害陷阱；弹簧(0096收/0097弹) 弹跳增强；开关(0098关/0099开) 触发机关
#
# 装饰与道具 (0100-0119):
#   可破坏: 箱子(0100-0101) — 打破掉道具
#   植物: 植物(0102-0103)/蘑菇(0104-0105) — 背景装饰
#   自然: 石头(0106-0107) — 小型障碍或装饰
#   信息: 告示牌(0108-0109) — 教学/提示文本
#   照明: 火把(0110亮/0111灭) — 洞穴装饰
#   天空: 云(0112小/0113大) — 背景层装饰
#   液体: 水(0114顶面/0115水体)/岩浆(0116顶面/0117体) — 垂直堆叠铺满区域
#   悬挂: 锁链(0118中段/0119端头) — 洞穴/城堡装饰
#
# 浮空平台 (0120-0131):
#   用途: 不与地面相连的浮空跳跃平台
#   颜色: 棕(0120-0122)/绿(0123-0125)/灰(0126-0128)/蓝(0129-0131)
#   每色: left/mid/right 三段式拼接
#   区别: 比地形平台(+10~+12)更窄更薄，更适合做移动平台
#
# 弹射与投射 (0132-0139):
#   蹦床(0132-0133): 踩上去弹跳
#   炮台(0134右/0135左): 发射炮弹的敌方机关
#   弹药: 炮弹(0136)/右箭(0137)/左箭(0138)/通用投射物(0139)
#
# 敌人 (0140-0149):
#   用途: 关卡中的敌方角色，每种含 2 帧动画
#   地面敌人: 史莱姆(0140-0141) 最弱；蜗牛(0142-0143) 带壳
#   飞行敌人: 苍蝇(0144-0145)；蜜蜂(0146-0147)
#   固定危险: 刺球(0148) 原地旋转；锯片(0149) 沿轨道移动
#
# 特效粒子 (0150-0159):
#   通用粒子(0150-0152): 碰撞/拾取时的小星星
#   爆炸(0153-0155): 3 帧序列
#   烟雾(0156-0158): 3 帧序列，角色消失/重生
#   冲击(0159): 攻击命中反馈
#
# HUD 与数字 (0160-0179):
#   生命: 满心(0160)/半心(0161)/空心(0162) — 屏幕顶部血量
#   计数: 金币图标(0163)/宝石图标(0164) — 配合数字显示
#   数字 0-9 (0165-0174): 用于计分板/倒计时/金币数
#   符号: 乘号X(0175) — "×99" 格式
#   导航: 左箭头(0176)/右箭头(0177) — 菜单翻页
#   状态: 勾(0178) 完成/正确；叉(0179) 失败/错误

