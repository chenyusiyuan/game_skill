# Tiny Dungeon - 瓦片语义索引
# 来源: kenney_tiny-dungeon
# 网格: 12列 × 11行, 每格 16×16px, 共 132 个瓦片
# 文件名: tile_{编号:04d}.png
#
# ── 风格与适用范围 ──
# 视觉风格: pixel-retro / dark-neon（像素复古 / 暗黑霓虹）
# 适用游戏类型: Roguelike、地牢探索、RPG、回合制策略、棋盘格冒险
# 不适用: 户外/城镇场景（请用 tiny-town 代替）、平台跳跃（请用 pixel-platformer 代替）
#
# ── 分组概要（用途与组合关系）──
#
# 地板 (0000-0007):
#   用途: 地牢房间/走廊的可行走地面
#   组合: 石地板(0000-0003)做主要房间，土地板(0004-0005)做洞穴/泥土区域，破洞(0006)做陷阱提示，楼梯口(0007)连接楼层
#   提示: 多个变体随机铺设可避免重复感
#
# 墙壁 (0008-0019):
#   用途: 构建地牢房间的边界，阻挡玩家移动
#   组合: 顶(0008-0011)+中(0012-0015)+底(0016-0019)，每排有左/中/右/单独四种
#   提示: "single"变体用于1格宽的柱子或窄墙
#
# 门 (0020-0023):
#   用途: 房间之间的通道，可做开关机制
#   组合: 木门(0020关/0021开) 普通房间用；铁门(0022关/0023开) Boss 房/宝藏室用
#   搭配: 常与钥匙(0081-0082)配合使用
#
# 楼梯 (0024-0025):
#   用途: 楼层间切换的入口/出口
#
# 宝箱 (0026-0029):
#   用途: 战利品/奖励容器
#   组合: 关闭(0026)→打开(0027)→空(0028) 表示三种状态；宝箱怪(0029)做陷阱变体
#
# 英雄角色 (0030-0037):
#   用途: 玩家可操控角色，4 种职业各含站立+行走 2 帧
#   组合: 骑士(0030-0031) 近战坦克；法师(0032-0033) 远程魔法；盗贼(0034-0035) 敏捷型；游侠(0036-0037) 远程物理
#   提示: 2 帧做简单行走动画，idle 用站立帧
#
# NPC (0038-0041):
#   用途: 非战斗交互角色，用于对话/任务/商店
#   角色: 老人(0038) 任务提示；女性(0039) 支线任务；孩子(0040) 引导教学；商人(0041) 商店
#
# 低级怪物 (0042-0059):
#   用途: 普通敌人，每种含站立+移动 2 帧
#   难度递增: 骷髅(0042-0043) → 僵尸(0044-0045) → 幽灵(0046-0047) → 蝙蝠(0048-0049) → 蜘蛛(0050-0051) → 蛇(0052-0053) → 绿史莱姆(0054-0055) → 蓝史莱姆(0056-0057) → 老鼠(0058-0059)
#
# Boss 怪物 (0060-0063):
#   用途: 关卡 Boss 或精英怪
#   角色: 恶魔(0060-0061) 中级 Boss；龙(0062-0063) 最终 Boss
#
# 武器与盾牌 (0064-0071):
#   用途: 装备系统的图标，或地面上的可拾取物品
#   组合: 剑(0064)配盾(0070-0071)；弓(0068)配箭(0093)；法杖(0069)配魔法球(0094)
#
# 药水 (0072-0075):
#   用途: 消耗品，按颜色区分效果。红(0072)回血，蓝(0073)回蓝，绿(0074)解毒/毒药，黄(0075)加速
#
# 货币与宝石 (0076-0080):
#   用途: 经济系统。金币(0076)基础货币，银币(0077)小额，宝石(0078-0080)高价值
#
# 钥匙 (0081-0082):
#   用途: 开锁道具。金钥匙(0081)开宝箱/Boss门，银钥匙(0082)开普通门
#
# 杂项消耗品 (0083-0095):
#   卷轴(0083): 技能/传送
#   书本(0084)/地图(0085): 知识/导航
#   戒指(0086)/护身符(0087): 装备饰品
#   食物(0088-0091): 回血替代品
#   炸弹(0092): 破墙/范围伤害
#   箭矢(0093): 弓的弹药
#   魔法球(0094)/灯笼(0095): 特殊道具
#
# 装饰物 (0096-0109):
#   用途: 丰富地牢视觉，不影响玩法
#   氛围类: 火把(0096亮/0097灭/0098地面)、蜡烛(0099) — 照明装饰
#   恐怖类: 蛛网(0100)、骸骨(0101)、骷髅头(0102)、血迹(0103) — 增加阴暗氛围
#   破旧类: 裂缝(0104)、藤蔓(0105) — 暗示区域年代久远
#   容器类: 木桶(0106)、木箱(0107)、陶罐(0108) — 可破坏/搜索的装饰
#   信息类: 告示牌(0109) — 提示/教学文本载体
#
# 陷阱 (0110-0114):
#   用途: 对玩家造成伤害的地形机关
#   类型: 尖刺(0110缩回/0111伸出)、火焰(0112)、毒气(0113)、箭矢(0114)
#
# 特效 (0115-0119):
#   用途: 动作反馈的视觉效果
#   类型: 爆炸(0115-0116) 炸弹引爆；魔法(0117-0118) 技能释放；烟雾(0119) 消失/传送
#
# UI 元素 (0120-0131):
#   用途: 游戏内 HUD 显示
#   生命: 满心(0120)/半心(0121)/空心(0122) — 与 ui-pixel-adventure 的心(0031-0033)功能相同但风格略异
#   魔力: 满(0123)/空(0124) — 法师类角色专用
#   经验: 经验球(0125)/升级标记(0126) — 成长系统
#   辅助: 小地图标记(0127)/空装备栏(0128)/高亮框(0129)/阴影(0130)/空白(0131)

