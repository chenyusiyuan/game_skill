# UI Pack Pixel Adventure - 瓦片语义索引
# 来源: kenney_ui-pack-pixel-adventure (Large tiles / Thick outline)
# 网格: 13列 × 7行, 每格 32×32px, 共 91 个瓦片
# 文件名: tile_{编号:04d}.png
#
# ── 风格与适用范围 ──
# 视觉风格: pixel-retro（像素复古）
# 适用游戏类型: 平台跳跃、RPG、动作冒险、像素风休闲游戏
# 不适用: 现代简约UI、卡通明亮风（请用 ui-pack 代替）
#
# ── 分组概要（用途与组合关系）──
#
# 面板九宫格 (0000-0012):
#   用途: 用 9 块拼成任意大小的对话框、菜单面板、信息窗口的背景
#   组合: 左上(0000)+顶(0001)+右上(0002)+左(0003)+中(0004)+右(0005)+左下(0006)+底(0007)+右下(0008)
#   提示: 0009-0011 是带装饰花纹的顶边变体，可替换 0000-0002 做更华丽的面板
#
# 按钮三段式 (0013-0021):
#   用途: 水平拼接做任意宽度的按钮，支持默认态和按下态
#   组合-默认: 左(0013)+中(0014,可重复)+右(0015)，底部阴影: 左(0016)+中(0017)+右(0018)
#   组合-按下: 左(0019)+中(0020)+右(0021)，按下时无阴影
#   提示: 按钮高度含阴影约 2 格，按下态比默认态矮 1px（阴影被"压"掉了）
#
# 深色面板九宫格 (0022-0030):
#   用途: 作为输入框背景、物品栏格子、装备槽等"凹陷"区域
#   组合: 与亮色面板(0000-0012)搭配，形成"面板内嵌暗区"的常见 UI 层次
#
# 生命心 (0031-0033):
#   用途: HUD 区域的生命值显示，标准像素游戏三件套
#   组合: 满心(0031) + 半心(0032) + 空心(0033)，水平排列表示血量
#   搭配: 常与进度条(0034-0039)一起放在屏幕顶部 HUD 区
#
# 进度条三段式 (0034-0039):
#   用途: 血条、魔法条、经验条、Boss 血条、加载进度
#   组合-背景: 左(0034)+中(0035,可重复)+右(0036)
#   组合-填充: 左(0037)+中(0038,按比例重复)+右(0039)
#   提示: 填充叠在背景上方，通过调整填充段数量表示百分比
#
# 收集物图标 (0040-0043):
#   用途: HUD 计数图标或游戏内拾取物。金币(0040)、宝石(0041)、星星(0042)、钥匙(0043)
#   搭配: 配合数字(0063-0072)显示 "×99" 格式的收集数量
#
# 箭头与光标 (0044-0051):
#   用途: 左右箭头(0044-0045)用于翻页/选择；光标(0046-0051)用于鼠标替换或选中指示
#
# 边框与缎带 (0052-0062):
#   用途: 装饰性边框(0052-0059)用于高亮选中区域或卡片装饰；缎带(0060-0062)用于标题栏/成就徽章
#
# 像素数字 0-9 (0063-0072):
#   用途: 计分板、倒计时、伤害数字等需要像素风数字显示的场景
#   搭配: 配合收集物图标(0040-0043)或心(0031-0033)
#
# 杂项 (0073-0090):
#   旗帜(0073): 关卡完成/检查点
#   锁(0074-0075): 未解锁/已解锁关卡
#   钥匙孔(0076): 配合锁使用
#   滚动条(0077-0080): 长列表/文本区域的滚动指示
#   复选框(0081-0082)/单选框(0083-0084): 设置菜单选项
#   滑块(0085-0086): 音量、亮度等连续值设置
#   开关(0087-0088): 开/关切换（音效、振动等）
#   对话气泡(0089): NPC 对话提示
#   感叹号(0090): 任务/事件提示

