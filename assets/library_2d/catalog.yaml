# ============================================================
# Kenney 素材库目录索引 (catalog.yaml)
# ============================================================
#
# 使用方式（Phase 3 expand-assets）：
#
# 1. 读取本文件，了解有哪些素材包可用
# 2. 根据 color-scheme.palette-id 映射 asset-style，再结合 genre 缩小候选范围
# 3. 如果需要某类语义元素（如 heart/coin/sword），先查 semantic-hints 反向索引
# 4. 对于候选包，查看 _preview.png 了解整体风格
# 5. 对于 tile_XXXX.png 编号文件，查看 _tilemap.png（带网格参考图）来确定具体编号含义
# 6. 对于有语义文件名的包，直接 ls 目录看文件名即可选择
# 7. assets.yaml 中用相对路径引用: assets/library_2d/{path}/{file}
#
# 所有素材来自 Kenney（kenney.nl），CC0 协议，可商用。
# 路径基准: assets/library_2d/
# 注意：本文件仅索引 2D 素材。3D 素材见 assets/library_3d/catalog.yaml
# ============================================================

# ── Genre 枚举（必须与 game-aprd-format.md §genre 保持一致）────────────
# 下方 packs 的 suitable-genres 字段只能取这里登记的 id；expand-assets
# 阶段在筛选候选包时必须以当前 PRD 的 @game.genre 做字面匹配。
genres:
  - id: board-grid
    name: 棋盘格子规则型
    examples: [俄罗斯方块, 贪吃蛇, 五子棋, 2048, pixel-flow]
  - id: platform-physics
    name: 控制闯关物理型
    examples: [马里奥, 平台跳跃, 愤怒小鸟, 物理解谜]
  - id: simulation
    name: 经营养成型
    examples: [电子宠物, clicker, idle, 城市建设]
  - id: strategy-battle
    name: 策略战斗型
    examples: [塔防, 卡牌, 回合制RPG, Roguelike, Diablo-like ARPG]
  - id: single-reflex
    name: 单屏反应型
    examples: [打地鼠, 飞机大战, 接球, 打砖块, Flappy]
  - id: quiz-rule
    name: 规则问答型
    examples: [猜数字, 谜题, 测验, 数独]
  - id: social-multi
    name: 多人社交型
    examples: [联机对战, 你画我猜]
  - id: edu-practice
    name: 教育练习型
    examples: [单词消消乐, 数学练习, 闪卡, 记忆配对]
  - id: narrative
    name: 剧情互动型
    examples: [AVG, 选择树, 文字冒险]

# ── 语义反向索引（semantic-hints）────────────────────────────────────
# 问"我想要一把剑/一颗心/一枚金币"时的快速查表。
# key = 语义关键词，value = 候选包 id 列表（同一语义出现在多个包时，
# 按推荐顺序排列）。最终仍以 asset-style/genre 过滤后为准。
semantic-hints:
  # ── UI 基础件 ──
  button:       [ui-pack, ui-pixel-adventure, mobile-controls]
  panel:        [ui-pixel-adventure, ui-pack]
  checkbox:     [ui-pack, ui-pixel-adventure]
  slider:       [ui-pack]
  arrow:        [ui-pack, ui-pixel-adventure, game-icons]
  progress-bar: [ui-pixel-adventure]
  number-digit: [ui-pixel-adventure, sprites-platformer, tiles-platformer-pixel]

  # ── HUD 常用 ──
  heart:     [ui-pixel-adventure, sprites-platformer, tiles-platformer-pixel, tiles-dungeon]
  coin:      [ui-pixel-adventure, sprites-platformer, tiles-platformer-pixel, tiles-dungeon, sprites-tower-defense]
  gem:       [ui-pixel-adventure, sprites-platformer, tiles-dungeon, sprites-puzzle]
  star:      [ui-pack, ui-pixel-adventure, sprites-platformer, board-game-icons]
  key:       [ui-pixel-adventure, sprites-platformer, tiles-dungeon, tiles-platformer-pixel]
  flag:      [ui-pixel-adventure, sprites-platformer, tiles-platformer-pixel, board-game-icons]

  # ── 角色 / 敌人 ──
  character:     [sprites-platformer, sprites-platformer-pixel, tiles-dungeon, tiles-roguelike-characters, sprites-medieval]
  enemy-generic: [sprites-platformer, sprites-platformer-pixel, tiles-dungeon, tiles-roguelike-dungeon]
  boss:          [tiles-dungeon, tiles-roguelike-dungeon]
  npc:           [tiles-town, sprites-medieval, tiles-dungeon]

  # ── 武器 / 装备 ──
  weapon-sword: [tiles-dungeon, board-game-icons]
  weapon-bow:   [tiles-dungeon, board-game-icons]
  shield:       [tiles-dungeon, board-game-icons]
  potion:       [tiles-dungeon, board-game-icons]

  # ── 地形 / 地图 ──
  terrain:         [sprites-platformer, tiles-platformer-pixel, tiles-town, sprites-tower-defense, sprites-medieval]
  terrain-pixel:   [tiles-platformer-pixel, tiles-town, tiles-dungeon]
  wall:            [tiles-dungeon, tiles-platformer-pixel]
  floor:           [tiles-dungeon, tiles-town, tiles-platformer-pixel]
  door:            [tiles-dungeon, sprites-platformer, tiles-platformer-pixel]
  stairs:          [tiles-dungeon]
  background:      [sprites-platformer]
  tree:            [sprites-platformer, tiles-town, sprites-medieval, sprites-tower-defense]
  rock:            [sprites-platformer, tiles-town, sprites-tower-defense]
  water-lava:      [sprites-platformer, tiles-platformer-pixel]

  # ── 机关 / 收集 ──
  trap-spike:    [sprites-platformer, tiles-platformer-pixel, tiles-dungeon]
  spring:        [sprites-platformer, tiles-platformer-pixel]
  chest:         [tiles-dungeon]
  torch:         [sprites-platformer, tiles-dungeon, tiles-platformer-pixel]

  # ── 桌游 / 卡牌 ──
  playing-card:  [cards]
  dice:          [board-game-icons]
  chess-piece:   [board-game-icons]

  # ── 塔防特有 ──
  tower:         [sprites-tower-defense]
  tower-terrain: [sprites-tower-defense]

  # ── 输入提示 ──
  keyboard-prompt: [input-prompts]
  gamepad-prompt:  [input-prompts]
  virtual-joystick: [mobile-controls]
  virtual-button:   [mobile-controls]

  # ── 音效语义 ──（详见 audio 三个包的 recommended 段）
  sfx-click:    [audio-ui-clicks, audio-ui-interface]
  sfx-hover:    [audio-ui-clicks]
  sfx-confirm:  [audio-ui-interface]
  sfx-error:    [audio-ui-interface]
  sfx-jump:     [audio-sfx]
  sfx-coin:     [audio-sfx]
  sfx-hurt:     [audio-sfx]
  sfx-magic:    [audio-sfx]
  sfx-card:     [audio-sfx]
  sfx-dice:     [audio-sfx]

# ── Palette → Asset Style 别名层 ───────────────────────────────
# color-palettes.yaml 已经扩展为 19+1 套 palette。素材库仍按少量视觉桶
# 维护 suitable-styles，避免每新增一套配色就复制一份素材推荐表。
# expand-assets 阶段：先取 color-scheme.palette-id，经此表得到 asset-style，
# 再用 (asset-style, genre) 查 style-genre-preferred。
palette-style-aliases:
  neutral-clean: minimal-modern
  board-classic: minimal-modern
  tetris-blocks: dark-neon
  snake-grid: pixel-retro
  adventure-outdoor: cartoon-bright
  candy-pop: cartoon-bright
  card-table: cartoon-bright
  farm-cozy: cartoon-bright
  military-steel: dark-neon
  cyber-neon: dark-neon
  ocean-deep: cartoon-bright
  forest-mystic: cartoon-bright
  pixel-retro: pixel-retro
  ink-scroll: hand-drawn
  campus-fresh: cartoon-bright
  dungeon-dark: dark-neon
  medieval-castle: hand-drawn
  speed-race: dark-neon
  hand-drawn: hand-drawn
  party-social: cartoon-bright

# ── Asset Style × Genre → 推荐首选包（快速匹配）──
# expand-assets 阶段：拿到 (asset-style, genre) 后先来这张表看"第一候选"，
# 再回到 packs 列表里取详细元数据，避免漏选核心包。
style-genre-preferred:
  pixel-retro + platform-physics:  [ui-pixel-adventure, sprites-platformer-pixel, tiles-platformer-pixel, audio-sfx, audio-ui-clicks]
  pixel-retro + strategy-battle:   [ui-pixel-adventure, tiles-dungeon, tiles-roguelike-characters, tiles-roguelike-dungeon, audio-ui-interface]
  pixel-retro + board-grid:        [ui-pixel-adventure, tiles-town, tiles-dungeon, audio-ui-clicks]
  pixel-retro + simulation:        [ui-pixel-adventure, tiles-town, audio-ui-interface]
  pixel-retro + narrative:         [ui-pixel-adventure, tiles-dungeon, tiles-town, audio-ui-interface]
  cartoon-bright + platform-physics: [ui-pack, sprites-platformer, audio-sfx, audio-ui-interface]
  cartoon-bright + single-reflex:    [ui-pack, sprites-platformer, sprites-puzzle, audio-sfx]
  cartoon-bright + strategy-battle:  [ui-pack, sprites-tower-defense, sprites-medieval, audio-ui-interface]
  cartoon-bright + simulation:       [ui-pack, sprites-medieval, board-game-icons, audio-ui-interface]
  cartoon-bright + board-grid:       [ui-pack, sprites-puzzle, board-game-icons, cards, audio-ui-interface]
  cartoon-bright + edu-practice:     [ui-pack, sprites-puzzle, board-game-icons, audio-ui-interface]
  cartoon-bright + quiz-rule:        [ui-pack, sprites-puzzle, board-game-icons, audio-ui-interface]
  cartoon-bright + social-multi:     [ui-pack, board-game-icons, audio-ui-interface]
  minimal-modern + board-grid:       [ui-pack, sprites-puzzle, game-icons, audio-ui-clicks]
  minimal-modern + quiz-rule:        [ui-pack, board-game-icons, game-icons, audio-ui-clicks]
  minimal-modern + edu-practice:     [ui-pack, sprites-puzzle, game-icons, audio-ui-clicks]
  dark-neon + strategy-battle:       [tiles-dungeon, tiles-roguelike-dungeon, game-icons, audio-ui-interface]
  dark-neon + platform-physics:      [ui-pixel-adventure, tiles-platformer-pixel, audio-ui-interface]
  dark-neon + narrative:             [tiles-dungeon, game-icons, audio-ui-interface]
  hand-drawn + narrative:            [ui-pack, board-game-icons, sprites-medieval, audio-ui-interface]
  hand-drawn + edu-practice:         [ui-pack, board-game-icons, sprites-puzzle, audio-ui-interface]
  hand-drawn + strategy-battle:      [sprites-medieval, board-game-icons, audio-ui-interface]

packs:

  # ═══════════════════════════════════════════════════════════
  # UI 组件
  # ═══════════════════════════════════════════════════════════

  - id: ui-pack
    path: ui/
    source: kenney_ui-pack
    description: "现代矢量 UI 组件：按钮、箭头、复选框、滑块、星星、输入框"
    suitable-styles: [cartoon-bright, minimal-modern]
    suitable-genres: [all]
    preview: ui/_preview.png          # 完整素材概览
    sample: ui/_sample.png            # 使用示例
    colors: [Blue, Green, Grey, Red, Yellow]
    resolution: "Double (2x)"
    naming: "语义文件名"              # button_rectangle_flat.png, arrow_basic_e.png 等
    structure:
      - "buttons/{color}/ — 矩形/圆形/方形按钮（border/flat/gloss/gradient/line × depth 变体）"
      - "arrows/{color}/  — 方向箭头（basic/decorative × 四方向 × small 变体）"
      - "checks/{color}/  — 圆形/方形 复选框（color/grey 状态）"
      - "icons/{color}/   — 基础图标（checkmark/cross/circle/square + outline 变体）"
      - "sliders/{color}/ — 水平/垂直滑块和把手"
      - "stars/{color}/   — 星星（实心/空心）"
      - "inputs/          — 输入框、分割线（无颜色分支）"
    fonts:
      - "../fonts/Kenney Future.ttf"
      - "../fonts/Kenney Future Narrow.ttf"
    index: ui/_index.yaml
    how-to-pick: "读 _index.yaml 了解分组结构，或直接 ls 子目录看文件名选择。文件名完全自描述。"

  - id: ui-pixel-adventure
    path: ui-pixel/
    source: kenney_ui-pack-pixel-adventure
    description: "像素冒险风 UI：面板、按钮、生命心、金币、进度条、数字、光标等"
    suitable-styles: [pixel-retro]
    suitable-genres: [platform-physics, board-grid, strategy-battle, single-reflex]
    preview: ui-pixel/_preview.png    # 所有元素概览
    sample: ui-pixel/_sample.png      # 组合使用示例
    tilemap: ui-pixel/_tilemap.png    # 带网格的 tilemap（32x32 每格，13列×7行）
    index: ui-pixel/_index.yaml       # 每个 tile 编号到语义名的完整映射
    resolution: "Large tiles / Thick outline (32x32px)"
    naming: "tile_XXXX.png 编号"
    total-files: 91
    how-to-pick: |
      读 _index.yaml，搜索需要的元素（如 "heart" "button" "panel"），找到对应 id 即文件编号。
      包含：面板九宫格(0000-0012)、按钮(0013-0021)、深色面板(0022-0030)、心(0031-0033)、进度条(0034-0039)、
      金币/宝石/星星/钥匙(0040-0043)、箭头/光标(0044-0051)、边框/缎带(0052-0062)、数字0-9(0063-0072)、
      旗帜/锁/滚动条/复选框/开关/气泡(0073-0090)

  # ═══════════════════════════════════════════════════════════
  # HUD / 游戏图标
  # ═══════════════════════════════════════════════════════════

  - id: game-icons
    path: hud/game-icons/
    source: kenney_game-icons
    description: "通用游戏功能图标（白色轮廓，适合叠加在任何底色上）"
    suitable-styles: [all]
    suitable-genres: [all]
    preview: hud/game-icons/_preview.png
    resolution: "2x"
    naming: "语义文件名"             # home.png, pause.png, star.png 等
    total-files: 105
    index: hud/game-icons/_index.yaml
    how-to-pick: "读 _index.yaml 了解分组，或直接 ls 目录，文件名即图标含义。包含：导航(home/return/exit)、媒体控制(pause/play/stop)、音频(audioOn/audioOff)、设置(gear/save/lock)、游戏(star/trophy/medal/target)、方向箭头、缩放、设备图标等。"

  - id: board-game-icons
    path: hud/board-icons/
    source: kenney_board-game-icons
    description: "桌游风格图标（128px）：骰子、棋子、卡牌、旗帜、奖杯、计时器、药水等"
    suitable-styles: [cartoon-bright, minimal-modern, hand-drawn]
    suitable-genres: [board-grid, quiz-rule, edu-practice]
    preview: hud/board-icons/_preview.png
    resolution: "Double (128px)"
    naming: "语义文件名"             # dice_1.png, chess_king.png, crown.png 等
    total-files: 255
    index: hud/board-icons/_index.yaml
    how-to-pick: "读 _index.yaml 了解分组，或 ls 目录看文件名。包含大量桌游元素：d4-d20 各种骰子、象棋棋子、卡牌图标、代币/筹码、沙漏、奖杯/皇冠、旗帜、书本、药水/盾牌/剑、骷髅、火焰等。"

  # ═══════════════════════════════════════════════════════════
  # 游戏精灵
  # ═══════════════════════════════════════════════════════════

  - id: sprites-platformer
    path: sprites/platformer/
    source: kenney_new-platformer-pack-1.1
    description: "卡通平台跳跃素材：角色、敌人、地形瓦片、道具、环境装饰"
    suitable-styles: [cartoon-bright]
    suitable-genres: [platform-physics, single-reflex]
    preview: sprites/platformer/_preview.png
    resolution: "Double"
    naming: "语义文件名"             # character_beige_idle.png, slime_green.png, terrain_grass_block.png
    total-files: 433
    index: sprites/platformer/_index.yaml
    how-to-pick: |
      读 _index.yaml 了解分组结构。包含：
      - character_* — 5色角色（idle/walk/jump/climb/duck/hit/front 帧）
      - bee*/fly*/frog*/slime*/snail*/worm*/barnacle*/fish*/ladybug*/mouse* — 16种敌人
      - terrain_{dirt/grass/sand/snow/stone/purple}_* — 6种材质地形（每种28块）
      - block_*/brick_* — 可打击方块和砖块
      - coin_*/gem_*/heart*/key_*/star_*/flag* — 收集物
      - bomb*/door*/lock*/lever*/switch*/spring*/saw*/spikes* — 道具机关
      - bush*/fence*/bridge*/water*/lava*/ladder*/torch*/sign* — 环境装饰
      - hud_* — HUD数字/心/图标/玩家头像

  - id: sprites-platformer-pixel
    path: sprites/platformer-pixel/
    source: kenney_pixel-platformer
    description: "像素平台角色（18px 小像素人，4色变体）"
    suitable-styles: [pixel-retro]
    suitable-genres: [platform-physics]
    preview: sprites/platformer-pixel/_preview.png
    tilemap: sprites/platformer-pixel/_tilemap.png
    index: sprites/platformer-pixel/_index.yaml
    resolution: "像素原生 (24x24px)"
    naming: "tile_XXXX.png 编号"
    total-files: 28
    how-to-pick: "读 _index.yaml 搜索角色。5色玩家(米/蓝/绿/粉/黄各3帧) + 僵尸/幽灵/骷髅/蝙蝠(各3帧)"

  - id: sprites-medieval
    path: sprites/medieval/
    source: kenney_medieval-rts
    description: "中世纪 RTS：城堡、房屋、树木、兵种（等距视角）"
    suitable-styles: [cartoon-bright, hand-drawn]
    suitable-genres: [strategy-battle, simulation]
    preview: sprites/medieval/_preview.png
    sample: sprites/medieval/_sample.png
    resolution: "Retina (2x)"
    naming: "半语义编号"             # medievalEnvironment_01.png, medievalUnit_12.png
    total-files: 126
    index: sprites/medieval/_index.yaml
    how-to-pick: |
      读 _index.yaml 了解分组和编号含义。文件名前缀标识类别：
      - medievalEnvironment_XX — 自然环境（树/石/山/水）21个
      - medievalStructure_XX  — 建筑（城堡/塔/房/农田/兵营）23个
      - medievalTile_XX       — 地形瓦片（草/路/水/桥/城墙）58个
      - medievalUnit_XX       — 兵种（弓手/骑士/农民/国王）24个

  - id: sprites-tower-defense
    path: sprites/tower-defense/
    source: kenney_tower-defense
    description: "塔防素材：55种塔楼变体、地形瓦片、装饰物"
    suitable-styles: [cartoon-bright, minimal-modern]
    suitable-genres: [strategy-battle]
    preview: sprites/tower-defense/_preview.png
    sample: sprites/tower-defense/_sample.png
    resolution: "标准"
    naming: "半语义编号"             # tower_12.png, landscape_05.png
    total-files: 119
    index: sprites/tower-defense/_index.yaml
    how-to-pick: |
      读 _index.yaml 了解分组。文件名前缀标识类别：
      - tower_XX      — 55种塔（圆/方/带顶/带旗/带武器变体）
      - landscape_XX  — 40种地形（草/路/水/沙/十字路口）
      - crystals_X    — 水晶装饰(4)
      - rocks_X       — 岩石装饰(8)
      - trees_X       — 树木装饰(12)

  - id: sprites-puzzle
    path: sprites/puzzle/
    source: kenney_puzzle-pack-1
    description: "益智游戏：彩色球、宝石形元素(6色×4形)、按钮、指针、挡板"
    suitable-styles: [cartoon-bright, minimal-modern, pixel-retro]
    suitable-genres: [board-grid, quiz-rule, edu-practice]
    preview: sprites/puzzle/_preview.png
    sample: sprites/puzzle/_sample.png
    resolution: "Double"
    naming: "语义文件名"             # ballBlue.png, elementGreen_diamond_glossy.png
    total-files: 86
    index: sprites/puzzle/_index.yaml
    how-to-pick: "读 _index.yaml 了解分组，或 ls 目录看文件名。ball*/element*/button*/hand*/pointer*/selector*/paddle*/particle*"

  # ═══════════════════════════════════════════════════════════
  # 瓦片地图
  # ═══════════════════════════════════════════════════════════

  - id: tiles-dungeon
    path: tiles/dungeon/
    source: kenney_tiny-dungeon
    description: "像素地牢瓦片（16px）：地板、墙壁、门、宝箱、角色、怪物、道具、陷阱、装饰"
    suitable-styles: [pixel-retro, dark-neon]
    suitable-genres: [board-grid, strategy-battle, narrative]
    preview: tiles/dungeon/_preview.png
    sample: tiles/dungeon/_sample.png
    tilemap: tiles/dungeon/_tilemap.png    # 12列×11行网格
    index: tiles/dungeon/_index.yaml       # 每个 tile 编号到语义名的完整映射
    resolution: "像素原生 (16x16px)"
    naming: "tile_XXXX.png 编号"
    total-files: 132
    how-to-pick: |
      读 _index.yaml，搜索需要的元素。
      包含：地板/墙壁(0000-0019)、门/楼梯/宝箱(0020-0029)、英雄4职业(0030-0037)、NPC(0038-0041)、
      亡灵怪(0042-0047)、小怪(0048-0059)、Boss(0060-0063)、武器盾牌(0064-0071)、
      药水/货币/宝石/钥匙(0072-0083)、消耗品(0084-0095)、装饰(0096-0109)、陷阱(0110-0114)、
      特效(0115-0119)、UI心/魔力(0120-0131)

  - id: tiles-town
    path: tiles/town/
