# ============================================================
# 素材选择流程（expand-assets agent 必读）
# ============================================================
#
# Step 1: 从 GamePRD 获取 color-scheme.palette-id 和 genre，
#         通过 palette-style-aliases 映射为 asset-style
#
# Step 2: 筛选候选包
#   - 遍历上方 packs 列表
#   - suitable-styles 包含当前 asset-style（或为 [all]）的包入选
#   - suitable-genres 包含当前 genre（或为 [all]）的包入选
#
# Step 3: 选择具体文件
#   - 语义文件名的包（naming='语义文件名'）：ls 目录按文件名选
#   - tile_XXXX 编号的包：读 index 字段指向的 _index.yaml，
#     搜索需要的元素关键词（中文或英文），找到对应 id 即 tile 编号
#   - （可选）若模型有多模态能力，也可查看 preview / tilemap 图片辅助确认
#
# Step 4: 写入 assets.yaml
#   - type: local-file 的用 assets/library_2d/{path}/{file}
#   - 本地素材不足时用 inline-svg / graphics-generated / synthesized 补充
