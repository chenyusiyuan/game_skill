    recommended:
      button-click: click1.ogg
      button-click-alt: click3.ogg
      hover: rollover1.ogg
      toggle: switch3.ogg
      mouse-down: mouseclick1.ogg
      mouse-up: mouserelease1.ogg

  - id: audio-ui-interface-3d
    path: audio/ui-interface/
    source: kenney_interface-sounds
    description: "界面交互音效（更丰富的反馈音，93个）"
    suitable-genres: [all-3d]
    total-files: 93
    naming: "语义文件名"
    how-to-pick: |
      按语义前缀选择：
      back_00{1-4} = 返回; click_00{1-5} = 点击; close_00{1-4} = 关闭
      confirmation_00{1-4} = 确认/成功; error_00{1-8} = 错误/失败
      drop_00{1-4} = 放下; glass_00{1-6} = 清脆提示; glitch_00{1-4} = 故障
      maximize_00{1-9} = 展开; minimize_00{1-9} = 收起; open_00{1-4} = 打开
      pluck_00{1-2} = 拨弦; question_00{1-4} = 疑问; scratch_00{1-5} = 划动
      scroll_00{1-5} = 翻页; select_00{1-8} = 选择; switch_00{1-7} = 切换
      tick_00{1-2,4} = 勾选; toggle_00{1-4} = 开关; bong_001 = 敲击
    recommended:
      success: confirmation_002.ogg
      error: error_004.ogg
      select: select_003.ogg
      back: back_001.ogg
      open-menu: open_001.ogg
      close-menu: close_002.ogg
      scroll: scroll_002.ogg
      drop-item: drop_002.ogg
      question: question_003.ogg
      tick: tick_001.ogg
