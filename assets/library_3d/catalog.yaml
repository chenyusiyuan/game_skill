# ============================================================
# 3D 素材选择流程（expand-assets agent 必读）
# ============================================================
#
# Step 1: 从 GamePRD 获取 genre，确认 is-3d=true
#
# Step 2: 筛选候选包
#   - 遍历上方 packs 列表
#   - suitable-genres 包含当前 genre（或为 [all-3d]）的包入选
#
# Step 3: 选择具体文件
#   - ls models/{slug}/ 目录，按语义文件名选择 GLB 文件
#
# Step 4: 写入 assets.yaml
#   - source 写 assets/library_3d/models/{slug}/{file}.glb
#   - 音效复用 library_3d/audio/ 下的文件（与 2D 相同来源）
#     例: assets/library_3d/audio/sfx/sfx_jump.ogg
#
# 注意：animated-protagonists / animated-survivors 的 FBX 已离线转换为 GLB，
#   统一使用 GLTFLoader 加载即可（无需 FBXLoader）。
# ============================================================
