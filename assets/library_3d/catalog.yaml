# ============================================================
# Kenney 3D 素材库目录索引 (catalog.yaml)
# ============================================================
#
# 本文件为 3D 素材库专用 catalog，与 library_2d/catalog.yaml 对应 2D 部分。
#
# 使用方式（Phase 3 expand-assets）：
#
# 1. 读取本文件，了解有哪些 3D 素材包可用
# 2. 根据 genre 缩小候选范围（参考 suitable-genres）
# 3. 如果需要某类语义元素（如 car/tower/tree），先查 semantic-hints 反向索引
# 4. 对于候选包，查看 Preview.png 了解整体风格
# 5. 对于有语义文件名的包，直接 ls 目录看文件名即可选择 GLB
# 6. assets.yaml 中用路径引用: assets/library_3d/models/{slug}/{file}.glb
#
# 所有素材来自 Kenney（kenney.nl），CC0 协议，可商用。
# 路径基准: assets/library_3d/
# 注意：本文件仅索引 3D 素材。2D 素材见 assets/library_2d/catalog.yaml
# ============================================================

# ── Genre 枚举（复用 2D genre，追加 3D 特有类型）────────────────────────
# 下方 packs 的 suitable-genres 字段只能取这里登记的 id；expand-assets
# 阶段在筛选候选包时必须以当前 PRD 的 @game.genre 做字面匹配。
# all-3d 表示所有 3D 玩法类型均适用。
genres:
  # ── 复用 2D genre ──
  - id: board-grid
    name: 棋盘格子规则型
    examples: [俄罗斯方块, 贪吃蛇, 五子棋, 2048, pixel-flow]
  - id: platform-physics
    name: 控制闯关物理型
    examples: [马里奥, 平台跳跃, 愤怒小鸟, 物理解谜]
  - id: simulation
    name: 经营养成型
    examples: [电子宠物, clicker, idle, 城市建设]
  - id: strategy-battle
    name: 策略战斗型
    examples: [塔防, 卡牌, 回合制RPG, Roguelike, Diablo-like ARPG]
  - id: single-reflex
    name: 单屏反应型
    examples: [打地鼠, 飞机大战, 接球, 打砖块, Flappy]
  - id: quiz-rule
    name: 规则问答型
    examples: [猜数字, 谜题, 测验, 数独]
  - id: social-multi
    name: 多人社交型
    examples: [联机对战, 你画我猜]
  - id: edu-practice
    name: 教育练习型
    examples: [单词消消乐, 数学练习, 闪卡, 记忆配对]
  - id: narrative
    name: 剧情互动型
    examples: [AVG, 选择树, 文字冒险]
  # ── 3D 特有 genre ──
  - id: 3d-exploration
    name: "3D 探索/展示型"
    examples: [第一人称走迷宫, 模型浏览器, 3D 展示]
  - id: 3d-racing
    name: "3D 赛车/驾驶型"
    examples: [赛车, 驾驶模拟]
  - id: 3d-tower-defense
    name: "3D 塔防型"
    examples: [3D 塔防, 俯视3D策略]

# ── 语义反向索引（semantic-hints）——3D 版 ──────────────────────────────
# 问"我想要一辆车/一棵树/一把武器"时的快速查表。
# key = 语义关键词，value = 候选包 id 列表（按推荐顺序排列）。
# 最终仍以 genre 过滤后为准。
semantic-hints:
  # ── 载具 ──
  car/vehicle:          [car, racing]
  # ── 防御建筑 ──
  tower:                [tower-defense, castle]
  # ── 角色 / 人物 ──
  character/人物:       [blocky-characters, animated-protagonists, animated-survivors, cube-pets]
  # ── 自然 / 植被 ──
  tree/自然:            [nature, fantasy-town, survival]
  # ── 地牢 ──
  dungeon/地牢:         [mini-dungeon, modular-dungeon, graveyard]
  # ── 武器 ──
  weapon/武器:          [blaster, space, survival]
  # ── 食物 ──
  food/食物:            [food]
  # ── 建筑 ──
  building/建筑:        [castle, fantasy-town, city-commercial, city-industrial]
  # ── 道路 ──
  road/道路:            [city-roads, racing]
  # ── 太空 ──
  spaceship/太空:       [space, modular-space]
  # ── 平台 ──
  platform/平台:        [platformer, prototype]
  # ── 海盗 ──
  pirate/海盗:          [pirate]
  # ── 地形 ──
  terrain/地形:         [nature, prototype, tower-defense]
  # ── 宠物 ──
  pet/宠物:             [cube-pets]

# ── Asset Style × Genre → 推荐首选包（3D 场景快速推荐表）──
# expand-assets 阶段：拿到 (asset-style=lowpoly-3d, genre) 后先来这张表看"第一候选"，
# 再回到 packs 列表里取详细元数据，避免漏选核心包。
style-genre-preferred:
  lowpoly-3d + platform-physics:   [platformer, blocky-characters, nature]
  lowpoly-3d + 3d-racing:          [car, racing, city-roads]
  lowpoly-3d + strategy-battle:    [tower-defense, castle, blaster]
  lowpoly-3d + 3d-exploration:     [mini-dungeon, modular-dungeon, nature, fantasy-town]
  lowpoly-3d + simulation:         [city-commercial, city-industrial, city-roads, food]
  lowpoly-3d + 3d-tower-defense:   [tower-defense, nature, castle]
  lowpoly-3d + single-reflex:      [space, blaster, modular-space]

