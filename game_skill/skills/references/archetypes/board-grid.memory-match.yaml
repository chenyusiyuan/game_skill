archetype-id: board-grid.memory-match
support-level: direct
description: Card flip and pair-matching board preset with reveal, compare, consume, and completion checks.
archetype-plan:
  genre: board-grid
  intent: reveal two hidden cards, match by semantic value, keep matched pairs, hide mismatches
mechanics-preset:
  primitives:
    - capacity-gate@v1
    - entity-lifecycle@v1
    - predicate-match@v1
    - slot-pool@v1
    - win-lose-check@v1
  required-rules:
    - reveal-card
    - compare-open-pair
    - settle-pair
    - terminal-check
data-schema:
  required:
    - cards
    - solution-path
  collections:
    cards:
      fields: [id, row, col, pairId, lifecycle]
visual-slots-preset:
  slots:
    - id: entity.card.front
      semantic-slot: card-face
      render-zone: board-grid-cell
      state-driven-fields: [pairId]
    - id: entity.card.back
      semantic-slot: card-back
      render-zone: board-grid-cell
runtime-modules:
  - capacity-gate.runtime.mjs
  - entity-lifecycle.runtime.mjs
  - predicate-match.runtime.mjs
  - slot-pool.runtime.mjs
  - win-lose-check.runtime.mjs
semantic-probes:
  - id: memory.same-pair-stays-open
    setup:
      cards:
        - { id: c1, pairId: A, lifecycle: hidden }
        - { id: c2, pairId: A, lifecycle: hidden }
    actions:
      - driver: clickCard
        args: [c1]
      - driver: clickCard
        args: [c2]
    expect:
      state:
        c1.lifecycle: matched
        c2.lifecycle: matched
      traceContains:
        - primitive: predicate-match@v1
          rule: compare-open-pair
          after:
            matched: true
    maps-to:
      primitives: [entity-lifecycle@v1, predicate-match@v1, slot-pool@v1]
      rules: [reveal-card, compare-open-pair, settle-pair]
    evidence-required: [trace, snapshot]
  - id: memory.wrong-pair-flips-back
    setup:
      cards:
        - { id: c1, pairId: A, lifecycle: hidden }
        - { id: c3, pairId: B, lifecycle: hidden }
    actions:
      - driver: clickCard
        args: [c1]
      - driver: clickCard
        args: [c3]
    expect:
      state:
        c1.lifecycle: hidden
        c3.lifecycle: hidden
      traceContains:
        - primitive: predicate-match@v1
          rule: compare-open-pair
          after:
            matched: false
    maps-to:
      primitives: [entity-lifecycle@v1, predicate-match@v1]
      rules: [compare-open-pair, settle-pair]
    evidence-required: [trace, snapshot]
  - id: memory.all-pairs-win
    setup:
      cards:
        - { id: c1, pairId: A, lifecycle: matched }
        - { id: c2, pairId: A, lifecycle: matched }
        - { id: c3, pairId: B, lifecycle: revealed }
        - { id: c4, pairId: B, lifecycle: revealed }
    actions:
      - driver: clickCard
        args: [c4]
    expect:
      state:
        phase: win
      traceContains:
        - primitive: win-lose-check@v1
          rule: terminal-check
    maps-to:
      primitives: [predicate-match@v1, win-lose-check@v1]
      rules: [settle-pair, terminal-check]
    evidence-required: [trace, snapshot]
profile-skeleton:
  drivers: [clickStartButton, clickCard]
  observers: [getSnapshot, getTrace, getAssetUsage]
  steps:
    - click-start
    - click-first-card
    - click-second-card
    - assert-pair-state
gate-policy:
  must-pass:
    - check_level_solvability.js
    - check_playthrough.js
    - check_runtime_semantics.js
