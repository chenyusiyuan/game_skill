archetype-id: quiz-rule
support-level: direct
description: Rule-driven quiz / edu-practice preset for question, answer, feedback, and terminal checks.
archetype-plan:
  genre: edu-practice
  intent: map questions to validated answer attempts and feedback events
mechanics-preset:
  primitives:
    - predicate-match@v1
    - score-accum@v1
    - win-lose-check@v1
  required-rules:
    - answer-submit
    - answer-evaluate
    - terminal-check
data-schema:
  required:
    - questions
    - answerKey
  collections:
    questions:
      fields: [id, prompt, options, correctAnswer]
visual-slots-preset:
  slots:
    - id: entity.question-card.primary
      semantic-slot: card-surface
      render-zone: playfield
    - id: entity.answer-option.primary
      semantic-slot: button
      render-zone: ui
runtime-modules:
  - predicate-match.runtime.mjs
  - score-accum.runtime.mjs
  - win-lose-check.runtime.mjs
semantic-probes:
  - id: quiz.correct-answer-advances
    setup:
      question-index: 0
      score: 0
      questions:
        - id: q1
          correctAnswer: A
    actions:
      - driver: clickAnswerOption
        args: [A]
    expect:
      state:
        question-index: 1
        score-delta-min: 1
      traceContains:
        - primitive: predicate-match@v1
          rule: answer-evaluate
        - primitive: score-accum@v1
          rule: answer-submit
    maps-to:
      primitives: [predicate-match@v1, score-accum@v1]
      rules: [answer-submit, answer-evaluate]
    evidence-required: [trace, snapshot]
  - id: quiz.wrong-answer-feedback
    setup:
      question-index: 0
      feedback: null
      questions:
        - id: q1
          correctAnswer: A
    actions:
      - driver: clickAnswerOption
        args: [B]
    expect:
      state:
        question-index: 0
        feedback: wrong
      traceContains:
        - primitive: predicate-match@v1
          rule: answer-evaluate
          after:
            matched: false
    maps-to:
      primitives: [predicate-match@v1]
      rules: [answer-evaluate]
    evidence-required: [trace, snapshot]
  - id: quiz.finish-after-last-question
    setup:
      question-index: 1
      questions:
        - id: q1
          correctAnswer: A
        - id: q2
          correctAnswer: C
    actions:
      - driver: clickAnswerOption
        args: [C]
    expect:
      state:
        phase: finished
      traceContains:
        - primitive: win-lose-check@v1
          rule: terminal-check
    maps-to:
      primitives: [predicate-match@v1, win-lose-check@v1]
      rules: [answer-evaluate, terminal-check]
    evidence-required: [trace, snapshot]
profile-skeleton:
  drivers: [clickStartButton, clickAnswerOption]
  observers: [getSnapshot, getTrace, getAssetUsage]
  steps:
    - click-start
    - click-correct-answer
    - assert-score-increased
gate-policy:
  must-pass:
    - check_level_solvability.js
    - check_playthrough.js
    - check_runtime_semantics.js
