archetype-id: board-grid.2048
description: Sliding merge grid preset for 2048-like move, merge, spawn, and terminal checks.
archetype-plan:
  genre: board-grid
  intent: move all tiles by direction, merge equal values once per turn, spawn a new tile, then check terminal state
mechanics-preset:
  primitives:
    - grid-step@v1
    - predicate-match@v1
    - score-accum@v1
    - slot-pool@v1
    - win-lose-check@v1
  required-rules:
    - move-direction
    - merge-equal-tile
    - spawn-next-tile
    - terminal-check
data-schema:
  required:
    - grid
    - solution-path
  grid:
    width: 4
    height: 4
    cell-fields: [id, row, col, value]
visual-slots-preset:
  slots:
    - id: entity.tile.primary
      semantic-slot: color-block
      render-zone: board-grid-cell
      state-driven-fields: [value]
runtime-modules:
  - grid-step.runtime.mjs
  - predicate-match.runtime.mjs
  - score-accum.runtime.mjs
  - slot-pool.runtime.mjs
  - win-lose-check.runtime.mjs
semantic-probes:
  - merge-once-per-turn
  - blocked-grid-terminal
profile-skeleton:
  drivers: [clickStartButton, pressDirection]
  observers: [getSnapshot, getTrace, getAssetUsage]
  steps:
    - click-start
    - press-direction
    - assert-grid-changed
gate-policy:
  must-pass:
    - check_level_solvability.js
    - check_playthrough.js
    - check_runtime_semantics.js
