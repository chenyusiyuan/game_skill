archetype-id: board-grid.gomoku
support-level: direct
description: Turn-based line-forming board preset for gomoku / five-in-a-row variants.
archetype-plan:
  genre: board-grid
  intent: place tokens on empty cells, alternate actors, detect contiguous line terminal states
mechanics-preset:
  primitives:
    - capacity-gate@v1
    - grid-board@v1
    - neighbor-query@v1
    - predicate-match@v1
    - win-lose-check@v1
  required-rules:
    - place-token
    - alternate-turn
    - line-detect
    - terminal-check
data-schema:
  required:
    - grid
    - actors
    - solution-path
  grid:
    width: 15
    height: 15
    cell-fields: [id, row, col, occupant]
visual-slots-preset:
  slots:
    - id: entity.board-cell.primary
      semantic-slot: board-cell
      render-zone: board-grid-cell
    - id: entity.token.primary
      semantic-slot: color-unit
      render-zone: board-grid-cell
      state-driven-fields: [owner]
runtime-modules:
  - capacity-gate.runtime.mjs
  - grid-board.runtime.mjs
  - neighbor-query.runtime.mjs
  - predicate-match.runtime.mjs
  - win-lose-check.runtime.mjs
semantic-probes:
  - id: gomoku.five-in-row-win
    setup:
      current-player: black
      grid:
        stones:
          - { row: 7, col: 3, owner: black }
          - { row: 7, col: 4, owner: black }
          - { row: 7, col: 5, owner: black }
          - { row: 7, col: 6, owner: black }
    actions:
      - driver: clickBoardCell
        args: [7, 7]
    expect:
      state:
        phase: win
        winner: black
      traceContains:
        - primitive: win-lose-check@v1
          rule: terminal-check
    maps-to:
      primitives: [capacity-gate@v1, neighbor-query@v1, win-lose-check@v1]
      rules: [place-token, line-detect, terminal-check]
    evidence-required: [trace, snapshot]
  - id: gomoku.four-not-win
    setup:
      current-player: black
      grid:
        stones:
          - { row: 7, col: 3, owner: black }
          - { row: 7, col: 4, owner: black }
          - { row: 7, col: 5, owner: black }
    actions:
      - driver: clickBoardCell
        args: [7, 6]
    expect:
      state:
        phase-not: win
      traceNotContains:
        - primitive: win-lose-check@v1
          after:
            result: win
    maps-to:
      primitives: [capacity-gate@v1, neighbor-query@v1, win-lose-check@v1]
      rules: [place-token, line-detect, terminal-check]
    evidence-required: [trace, snapshot]
  - id: gomoku.occupied-cell-rejected
    setup:
      current-player: white
      grid:
        stones:
          - { row: 7, col: 7, owner: black }
    actions:
      - driver: clickBoardCell
        args: [7, 7]
    expect:
      stateUnchanged:
        - entityId: cell-7-7
          fields: [occupant]
      traceContains:
        - primitive: capacity-gate@v1
          rule: place-token
      traceNotContains:
        - rule: alternate-turn
    maps-to:
      primitives: [capacity-gate@v1, grid-board@v1]
      rules: [place-token, alternate-turn]
    evidence-required: [trace, snapshot]
profile-skeleton:
  drivers: [clickStartButton, clickBoardCell]
  observers: [getSnapshot, getTrace, getAssetUsage]
  steps:
    - click-start
    - click-empty-cell
    - assert-token-placed
gate-policy:
  must-pass:
    - check_level_solvability.js
    - check_playthrough.js
    - check_runtime_semantics.js
