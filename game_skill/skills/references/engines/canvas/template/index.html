<!DOCTYPE html>
<html lang="zh-CN">
<head>
<!-- ENGINE: canvas | VERSION: browser-native | RUN: file -->
<meta charset="UTF-8">
<title>Canvas Template Game</title>
<style>
  body { margin: 0; background: #0f172a; color: #e2e8f0;
         font-family: system-ui, sans-serif;
         display: flex; flex-direction: column; align-items: center;
         justify-content: center; min-height: 100vh; gap: 12px; }
  canvas { background: #1e293b; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,.4); }
  p { font-size: 14px; opacity: .7; }
</style>
</head>
<body>
  <canvas id="game" width="640" height="480"></canvas>
  <p>Click the canvas to start / score.</p>

  <script>
    // Default run mode for simple canvas games is file, so this template stays inline.
    // If you need modular code, switch the marker to `RUN: local-http` and split into ./src/*.js.

    // ===== state =====
    const state = {
      phase: "ready",     // ready | playing | win | lose
      score: 0,
      t: 0,
    };
    window.gameState = state;

    // === Verify hooks ===
    window.__trace = window.__trace || [];
    window.__assetUsage = window.__assetUsage || [];

    // ===== update =====
    function update(state, dt) {
      if (state.phase !== "playing") return;
      state.t += dt;
    }

    // ===== draw =====
    function draw(ctx, state) {
      const { width: w, height: h } = ctx.canvas;
      ctx.clearRect(0, 0, w, h);

      ctx.fillStyle = "#334155";
      ctx.fillRect(0, 0, w, h);

      ctx.fillStyle = "#f8fafc";
      ctx.font = "bold 28px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(`phase: ${state.phase}`, w / 2, 60);
      ctx.fillText(`score: ${state.score}`, w / 2, 100);

      if (state.phase === "ready") {
        ctx.font = "16px system-ui";
        ctx.fillStyle = "#94a3b8";
        ctx.fillText("click to start", w / 2, h / 2);
      } else if (state.phase === "playing") {
        const x = (Math.sin(state.t / 300) + 1) * (w - 40) / 2 + 20;
        ctx.fillStyle = "#0ea5e9";
        ctx.fillRect(x - 20, h - 80, 40, 40);
      }
    }

    // ===== main / loop =====
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    let last = 0;
    function loop(ts) {
      const dt = last === 0 ? 0 : ts - last;
      last = ts;
      update(state, dt);
      draw(ctx, state);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    canvas.addEventListener("pointerdown", () => {
      if (state.phase === "ready") state.phase = "playing";
      else if (state.phase === "playing") state.score += 1;
    });

    // === Test API (Phase 5 校验需要) ===
    window.gameTest = window.gameTest || {};
    window.gameTest.observers = {
      getSnapshot: () => JSON.parse(JSON.stringify(window.gameState)),
      getTrace: () => [...(window.__trace || [])],
      getAssetUsage: () => [...(window.__assetUsage || [])],
    };
    window.gameTest.drivers = {};
    window.gameTest.probes = {
      resetWithScenario: (scenario) => {
        // TODO(codegen): 此 stub 必须被完整实现。契约清单（codegen.md Step 4.0.5.1）：
        //   1. scenario.fields 每一条都要写回 state（entities[].initial 里声明的所有字段）
        //   2. scenario 每个 entity collection teardown + rebuild
        //   3. 清所有 spawn/cooldown timer + pool/gate accounting
        //   4. 尊重 scenario.fields['game.phase']，不硬写成 idle
        //   5. 结束前刷 UI / canvas 重绘
        // check_project 会静态扫描；只 warn 或只改 score/misses 都会 fail。
        console.warn('probes.resetWithScenario: stub — codegen 需实现完整契约');
      },
      stepTicks: (n) => {
        console.warn('probes.stepTicks: stub — codegen 需实现');
      },
    };
  </script>
</body>
</html>
